.corp .lp-back:hover { background: var(--hover); color: var(--t1) }

/* === Wizard Steps === */
.wiz-steps { display: flex; align-items: center; gap: 0; margin-bottom: 16px; padding: 0 2px }
.wiz-step { display: flex; align-items: center; gap: 6px; cursor: pointer; transition: all .15s; padding: 4px 0 }
.wiz-step-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font: 700 11px var(--sans); border: 2px solid rgba(255,255,255,.2); color: rgba(255,255,255,.45); transition: all .2s; flex-shrink: 0 }
.wiz-step.done .wiz-step-num { border-color: rgba(52,211,153,.5); background: rgba(52,211,153,.12); color: #34d399 }
.wiz-step.active .wiz-step-num { border-color: rgba(99,102,241,.6); background: rgba(99,102,241,.18); color: #a5b4fc; box-shadow: 0 0 12px rgba(99,102,241,.2) }
.wiz-step-label { font: 500 12px var(--sans); color: rgba(255,255,255,.45); white-space: nowrap; transition: color .15s }
.wiz-step.done .wiz-step-label { color: rgba(52,211,153,.8) }
.wiz-step.active .wiz-step-label { color: rgba(255,255,255,.9) }
.wiz-connector { width: 20px; height: 2px; background: rgba(255,255,255,.1); margin: 0 4px; flex-shrink: 0 }
.wiz-step.done + .wiz-connector { background: rgba(52,211,153,.25) }
.wiz-content { flex: 1; overflow-y: auto; padding-right: 4px }
.wiz-content h3 { font: 700 14px var(--sans); color: #fff; margin-bottom: 3px }
.wiz-content .wiz-hint { font: 12px var(--sans); color: rgba(255,255,255,.5); margin-bottom: 12px }
.wiz-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px }
.wiz-card { padding: 12px 14px; border-radius: 10px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.12); cursor: pointer; transition: all .2s ease }
.wiz-card:hover { background: rgba(255,255,255,.07); border-color: rgba(99,102,241,.3); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.2) }
.wiz-card.on { background: rgba(99,102,241,.12); border-color: rgba(99,102,241,.5); box-shadow: 0 0 0 1px rgba(99,102,241,.2), 0 4px 16px rgba(99,102,241,.1) }
.wiz-card .wc-name { font: 700 13px var(--sans); color: rgba(255,255,255,.9); margin-bottom: 2px }
.wiz-card.on .wc-name { color: #c7d2fe }
.wiz-card .wc-desc { font: 11px var(--sans); color: rgba(255,255,255,.5); line-height: 1.4 }
.wiz-card.on .wc-desc { color: rgba(255,255,255,.6) }
.wiz-card .wc-model { font: 500 10px var(--mono); color: rgba(168,85,247,.7); margin-top: 4px }
.wiz-card.on .wc-model { color: rgba(168,85,247,.9) }
.wiz-nav { display: flex; gap: 8px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.06); margin-top: auto }
.wiz-nav .wiz-next { flex: 1; padding: 12px; border: none; border-radius: 10px; font: 700 12px var(--sans); color: #fff; background: linear-gradient(135deg, #5B5FE6, #818cf8); cursor: pointer; transition: all .2s }
.wiz-nav .wiz-next:hover { box-shadow: 0 6px 20px rgba(99,102,241,.35); transform: translateY(-1px) }
.wiz-nav .wiz-next:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(99,102,241,.25) }
.wiz-nav .wiz-next:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; transform: none }
.wiz-nav .wiz-prev { padding: 12px 18px; border: 1px solid rgba(255,255,255,.1); border-radius: 10px; font: 600 12px var(--sans); color: rgba(255,255,255,.4); background: rgba(255,255,255,.04); cursor: pointer; transition: all .12s }
.wiz-nav .wiz-prev:hover { color: #fff; background: rgba(255,255,255,.08) }

<div class="toast" id="toast"></div>
<script type="text/babel">
const {useState, useEffect, useCallback, useMemo, useRef} = React;

const _fc = {};
function cachedFetch(url, ttlMs = 30000) {
  const c = _fc[url];
  if (c && Date.now() - c.ts < ttlMs) return Promise.resolve(c.data);
  const p = fetch(url).then(r => r.json()).then(d => { _fc[url] = { data: d, ts: Date.now() }; return d; });
  return p;
}
function warmCache() {
  cachedFetch('/api/sessions', 60000);
  cachedFetch('/api/projects', 60000);
  cachedFetch('/api/graph', 60000);
}

function useDraggablePanel(key, defaults) {
  const stored = JSON.parse(localStorage.getItem('panel-' + key) || 'null');
  const [pos, setPos] = useState({ x: stored?.x ?? defaults.x, y: stored?.y ?? defaults.y });
  const [size, setSize] = useState({ w: stored?.w ?? defaults.w, h: stored?.h ?? defaults.h });
  const sizeRef = useRef(size);
  const posRef = useRef(pos);
  sizeRef.current = size;
  posRef.current = pos;

  const save = useCallback((p, s) => {
    localStorage.setItem('panel-' + key, JSON.stringify({ x: p.x, y: p.y, w: s.w, h: s.h }));
  }, [key]);

  const onDragStart = useCallback((e) => {
    if (e.target.closest('.panel-resize-handle')) return;
    e.preventDefault();
    const startX = (e.touches ? e.touches[0].clientX : e.clientX) - posRef.current.x;
    const startY = (e.touches ? e.touches[0].clientY : e.clientY) - posRef.current.y;
    const onMove = (ev) => {
      const cx = (ev.touches ? ev.touches[0].clientX : ev.clientX);
      const cy = (ev.touches ? ev.touches[0].clientY : ev.clientY);
      const vw = window.innerWidth, vh = window.innerHeight;
      const sw = sizeRef.current.w;
      const nx = Math.min(Math.max(cx - startX, 0), vw - Math.min(sw, 120));
      const ny = Math.min(Math.max(cy - startY, 0), vh - 40);
      setPos({ x: nx, y: ny });
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
      setPos(p => { save(p, sizeRef.current); return p; });
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
  }, [save]);

  const onResizeStart = useCallback((e) => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.touches ? e.touches[0].clientX : e.clientX;
    const startY = e.touches ? e.touches[0].clientY : e.clientY;
    const startW = sizeRef.current.w;
    const startH = sizeRef.current.h;
    const onMove = (ev) => {
      const cx = (ev.touches ? ev.touches[0].clientX : ev.clientX);
      const cy = (ev.touches ? ev.touches[0].clientY : ev.clientY);
      const nw = Math.max(100, startW + (cx - startX));
      const nh = Math.max(32, startH + (cy - startY));
      setSize({ w: nw, h: nh });
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
      setSize(s => { save(posRef.current, s); return s; });
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
  }, [save]);

  const panelStyle = {
    position: 'absolute', left: pos.x, top: pos.y,
    width: size.w, height: size.h,
    zIndex: 10,
  };

  const reset = useCallback(() => {
    setPos({ x: defaults.x, y: defaults.y });
    setSize({ w: defaults.w, h: defaults.h });
    localStorage.removeItem('panel-' + key);
  }, [defaults, key]);

  return { panelStyle, onDragStart, onResizeStart, pos, size, reset };
}

function LoadingScreen({ text }) {
  return React.createElement('div', { className: 'load-screen' },
    React.createElement('div', { className: 'load-spinner' }),
    React.createElement('div', { className: 'load-text' }, text || 'Loading...')
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null } }
  static getDerivedStateFromError(error) { return { error } }
  render() {
    if (this.state.error) return React.createElement('div', { className: 'empty', style: { padding: 40 } },
      React.createElement('div', { style: { color: 'var(--red)', fontWeight: 600, marginBottom: 4 } }, 'Something went wrong'),
      React.createElement('div', { style: { fontSize: 11, color: 'var(--t3)', fontFamily: 'var(--mono)' } }, this.state.error.message),
      React.createElement('button', { className: 'btn btn-g', style: { marginTop: 8 }, onClick: () => this.setState({ error: null }) }, 'Retry')
    );
    return this.props.children;

const rel = iso => { if (!iso) return ''; const d = Date.now() - new Date(iso).getTime(), m = Math.floor(d / 6e4); if (m < 1) return 'now'; if (m < 60) return m + 'm'; const h = Math.floor(m / 60); if (h < 24) return h + 'h'; const dy = Math.floor(h / 24); return dy < 30 ? dy + 'd' : new Date(iso).toLocaleDateString() };

function CommandPalette({ onClose }) {
  const [q, setQ] = useState('');
  const [results, setResults] = useState([]);
  const [sel, setSel] = useState(0);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);
  useEffect(() => {
    if (q.length < 2) { setResults([]); return; }
    const t = setTimeout(() => {
      fetch('/api/search?q=' + encodeURIComponent(q)).then(r => r.json()).then(d => { setResults(d.results || []); setSel(0); });
    }, 200);
    return () => clearTimeout(t);
  }, [q]);

  const go = (r) => {
    onClose();
    const nav = { agent: navBus.toAgent, skill: navBus.toSkill, project: navBus.toProject, session: navBus.toSession, hook: navBus.toHook, rule: navBus.toRule, memory: navBus.toMemory };
    if (nav[r.type]) nav[r.type](r.id);
  };

  const onKey = (e) => {
    if (e.key === 'Escape') onClose();
    if (e.key === 'ArrowDown') { e.preventDefault(); setSel(s => Math.min(s + 1, results.length - 1)); }
    if (e.key === 'ArrowUp') { e.preventDefault(); setSel(s => Math.max(s - 1, 0)); }
    if (e.key === 'Enter' && results[sel]) go(results[sel]);
  };

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,.4)', zIndex: 9999, display: 'flex', justifyContent: 'center', paddingTop: 120 }} onClick={onClose}>
      <div style={{ width: 520, maxHeight: 420, background: 'var(--card)', borderRadius: 12, border: '1px solid var(--border)', boxShadow: '0 20px 60px rgba(0,0,0,.2)', overflow: 'hidden', display: 'flex', flexDirection: 'column' }} onClick={e => e.stopPropagation()}>
        <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)' }}>
          <input ref={inputRef} className="input" style={{ fontSize: 14, border: 'none', background: 'transparent', padding: 0 }}
            placeholder="Search sessions, agents, skills, rules, memory..."
            value={q} onChange={e => setQ(e.target.value)} onKeyDown={onKey} />
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: '4px 0' }}>
          {results.length === 0 && q.length >= 2 && <div style={{ padding: '20px 16px', color: 'var(--t3)', fontSize: 12, textAlign: 'center' }}>No results</div>}
          {results.map((r, i) => (
            <div key={r.type + r.id} onClick={() => go(r)}
              style={{ padding: '8px 16px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10,
                background: i === sel ? 'var(--pri-bg)' : 'transparent', transition: 'background .1s' }}
              onMouseEnter={() => setSel(i)}>
              <span style={{ ...CHIP_STYLES[r.type], padding: '2px 6px', borderRadius: 4, fontSize: 9, fontWeight: 600, background: CHIP_STYLES[r.type]?.bg, color: CHIP_STYLES[r.type]?.color }}>{r.type}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ font: '500 12px var(--sans)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.title}</div>
                {r.subtitle && <div style={{ fontSize: 10, color: 'var(--t3)' }}>{r.subtitle}</div>}
              </div>
              {r.lastMessageAt && <span style={{ fontSize: 10, color: 'var(--t4)', flexShrink: 0 }}>{rel(r.lastMessageAt)}</span>}
            </div>
          ))}
        </div>
        <div style={{ padding: '6px 16px', borderTop: '1px solid var(--border)', fontSize: 10, color: 'var(--t4)', display: 'flex', gap: 12 }}>
          <span>↑↓ navigate</span><span>⏎ open</span><span>esc close</span>
        </div>
      </div>
    </div>
  );
}

const SoundFX = (() => {
  let ctx = null;
  let enabled = JSON.parse(localStorage.getItem('mc-sound') ?? 'true');
  const getCtx = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; };
  const play = (freq, dur, type = 'sine', vol = 0.12) => {
    if (!enabled) return;
    try {
      const c = getCtx();
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime);
      gain.gain.setValueAtTime(vol, c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      osc.connect(gain);
      gain.connect(c.destination);
      osc.start();
      osc.stop(c.currentTime + dur);
    } catch {}
  };
  return {
    ping: () => { play(880, 0.15, 'sine', 0.1); setTimeout(() => play(1320, 0.12, 'sine', 0.08), 80); },
    deploy: () => { play(440, 0.1, 'square', 0.06); setTimeout(() => play(660, 0.1, 'square', 0.06), 60); setTimeout(() => play(880, 0.15, 'square', 0.08), 120); },
    done: () => { play(660, 0.12, 'sine', 0.08); setTimeout(() => play(880, 0.12, 'sine', 0.08), 100); setTimeout(() => play(1100, 0.2, 'sine', 0.1), 200); },
    click: () => play(600, 0.06, 'sine', 0.05),
    error: () => { play(220, 0.2, 'sawtooth', 0.08); setTimeout(() => play(180, 0.3, 'sawtooth', 0.06), 120); },
    alert: () => { play(1000, 0.08, 'sine', 0.07); setTimeout(() => play(1200, 0.08, 'sine', 0.07), 100); setTimeout(() => play(1000, 0.08, 'sine', 0.07), 200); },
    dream: () => { play(330, 0.4, 'sine', 0.06); setTimeout(() => play(440, 0.35, 'sine', 0.06), 200); setTimeout(() => play(550, 0.3, 'sine', 0.06), 400); setTimeout(() => play(660, 0.5, 'sine', 0.08), 600); },
    get enabled() { return enabled; },
    toggle() { enabled = !enabled; localStorage.setItem('mc-sound', JSON.stringify(enabled)); return enabled; },
  };
})();

const Ambience = (() => {
  let running = false, nodes = [], ctx = null, interval = null;
  function start(workerCount) {
    if (running || !SoundFX.enabled) return;
    running = true;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      const master = ctx.createGain();
      master.gain.value = 0.025;
      master.connect(ctx.destination);
      const hum = ctx.createOscillator();
      hum.type = 'sine'; hum.frequency.value = 85;
      const humGain = ctx.createGain();
      humGain.gain.value = 0.3;
      hum.connect(humGain); humGain.connect(master);
      hum.start();
      nodes.push(hum, humGain);
      const hum2 = ctx.createOscillator();
      hum2.type = 'sine'; hum2.frequency.value = 170;
      const hum2Gain = ctx.createGain();
      hum2Gain.gain.value = 0.1;
      hum2.connect(hum2Gain); hum2Gain.connect(master);
      hum2.start();
      nodes.push(hum2, hum2Gain);
      interval = setInterval(() => {
        if (!running || !SoundFX.enabled) return;
        const active = workerCount?.() || 0;
        if (active > 0 && Math.random() < 0.3) {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = 'square';
          osc.frequency.value = 2000 + Math.random() * 4000;
          g.gain.setValueAtTime(0.06 + Math.random() * 0.04, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.02 + Math.random() * 0.03);
          osc.connect(g); g.connect(master);
          osc.start(); osc.stop(ctx.currentTime + 0.05);
        }
      }, 200);
    } catch {}
  }
  function stop() { running = false; if (interval) clearInterval(interval); interval = null; nodes.forEach(n => { try { n.stop?.() } catch {} }); nodes = []; if (ctx) { try { ctx.close() } catch {} ctx = null; } }
  return { start, stop, get running() { return running } };
})();

function shortName(name) {
  if (!name) return '...';
  const parts = name.replace(/\\/g, '/').split('/');
  const last = parts[parts.length - 1] || name;
  return last.length > 20 ? last.slice(0, 18) + '..' : last;
}

    const back = new T.Mesh(new T.BoxGeometry(.32, .3, .03), chairMat);
    back.position.set(0, deskY + .12, .42); group.add(back);
    const armL = new T.Mesh(new T.BoxGeometry(.03, .04, .2), chairMat);
    armL.position.set(-.16, deskY + .02, .28); group.add(armL);
    const armR = new T.Mesh(new T.BoxGeometry(.03, .04, .2), chairMat);
    armR.position.set(.16, deskY + .02, .28); group.add(armR);
    const robot = buildRobot(palette);
    robot.group.scale.setScalar(.55);
    robot.group.position.set(0, robotY - .01, .25);
    robot.group.rotation.y = Math.PI;
    group.add(robot.group);
    const paperStack = new T.Mesh(new T.BoxGeometry(.12, .02, .08), new T.MeshLambertMaterial({ color: 0xf0f0e8 }));
    paperStack.position.set(.38, deskY + .03, .08); group.add(paperStack);
    group.userData = { isWorker: true, workerIdx, robot, screen, scanLine, statusLight, screenGlow, screenMat, glowMat, typing: true, active: true, monitorCanvas, monitorTex };
    return { group, robot, glowParts: robot.glowParts };
  }

  const screenW = variant === 2 ? .5 : .55;
  const screenH = variant === 2 ? .4 : .35;
  screen = new T.Mesh(new T.BoxGeometry(screenW, screenH, .02), screenMat);
  screen.position.set(0, monitorY, monitorZ);
  screenGroup.add(screen);
  const screenGlow = new T.Mesh(new T.PlaneGeometry(screenW - .05, screenH - .05), new T.MeshBasicMaterial({ color: palette.glow, transparent: true, opacity: .15 }));
  screenGlow.position.set(0, monitorY, monitorZ + .012);
  screenGroup.add(screenGlow);
  const scanLine = new T.Mesh(new T.PlaneGeometry(screenW - .07, .008), new T.MeshBasicMaterial({ color: palette.glow, transparent: true, opacity: .4 }));
  scanLine.position.set(0, monitorY, monitorZ + .013);
  screenGroup.add(scanLine);
  const monitorFace = new T.Mesh(new T.PlaneGeometry(screenW - .07, screenH - .07), new T.MeshBasicMaterial({ map: monitorTex, transparent: true }));
  monitorFace.position.set(0, monitorY, monitorZ + .014);
  screenGroup.add(monitorFace);
  group.add(screenGroup);

  const chairColors = ['#484868', '#4a4a6e', '#444464', '#505072'];
  const chairMat = new T.MeshLambertMaterial({ color: chairColors[workerIdx % 4] });
  const chairBase = new T.Mesh(new T.CylinderGeometry(.12, .14, .04, 12), new T.MeshLambertMaterial({ color: '#3a3a55' }));
  chairBase.position.set(0, .03, .3); group.add(chairBase);
  const chairPole = new T.Mesh(new T.CylinderGeometry(.02, .02, deskY - .1, 6), new T.MeshLambertMaterial({ color: '#3a3a55' }));
  chairPole.position.set(0, (deskY - .1) / 2 + .03, .3); group.add(chairPole);
  const seat = new T.Mesh(new T.BoxGeometry(.32, .04, .3), chairMat);
  seat.position.set(0, deskY - .05, .28); group.add(seat);
  const back = new T.Mesh(new T.BoxGeometry(.32, .3, .03), chairMat);
  back.position.set(0, deskY + .12, .42); group.add(back);
  const armL = new T.Mesh(new T.BoxGeometry(.03, .04, .2), chairMat);
  armL.position.set(-.16, deskY + .02, .28); group.add(armL);
  const armR = new T.Mesh(new T.BoxGeometry(.03, .04, .2), chairMat);
  armR.position.set(.16, deskY + .02, .28); group.add(armR);

  const robot = buildRobot(palette);
  robot.group.scale.setScalar(.55);
  robot.group.position.set(0, robotY - .01, .25);
  robot.group.rotation.y = Math.PI;
  group.add(robot.group);

  const statusLight = new T.Mesh(new T.SphereGeometry(.03, 8, 6), glowMat);
  statusLight.position.set(screenW / 2 - .02, monitorY, monitorZ);
  group.add(statusLight);

  if (workerIdx % 2 === 0) {
    const mug = new T.Mesh(new T.CylinderGeometry(.02, .015, .04, 10), new T.MeshLambertMaterial({ color: 0x8855aa }));
    mug.position.set(-(deskW / 2 - .1), deskY + .03, .08); group.add(mug);
  } else {
    const paperStack = new T.Mesh(new T.BoxGeometry(.12, .02, .08), new T.MeshLambertMaterial({ color: 0xf0f0e8 }));
    paperStack.position.set(-(deskW / 2 - .1), deskY + .03, .08); group.add(paperStack);
  }

  group.userData = {
    isWorker: true, workerIdx, robot, screen, scanLine, statusLight, screenGlow,
    screenMat, glowMat, typing: true, active: true,
    monitorCanvas, monitorTex
  };

  return { group, robot, glowParts: robot.glowParts };
}

function ContentViewer({ title, filename, apiBase, onClose }) {
  const [content, setContent] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    fetch(`${apiBase}/${encodeURIComponent(filename)}`).then(r => r.json()).then(d => { setContent(d.content || ''); setLoading(false); }).catch(() => { setContent('Failed to load file.'); setLoading(false); });
  }, [apiBase, filename]);
  return (
    <div className="ca-viewer" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="ca-viewer-box">
        <div className="ca-viewer-hdr">
          <h3>{title || filename}</h3>
          <button className="ca-viewer-close" onClick={onClose}>&#x2715;</button>
        </div>
        <div className="ca-viewer-body">{loading ? 'Loading...' : content}</div>
        <div className="ca-viewer-footer">
          <button className="ca-tip-btn" onClick={() => { navigator.clipboard.writeText(content || ''); }}>Copy</button>
          <button className="ca-tip-btn pri" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

function InfoPill({ item, type, selected, onToggle, onView }) {
  const [hover, setHover] = useState(false);
  const [tipPos, setTipPos] = useState(null);
  const timerRef = useRef(null);
  const pillRef = useRef(null);
  const desc = item.description || '';
  const model = item.model || null;
  const cls = type === 'skill' ? ' sk' : type === 'memory' ? ' mem' : '';

  const showTip = () => {
    clearTimeout(timerRef.current);
    if (pillRef.current) {
      const r = pillRef.current.getBoundingClientRect();
      const tipW = 300;
      let left = r.left + r.width / 2 - tipW / 2;
      if (left < 8) left = 8;
      if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
      const above = r.top - 8;
      const below = r.bottom + 8;
      const fitsAbove = above > 200;
      setTipPos({ left, top: fitsAbove ? undefined : below, bottom: fitsAbove ? window.innerHeight - above : undefined });
    }
    setHover(true);
  };
  const hideTip = () => { timerRef.current = setTimeout(() => setHover(false), 250); };

  const tipContent = hover && tipPos ? ReactDOM.createPortal(
    <div className="ca-tip" style={{ left: tipPos.left, top: tipPos.top, bottom: tipPos.bottom }} onMouseEnter={showTip} onMouseLeave={hideTip}>
      <div className="ca-tip-name">{item.name || item.shortName || item.filename}</div>
      {desc ? <div className="ca-tip-desc">{desc}</div> : <div className="ca-no-desc">No description available</div>}
      {model && <div className="ca-tip-meta">{model}</div>}
      <div className="ca-tip-actions">
        <button className="ca-tip-btn pri" onClick={e => { e.stopPropagation(); onView(); }}>View file</button>
        <button className="ca-tip-btn" onClick={e => { e.stopPropagation(); onToggle(); }}>{selected ? 'Deselect' : 'Select'}</button>
      </div>
    </div>,
    document.body
  ) : null;

  return (
    <div className="ca-pill-wrap" ref={pillRef} onMouseEnter={showTip} onMouseLeave={hideTip}>
      <div className={'ca-pill-info' + cls + (selected ? ' on' : '')} onClick={onToggle}>
        <span className="ca-pill-name">{item.name || item.shortName || item.filename}</span>
        <span className="ca-pill-i" onClick={e => { e.stopPropagation(); onView(); }}>i</span>
      </div>
      {tipContent}
    </div>
  );
}

function CreateAgentModal({ agents, skills, memFiles, modules, onClose }) {
  const [name, setName] = useState('');
  const [desc, setDesc] = useState('');
  const [model, setModel] = useState('claude-opus-4-6');
  const [selAgents, setSelAgents] = useState({});
  const [selSkills, setSelSkills] = useState({});
  const [selMem, setSelMem] = useState({});
  const [selMods, setSelMods] = useState({});
  const [selTools, setSelTools] = useState({});
  const [prompt, setPrompt] = useState('');
  const [saving, setSaving] = useState(false);
  const [importUrl, setImportUrl] = useState('');
  const [importing, setImporting] = useState(false);
  const [expanded, setExpanded] = useState({ agents: false, skills: false, mem: false, mods: false });
  const toggle = (k) => setExpanded(p => ({ ...p, [k]: !p[k] }));
  const [viewing, setViewing] = useState(null);
  const valid = name.trim().length >= 2;
  const nameConflict = agents.some(a => a.filename === name.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-') + '.md');

  const TOOLS = ['Read', 'Write', 'Edit', 'Bash', 'Grep', 'Glob'];
  const allTools = { Read: true, Write: true, Edit: true, Bash: true, Grep: true, Glob: true };

  const TEMPLATES = useMemo(() => {
    const eccAgents = {}, spAgents = {}, customAgents = {}, allSkillSel = {}, allMemSel = {};
    for (const a of agents) {
      const base = a.filename.replace('.md', '');
      if (ECC_NAMES.has(base)) eccAgents[a.filename] = true;
      else if (SP_NAMES.has(base)) spAgents[a.filename] = true;
      else customAgents[a.filename] = true;
    }
    for (const s of skills) allSkillSel[s.filename] = true;
    for (const m of memFiles) allMemSel[m.filename] = true;

    return [
      { label: 'Everything Claude Code', name: 'ecc-orchestrator', desc: `All ${Object.keys(eccAgents).length} ECC agents for full development`, model: 'claude-opus-4-6',
        tools: allTools, selAgents: eccAgents, prompt: 'You are the Everything Claude Code orchestrator. Dispatch specialized agents for every task: code-reviewer for reviews, tdd-guide for tests, security-reviewer for security, planner for architecture.' },
      { label: 'Claude Superpowers', name: 'sp-orchestrator', desc: `All ${Object.keys(spAgents).length} Superpowers methodology agents`, model: 'claude-opus-4-6',
        tools: allTools, selAgents: spAgents, prompt: 'You are the Claude Superpowers orchestrator. Use methodology agents: sp-writing-plans for planning, sp-systematic-debugging for bugs, sp-test-driven-development for TDD, sp-verification-before-completion for quality gates.' },
      { label: "Custom", name: 'custom-orchestrator', desc: `Custom agents + all skills + all memory`, model: 'claude-opus-4-6',
        tools: allTools, selAgents: customAgents, selSkills: allSkillSel, selMem: allMemSel,
        prompt: 'You are the custom orchestrator with full access to custom agents, all slash commands, and all memory files for maximum context.' },
      { sep: true },
      { label: 'Code Reviewer', name: 'code-reviewer', desc: 'Reviews code for quality, security, and maintainability', model: 'claude-opus-4-6',
        tools: { Read: true, Grep: true, Glob: true, Bash: true }, prompt: 'You are an expert code reviewer. Focus on:\n- Code quality and readability\n- Security vulnerabilities\n- Performance issues\n- Adherence to project conventions\n\nProvide specific, actionable feedback with file paths and line numbers.' },
      { label: 'Full Stack Builder', name: 'full-stack-builder', desc: 'Full-cycle feature implementation with TDD and review', model: 'claude-opus-4-6',
        tools: allTools, prompt: 'You are a full-stack developer. Follow TDD:\n1. Write failing tests first\n2. Implement minimal code to pass\n3. Refactor\n4. Run full test suite\n\nCommit only when tests pass. Keep changes focused and incremental.' },
      { label: 'Bug Hunter', name: 'bug-hunter', desc: 'Systematic debugging: reproduce, diagnose, fix, verify', model: 'claude-opus-4-6',
        tools: allTools, prompt: 'You are a systematic debugger. For every bug:\n1. Reproduce the issue with a test\n2. Trace the root cause through the code\n3. Fix with minimal changes\n4. Verify the fix passes\n5. Check for similar issues elsewhere' },
      { label: 'Research Agent', name: 'research-agent', desc: 'Explores codebases and gathers information', model: 'claude-opus-4-6',
        tools: { Read: true, Grep: true, Glob: true }, prompt: 'You are a research specialist. Explore, understand, and document codebases.\n1. Search broadly first, then narrow down\n2. Read relevant files thoroughly\n3. Map dependencies and call chains\n4. Report findings with file paths and evidence' },
    ];
  }, [agents, skills, memFiles]);

  const applyTemplate = (tpl) => {
    setName(tpl.name);
    setDesc(tpl.desc);
    setModel(tpl.model);
    setSelTools(tpl.tools || {});
    setPrompt(tpl.prompt || '');
    setSelAgents(tpl.selAgents || {});
    setSelSkills(tpl.selSkills || {});
    setSelMem(tpl.selMem || {});
    setSelMods({});
    if (tpl.selAgents && Object.keys(tpl.selAgents).length > 0) setExpanded(p => ({ ...p, agents: true }));
    if (tpl.selSkills && Object.keys(tpl.selSkills).length > 0) setExpanded(p => ({ ...p, skills: true }));
    if (tpl.selMem && Object.keys(tpl.selMem).length > 0) setExpanded(p => ({ ...p, mem: true }));
  };

  const importFromUrl = async () => {
    if (!importUrl.trim() || importing) return;
    setImporting(true);
    try {
      const r = await fetch('/api/agents/import-url', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: importUrl.trim() }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Import failed');
      const a = d.agent;
      if (a.name) setName(a.name);
      if (a.description) setDesc(a.description);
      if (a.model) setModel(a.model);
      if (a.tools) { const t = {}; a.tools.forEach(x => t[x] = true); setSelTools(t); }
      if (a.systemPrompt) setPrompt(a.systemPrompt);
      setImportUrl('');
      toast('Imported from URL');
    } catch (err) { toast(err.message, 'error'); }
    setImporting(false);
  };

  const previewMd = useMemo(() => {
    const lines = ['---'];
    if (desc.trim()) lines.push(`description: ${desc.trim()}`);
    lines.push(`model: ${model}`);
    const toolList = TOOLS.filter(t => selTools[t]);
    if (toolList.length > 0 && toolList.length < TOOLS.length) lines.push(`tools: ${toolList.join(', ')}`);
    lines.push('---', '');
    if (prompt.trim()) lines.push(prompt.trim(), '');
    const subs = Object.keys(selAgents).filter(k => selAgents[k]);
    if (subs.length) lines.push('## Subagents', '', ...subs.map(s => `- ${s}`), '');
    const sks = Object.keys(selSkills).filter(k => selSkills[k]);
    if (sks.length) lines.push('## Skills', '', ...sks.map(s => `- ${s}`), '');
    const mods = Object.keys(selMods).filter(k => selMods[k]);
    if (mods.length) lines.push('## Modules', '', ...mods.map(m => `- ${m}`), '');
    const mem = Object.keys(selMem).filter(k => selMem[k]);
    if (mem.length) lines.push('## Memory', '', ...mem.map(m => `- ${m}`), '');
    return lines.join('\n');
  }, [name, desc, model, selTools, prompt, selAgents, selSkills, selMods, selMem]);

  const save = async () => {
    if (!valid) return;
    setSaving(true);
    const toolList = TOOLS.filter(t => selTools[t]);
    const body = {
      name: name.trim(),
      description: desc.trim(),
      model,
      tools: toolList.length > 0 && toolList.length < TOOLS.length ? toolList : [],
      subagents: Object.keys(selAgents).filter(k => selAgents[k]),
      skills: Object.keys(selSkills).filter(k => selSkills[k]),
      memory: Object.keys(selMem).filter(k => selMem[k]),
      modules: Object.keys(selMods).filter(k => selMods[k]),
      systemPrompt: prompt.trim(),
    };
    try {
      await fetch('/api/agents', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      toast('Agent created');
      onClose(true);
    } catch { toast('Failed to create agent', 'error'); }
    setSaving(false);
  };

  return (
    <div className="ca-overlay" onClick={e => { if (e.target === e.currentTarget) onClose() }}>
      <div className="ca-modal">
        <div className="ca-modal-inner">
        <h2 style={{ padding: '0 0 4px' }}>Create Agent</h2>
        <div className="ca-sub">Start from a template or configure from scratch.</div>

        <div className="ca-templates">
          {TEMPLATES.map((t, i) => t.sep
            ? <div key={'sep-'+i} style={{ width: '100%', height: 1, background: 'var(--border)', margin: '2px 0' }} />
            : <div key={t.name} className={'ca-tpl' + (t.selAgents ? ' ca-tpl-orch' : '')} onClick={() => applyTemplate(t)} title={t.desc}>
              {t.label}
            </div>
          )}
        </div>

        <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
          <input value={importUrl} onChange={e => setImportUrl(e.target.value)} placeholder="Paste skills.sh URL or any skill link to import..."
            onKeyDown={e => { if (e.key === 'Enter') importFromUrl(); }}
            style={{ flex: 1, padding: '7px 12px', border: '1px solid var(--border)', borderRadius: 8, font: '12px var(--mono)', color: 'var(--t1)', background: 'var(--input)', outline: 'none' }} />
          <button onClick={importFromUrl} disabled={!importUrl.trim() || importing}
            style={{ padding: '7px 14px', borderRadius: 8, border: '1px solid var(--border)', background: importUrl.trim() ? 'var(--pri)' : 'var(--input)', color: importUrl.trim() ? '#fff' : 'var(--t3)', font: '600 11px var(--sans)', cursor: importUrl.trim() ? 'pointer' : 'default', whiteSpace: 'nowrap', opacity: importing ? .5 : 1 }}>
            {importing ? 'Importing...' : 'Import URL'}
          </button>
        </div>

        <div className="ca-split">
          <div className="ca-split-form">
            <div className="ca-field">
              <label>Agent Name</label>
              <input value={name} onChange={e => setName(e.target.value)} placeholder="my-agent" autoFocus />
              {nameConflict && <div className="ca-warn">Agent with this name already exists</div>}
            </div>

            <div className="ca-field">
              <label>Description</label>
              <input value={desc} onChange={e => setDesc(e.target.value)} placeholder="What this agent does..." />
            </div>

            <div className="ca-field">
              <label>Model</label>
              <div className="ca-models">
                {CLAUDE_MODELS.map(m => (
                  <div key={m.id} className={'ca-model' + (model === m.id ? ' on' : '')} onClick={() => setModel(m.id)}>
                    <div className="ca-model-name">{m.name}</div>
                    <div className="ca-model-id">{m.id.replace('claude-', '')}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="ca-field">
              <label>Tools</label>
              <div className="ca-tools">
                {TOOLS.map(t => (
                  <div key={t} className={'ca-tool' + (selTools[t] ? ' on' : '')}
                    onClick={() => setSelTools(p => ({ ...p, [t]: !p[t] }))}>{t}</div>
                ))}
                <div className="ca-tool" style={{ color: 'var(--t4)', fontStyle: 'italic', fontFamily: 'var(--sans)' }}
                  onClick={() => { const all = {}; TOOLS.forEach(t => all[t] = true); setSelTools(all); }}>All</div>
              </div>
            </div>

            <div className="ca-section">
              <div className="ca-section-hdr" onClick={() => toggle('agents')}>
                <span className={'ca-toggle' + (expanded.agents ? ' open' : '')}>&#9654;</span>
                <label>Subagents</label>
                <span className="ca-count">{Object.keys(selAgents).filter(k => selAgents[k]).length}/{agents.length}</span>
              </div>
              {expanded.agents && <div className="ca-section-body">
                <div className="lp-pills">
                  {agents.map(a => (
                    <InfoPill key={a.filename} item={a} type="agent" selected={!!selAgents[a.filename]}
                      onToggle={() => setSelAgents(p => ({ ...p, [a.filename]: !p[a.filename] }))}
                      onView={() => setViewing({ title: a.name, filename: a.filename, apiBase: '/api/agents' })} />
                  ))}
                </div>
              </div>}
            </div>

            <div className="ca-section">
              <div className="ca-section-hdr" onClick={() => toggle('skills')}>
                <span className={'ca-toggle' + (expanded.skills ? ' open' : '')}>&#9654;</span>
                <label>Skills</label>
                <span className="ca-count">{Object.keys(selSkills).filter(k => selSkills[k]).length}/{skills.length}</span>
              </div>
              {expanded.skills && <div className="ca-section-body">
                <div className="lp-pills">
                  {skills.map(s => (
                    <InfoPill key={s.filename} item={s} type="skill" selected={!!selSkills[s.filename]}
                      onToggle={() => setSelSkills(p => ({ ...p, [s.filename]: !p[s.filename] }))}
                      onView={() => setViewing({ title: '/' + s.name, filename: s.filename, apiBase: '/api/skills' })} />
                  ))}
                </div>
              </div>}
            </div>

            <div className="ca-section">
              <div className="ca-section-hdr" onClick={() => toggle('mem')}>
                <span className={'ca-toggle' + (expanded.mem ? ' open' : '')}>&#9654;</span>
                <label>Memory Files</label>
                <span className="ca-count">{Object.keys(selMem).filter(k => selMem[k]).length}/{memFiles.length}</span>
              </div>
              {expanded.mem && <div className="ca-section-body">
                <div className="lp-pills">
                  {memFiles.map(m => (
                    <InfoPill key={m.filename} item={m} type="memory" selected={!!selMem[m.filename]}
                      onToggle={() => setSelMem(p => ({ ...p, [m.filename]: !p[m.filename] }))}
                      onView={() => setViewing({ title: m.name, filename: m.filename, apiBase: '/api/memory' })} />
                  ))}
                </div>
              </div>}
            </div>

            {modules && modules.available && (
              <div className="ca-section">
                <div className="ca-section-hdr" onClick={() => toggle('mods')}>
                  <span className={'ca-toggle' + (expanded.mods ? ' open' : '')}>&#9654;</span>
                  <label>Modules</label>
                  <span className="ca-count">{Object.keys(selMods).filter(k => selMods[k]).length}/{(modules.modules || []).length}</span>
                </div>
                {expanded.mods && <div className="ca-section-body">
                  <div className="lp-pills">
                    {(modules.modules || []).map(m => (
                      <InfoPill key={m.id} item={m} type="module" selected={!!selMods[m.id]}
                        onToggle={() => {
                          setSelMods(p => {
                            const next = { ...p, [m.id]: !p[m.id] };
                            if (next[m.id] && m.requires) { for (const dep of m.requires) next[dep] = true; }
                            return next;
                          });
                        }}
                        onView={() => setViewing({ title: m.shortName || m.id, filename: m.id + '.md', apiBase: '/api/modules' })} />
                    ))}
                  </div>
                </div>}
              </div>
            )}

            <div className="ca-field">
              <label>System Prompt</label>
              <textarea value={prompt} onChange={e => setPrompt(e.target.value)} placeholder="Custom instructions for this agent..." style={{ minHeight: 100 }} />
            </div>
          </div>

          <div className="ca-split-preview">
            <div className="preview-header">Preview: {name.trim() || 'agent'}.md</div>
            {previewMd}
          </div>
        </div>

        </div>
        <div className="ca-btns-sticky">
          <button className="ca-cancel" onClick={() => onClose()}>Cancel</button>
          <button className="ca-save" onClick={save} disabled={!valid || saving || nameConflict}>{saving ? 'Creating...' : 'Create Agent'}</button>
        </div>
      </div>
      {viewing && <ContentViewer title={viewing.title} filename={viewing.filename} apiBase={viewing.apiBase} onClose={() => setViewing(null)} />}
    </div>
  );
}

const LANG_COLORS = { python: '#3b82f6', dotnet: '#8b5cf6', typescript: '#eab308', java: '#f97316', rust: '#ef4444', core: '#10b981' };
const CAT_COLORS = { ai: '#818cf8', data: '#34d399', messaging: '#fbbf24', identity: '#f87171', monitoring: '#60a5fa', compute: '#a78bfa', m365: '#fb923c', patterns: '#94a3b8' };

function SkillRack({ groups, onDrop, onChatDrop, onClose, dragStart }) {
  const [msSkills, setMsSkills] = useState([]);
  const [customSkills, setCustomSkills] = useState([]);
  const [cats, setCats] = useState({});
  const [langs, setLangs] = useState({});
  const [q, setQ] = useState('');
  const [filterCat, setFilterCat] = useState(null);
  const [filterLang, setFilterLang] = useState(null);
  const [dragItem, setDragItem] = useState(null);
  const [collapsedCats, setCollapsedCats] = useState({});
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let loaded = 0;
    const check = () => { loaded++; if (loaded >= 2) setLoading(false); };
    fetch('/api/skills').then(r => r.json()).then(d => {
      setCustomSkills((d.skills || []).map(s => ({ type: 'custom-skill', id: s.filename, name: '/' + s.name, desc: s.description || '', lang: 'custom', category: 'custom' })));
    }).catch(() => {}).finally(check);
    fetch('/api/ms-skills').then(r => r.json()).then(d => {
      setMsSkills(d.skills || []);
      setCats(d.categories || {});
      setLangs(d.langs || {});
    }).catch(() => {}).finally(check);
  }, []);

  const filteredCustom = useMemo(() => {
    if (filterCat || filterLang) return [];
    if (!q) return customSkills;
    const lq = q.toLowerCase();
    return customSkills.filter(s => (s.name + ' ' + s.desc).toLowerCase().includes(lq));
  }, [customSkills, filterCat, filterLang, q]);

  const filtered = useMemo(() => {
    let list = msSkills;
    if (filterCat) list = list.filter(s => s.category === filterCat);
    if (filterLang) list = list.filter(s => s.lang === filterLang);
    if (q) { const lq = q.toLowerCase(); list = list.filter(s => (s.name + ' ' + s.desc + ' ' + s.id).toLowerCase().includes(lq)); }
    return list;
  }, [msSkills, filterCat, filterLang, q]);

  const grouped = useMemo(() => {
    const m = {};
    for (const s of filtered) {
      const key = s.category;
      if (!m[key]) m[key] = [];
      m[key].push(s);
    }
    return m;
  }, [filtered]);

  const toggleCat = (cat) => setCollapsedCats(prev => ({ ...prev, [cat]: !prev[cat] }));

  const handleDragStart = (e, item) => {
    setDragItem(item);
    e.dataTransfer.setData('text/plain', JSON.stringify(item));
    e.dataTransfer.effectAllowed = 'copy';
  };

  return (
    <div className="skill-rack">
      <div className="rack-header">
        <div className="panel-drag-header" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }} onMouseDown={dragStart} onTouchStart={dragStart}>
          <div className="rack-title">Skill Rack</div>
          {onClose && <button onClick={onClose} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,.3)', cursor: 'pointer', fontSize: 14, padding: '0 2px', lineHeight: 1 }}>&times;</button>}
        </div>
        <div className="rack-filters">
          {Object.entries(cats).map(([k, v]) => (
            <div key={k} className={'rack-pill' + (filterCat === k ? ' on' : '')}
              onClick={() => setFilterCat(prev => prev === k ? null : k)}
              style={filterCat === k ? { borderColor: CAT_COLORS[k] + '60', color: CAT_COLORS[k] } : {}}>
              {v.split(' ')[0]}
            </div>
          ))}
        </div>
        <div className="rack-filters" style={{ marginTop: 3 }}>
          {Object.entries(langs).map(([k, v]) => (
            <div key={k} className={'rack-pill' + (filterLang === k ? ' on' : '')}
              onClick={() => setFilterLang(prev => prev === k ? null : k)}
              style={filterLang === k ? { borderColor: LANG_COLORS[k] + '80', color: LANG_COLORS[k] } : {}}>
              {v}
            </div>
          ))}
        </div>
        <input className="rack-search" placeholder="Search skills..." value={q} onChange={e => setQ(e.target.value)} />
      </div>
      <div className="rack-body">
        {filteredCustom.length > 0 && (
          <div className="rack-section">
            <div className="rack-section-title" style={{ color: '#818cf8', cursor: 'pointer', userSelect: 'none' }} onClick={() => toggleCat('custom')}>
              {collapsedCats.custom ? '▶' : '▼'} Custom Skills ({filteredCustom.length})
            </div>
            {!collapsedCats.custom && filteredCustom.map(s => (
              <div key={s.id} className={'rack-chip' + (dragItem?.id === s.id ? ' dragging' : '')} draggable
                onDragStart={e => handleDragStart(e, { type: 'skill', ...s })}
                onDragEnd={() => setDragItem(null)}
                title={s.desc}>
                <div className="rack-chip-dot" style={{ background: '#818cf8' }} />
                <div className="rack-chip-name">{s.name}</div>
                <div className="rack-chip-lang" style={{ color: 'rgba(255,255,255,.3)' }}>cmd</div>
              </div>
            ))}
          </div>
        )}
        {Object.entries(grouped).map(([cat, skills]) => (
          <div key={cat} className="rack-section">
            <div className="rack-section-title" style={{ color: CAT_COLORS[cat] || '#888', cursor: 'pointer', userSelect: 'none', display: 'flex', alignItems: 'center', gap: 4 }} onClick={() => toggleCat(cat)}>
              <span style={{ fontSize: 7 }}>{collapsedCats[cat] ? '▶' : '▼'}</span> {cats[cat] || cat} ({skills.length})
            </div>
            {!collapsedCats[cat] && skills.map(s => (
              <div key={s.id} className={'rack-chip' + (dragItem?.id === s.id ? ' dragging' : '')} draggable
                onDragStart={e => handleDragStart(e, { type: 'skill', ...s })}
                onDragEnd={() => setDragItem(null)}
                title={s.desc}>
                <div className="rack-chip-dot" style={{ background: CAT_COLORS[s.category] || '#666' }} />
                <div className="rack-chip-name">{s.name}</div>
                <div className="rack-chip-lang" style={{ color: LANG_COLORS[s.lang] || 'rgba(255,255,255,.2)' }}>{s.lang === 'dotnet' ? '.NET' : s.lang}</div>
              </div>
            ))}
          </div>
        ))}
        {loading && <div style={{ padding: '16px 8px', textAlign: 'center' }}><div style={{ display: 'inline-block', width: 16, height: 16, border: '2px solid rgba(99,102,241,.2)', borderTopColor: '#818cf8', borderRadius: '50%', animation: 'spin .6s linear infinite' }} /><div style={{ font: '400 10px var(--sans)', color: 'rgba(255,255,255,.3)', marginTop: 6 }}>Loading skills...</div></div>}
        {!loading && filtered.length === 0 && filteredCustom.length === 0 && <div style={{ padding: '12px 8px', font: '400 10px var(--sans)', color: 'rgba(255,255,255,.3)', textAlign: 'center' }}>No skills match</div>}
      </div>
      <div className="rack-footer">
        <div className="rack-footer-text">{filteredCustom.length + filtered.length} / {customSkills.length + msSkills.length} skills &middot; drag to terminal</div>
      </div>
    </div>
  );
}

function TerminalView({ worker: w, workerIdx, sameProject, busEvents, busEventsRef, setBusEvents, workerCustomTitles, setWorkerCustomTitles, onClose, onViewSession, onViewProject, draft, setDraft, dragStart }) {
  const [tab, setTab] = useState('chat');
  const [transcript, setTranscript] = useState([]);
  const [loading, setLoading] = useState(false);
  const msg = draft || '';
  const setMsg = (v) => setDraft(workerIdx, typeof v === 'function' ? v(msg) : v);
  const [editingTitle, setEditingTitle] = useState(false);
  const [titleDraft, setTitleDraft] = useState('');
  const bodyRef = useRef(null);
  const pollRef = useRef(null);
  const [terminalId, setTerminalId] = useState(null);
  const [termOutput, setTermOutput] = useState([]);
  const sseRef = useRef(null);

  const customTitle = workerCustomTitles[w.sessionId || `worker-${workerIdx}`];
  const displayTitle = customTitle || w.title || `Worker ${workerIdx + 1}`;
  const projectKey = w.projectSlug || w.projectName || '';

  const loadTranscript = useCallback(() => {
    if (!w.sessionId) return;
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 8000);
    setLoading(true);
    fetch(`/api/sessions/${w.sessionId}/transcript?limit=40&tail=1`, { signal: ctrl.signal })
      .then(r => r.json())
      .then(d => {
        setTranscript(d.messages || []);
        setTimeout(() => { if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight; }, 50);
      })
      .catch(() => {})
      .finally(() => { clearTimeout(timeout); setLoading(false); });
  }, [w.sessionId]);

  useEffect(() => {
    loadTranscript();
    pollRef.current = setInterval(loadTranscript, 8000);
    return () => clearInterval(pollRef.current);
  }, [loadTranscript]);

  useEffect(() => {
    if (!terminalId) return;
    const sse = new EventSource(`/api/terminal/${terminalId}/stream`);
    sseRef.current = sse;
    sse.onmessage = (e) => {
      try {
        const chunk = JSON.parse(e.data);
        if (chunk.type === 'connected') return;
        setTermOutput(prev => [...prev, chunk].slice(-200));
        setTimeout(() => { if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight; }, 50);
      } catch {}
    };
    return () => { sse.close(); sseRef.current = null; };
  }, [terminalId]);

  const spawnHeadless = useCallback(() => {
    fetch('/api/terminal/spawn', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: w.projectPath, name: displayTitle })
    }).then(r => r.json()).then(d => {
      if (d.ok && d.terminalId) setTerminalId(d.terminalId);
    }).catch(() => {});
  }, [w.projectPath, displayTitle]);

  const saveTitle = (val) => {
    const key = w.sessionId || `worker-${workerIdx}`;
    const updated = { ...workerCustomTitles, [key]: val };
    setWorkerCustomTitles(updated);
    localStorage.setItem('mc-worker-titles', JSON.stringify(updated));
    setEditingTitle(false);
  };

  const [slashHints, setSlashHints] = useState([]);
  const [skills, setSkills] = useState([]);
  useEffect(() => { fetch('/api/skills').then(r => r.json()).then(d => setSkills(d.skills || [])).catch(() => {}); }, []);

  const LOCAL_COMMANDS = [
    { cmd: '/open', desc: 'Open real terminal for this session' },
    { cmd: '/clear', desc: 'Clear chat messages' },
    { cmd: '/status', desc: 'Refresh session transcript' },
    { cmd: '/help', desc: 'Show available commands' },
    { cmd: '/connect', desc: 'Connect headless terminal to this session' },
  ];

  const sendToSession = (text) => {
    if (terminalId) {
      fetch('/api/terminal/send', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ terminalId, message: text })
      });
      return;
    }
    const settings = JSON.parse(localStorage.getItem('mc-settings') || '{}');
    fetch('/api/terminal/spawn', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: text,
        model: settings.defaultModel || 'claude-sonnet-4-6',
        name: displayTitle,
        path: w.projectPath,
        maxTurns: settings.maxTurns || 0,
        maxBudget: settings.maxBudget || 0,
        permissionMode: settings.permissionMode || 'default',
        effortLevel: settings.effortLevel || 'high',
      })
    }).then(r => r.json()).then(d => {
      if (d.ok && d.terminalId) setTerminalId(d.terminalId);
    }).catch(() => {});
  };

  const logEvent = (event, message) => {
    fetch('/api/bus/events', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent: 'user', project: projectKey, event, message })
    }).then(() => fetch('/api/bus/events?limit=20').then(r => r.json()).then(evts => { if (Array.isArray(evts)) { busEventsRef.current = evts; setBusEvents(evts); } }));
  };

  const handleSend = () => {
    if (!msg.trim()) return;
    const trimmed = msg.trim();

    if (trimmed.startsWith('/')) {
      const spaceIdx = trimmed.indexOf(' ');
      const cmd = spaceIdx > 0 ? trimmed.slice(0, spaceIdx).toLowerCase() : trimmed.toLowerCase();
      const args = spaceIdx > 0 ? trimmed.slice(spaceIdx + 1).trim() : '';

      if (cmd === '/help') {
        const localLines = LOCAL_COMMANDS.map(c => `${c.cmd} - ${c.desc}`).join('\n');
        const skillLines = skills.map(s => `/${s.name} - ${s.description || ''}`).join('\n');
        const builtins = '/compact, /config, /cost, /doctor, /init, /login, /logout, /memory, /model, /permissions, /review, /vim';
        fetch('/api/bus/events', { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agent: 'system', project: projectKey, event: 'help', message: `Local:\n${localLines}\n\nCustom skills (${skills.length}):\n${skillLines}\n\nClaude Code built-in:\n${builtins}\n\nAny other /command or text is forwarded to the active Claude session.` })
        }).then(() => fetch('/api/bus/events?limit=20').then(r => r.json()).then(evts => { if (Array.isArray(evts)) { busEventsRef.current = evts; setBusEvents(evts); } }));
        setMsg('');
        setTab('bus');
        return;
      }

      if (cmd === '/clear') { setTranscript([]); setMsg(''); return; }
      if (cmd === '/status') { loadTranscript(); setMsg(''); return; }
      if (cmd === '/open') {
        fetch('/api/resume-terminal', { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: w.sessionId })
        });
        setMsg('');
        return;
      }
      if (cmd === '/connect') {
        spawnHeadless();
        setMsg('');
        return;
      }

      sendToSession(`${cmd} ${args}`.trim());
      logEvent('command', `${cmd} ${args}`.trim());
      setMsg('');
      return;
    }

    sendToSession(trimmed);
    logEvent('message_sent', trimmed.slice(0, 80));
    setMsg('');
  };

  const updateSlashHints = (val) => {
    setMsg(val);
    if (val.startsWith('/') && !val.includes(' ')) {
      const q = val.toLowerCase();
      const builtins = ['/compact', '/config', '/cost', '/doctor', '/init', '/login', '/logout', '/memory', '/model', '/permissions', '/review', '/vim'].filter(c => c.startsWith(q)).map(c => ({ cmd: c, desc: 'Claude Code built-in' }));
      const matches = [...LOCAL_COMMANDS.filter(c => c.cmd.startsWith(q)), ...skills.filter(s => `/${s.name}`.startsWith(q)).map(s => ({ cmd: `/${s.name}`, desc: s.description || s.lang })), ...builtins];
      setSlashHints(matches.slice(0, 6));
    } else {
      setSlashHints([]);
    }
  };

  const projEvents = busEvents.filter(e => e.project === projectKey);

  return (
    <div className="term-view" onClick={e => e.stopPropagation()}
      onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('drop-highlight'); }}
      onDragLeave={e => { e.currentTarget.classList.remove('drop-highlight'); }}
      onDrop={e => {
        e.preventDefault(); e.currentTarget.classList.remove('drop-highlight');
        try {
          const item = JSON.parse(e.dataTransfer.getData('text/plain'));
          const msgText = item.type === 'skill' ? `Skill assigned: ${item.name} (${item.lang}) - ${item.desc}` : `Project linked: ${item.name}`;
          fetch('/api/bus/events', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ agent: 'mission-control', project: w.projectSlug || 'unknown', event: item.type === 'skill' ? 'skill_assigned' : 'project_linked', message: msgText })
          }).then(() => fetch('/api/bus/events?limit=20').then(r => r.json()).then(evts => { if (Array.isArray(evts)) { busEventsRef.current = evts; setBusEvents(evts); } }));
        } catch {}
      }}>
      <div className="term-header" style={dragStart ? { cursor: 'grab' } : undefined} onMouseDown={dragStart} onTouchStart={dragStart}>
        <div className="term-dots">
          <div className="term-dot" style={{ background: '#ff5f57' }} />
          <div className="term-dot" style={{ background: '#febc2e' }} />
          <div className="term-dot" style={{ background: '#28c840' }} />
        </div>
        <div className="term-title-wrap">
          {editingTitle ? (
            <input className="term-title-edit" autoFocus value={titleDraft}
              onChange={e => setTitleDraft(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') saveTitle(titleDraft); if (e.key === 'Escape') setEditingTitle(false); }}
              onBlur={() => saveTitle(titleDraft)} />
          ) : (
            <div className="term-title anon-blur" style={{ cursor: 'pointer' }} onClick={() => { setEditingTitle(true); setTitleDraft(displayTitle); }}>
              {displayTitle} <span style={{ font: '9px var(--sans)', color: 'rgba(255,255,255,.2)', marginLeft: 4 }}>edit</span>
            </div>
          )}
          <div className="term-subtitle anon-blur">{w.projectName || 'Session'}</div>
        </div>
        <button className="term-close" onClick={onClose}>&times;</button>
      </div>

      <div className="term-status">
        <div className="term-status-dot" style={{ background: terminalId ? '#10b981' : ['#10b981','#3b82f6','#f59e0b','#8b5cf6'][workerIdx] }} />
        <div className="term-status-info"><b>{terminalId ? 'Connected' : 'Active'}</b></div>
        <div style={{ flex: 1 }} />
        {!terminalId && (
          <button style={{ padding: '6px 12px', borderRadius: 8, border: '1px solid rgba(16,185,129,.3)', background: 'rgba(16,185,129,.1)', color: '#10b981', font: '600 10px var(--sans)', cursor: 'pointer', marginRight: 6 }}
            onClick={spawnHeadless}>Connect</button>
        )}
        {terminalId && (
          <button style={{ padding: '6px 12px', borderRadius: 8, border: '1px solid rgba(239,68,68,.3)', background: 'rgba(239,68,68,.1)', color: '#ef4444', font: '600 10px var(--sans)', cursor: 'pointer', marginRight: 6 }}
            onClick={() => { fetch(`/api/terminal/${terminalId}/kill`, { method: 'POST' }); setTerminalId(null); setTermOutput([]); }}>Disconnect</button>
        )}
        <button style={{ padding: '6px 16px', borderRadius: 8, border: 'none', background: 'linear-gradient(135deg, #5B5FE6, #818cf8)', color: '#fff', font: '600 11px var(--sans)', cursor: 'pointer', letterSpacing: '.01em', boxShadow: '0 2px 8px rgba(99,102,241,.3)' }}
          onClick={() => {
            if (w.sessionId) fetch('/api/resume-terminal', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId: w.sessionId }) });
          }}>Open Terminal</button>
      </div>

      <div className="term-tabs">
        <div className={'term-tab' + (tab === 'chat' ? ' on' : '')} onClick={() => setTab('chat')}>Chat</div>
        <div className={'term-tab' + (tab === 'bus' ? ' on' : '')} onClick={() => setTab('bus')}>Events{projEvents.length > 0 ? ` (${projEvents.length})` : ''}</div>
      </div>

      <div className="term-body" ref={bodyRef}>
        {tab === 'chat' && (
          <>
            {terminalId && termOutput.length > 0 && (
              <div style={{ borderBottom: '1px solid rgba(99,102,241,.15)', marginBottom: 4, paddingBottom: 4 }}>
                <div style={{ font: '600 9px var(--sans)', color: '#10b981', padding: '4px 8px', textTransform: 'uppercase', letterSpacing: '.05em' }}>Live Terminal ({terminalId})</div>
                {termOutput.slice(-40).filter(c => c.type !== 'status').map((chunk, i) => {
                  const colors = { stderr: '#f59e0b', stdin: '#818cf8', error: '#ef4444', done: '#6b7280' };
                  const color = colors[chunk.type] || 'rgba(255,255,255,.85)';
                  let text = '';
                  if (chunk.type === 'stdin') text = '> ' + chunk.text;
                  else if (chunk.type === 'done') text = chunk.code === 0 ? '' : `Exit code ${chunk.code}`;
                  else if (chunk.type === 'error') text = 'Error: ' + chunk.text;
                  else text = chunk.text || '';
                  if (!text) return null;
                  return (
                    <div key={i} style={{ padding: '2px 8px', font: '11px var(--mono)', color, whiteSpace: 'pre-wrap', wordBreak: 'break-all', opacity: chunk.type === 'stdin' ? .7 : 1 }}>
                      {text}
                    </div>
                  );
                })}
              </div>
            )}
            {!terminalId && transcript.length > 0 ? transcript.map((m, i) => (
              <div key={i} className="term-msg">
                <div className={'term-msg-role ' + m.role}>{m.role}</div>
                {m.parts.map((p, j) => {
                  if (p.type === 'text') return <div key={j} className="term-msg-text">{p.text}</div>;
                  if (p.type === 'tool_use') return <div key={j} className="term-msg-tool"><b>{p.name}</b> {p.input?.slice(0, 200)}</div>;
                  if (p.type === 'thinking') return <div key={j} className="term-msg-thinking">{p.thinking?.slice(0, 300)}</div>;
                  return null;
                })}
              </div>
            )) : !terminalId && (
              <div className="term-empty" style={{ opacity: .4 }}>{loading ? '' : 'Type a message to connect'}</div>
            )}
            {loading && !terminalId && <div style={{ textAlign: 'center', padding: '6px 0' }}><span style={{ display: 'inline-block', width: 12, height: 12, border: '2px solid rgba(129,140,248,.3)', borderTopColor: '#818cf8', borderRadius: '50%', animation: 'sp .6s linear infinite' }} /></div>}
          </>
        )}

        {tab === 'bus' && (
          projEvents.length === 0 ? <div className="term-empty">No events yet.</div> :
          projEvents.map(e => (
            <div key={e.id} className="term-bus-item">
              <div style={{ width: 5, height: 5, borderRadius: 3, background: e.event === 'message_sent' ? '#818cf8' : e.event === 'handoff_sent' ? '#f59e0b' : '#10b981', marginTop: 5, flexShrink: 0 }} />
              <div style={{ flex: 1 }}>
                <div className="term-bus-agent">{e.agent}</div>
                <div className="term-bus-msg">{e.message || e.event}</div>
                <div className="term-bus-time">{rel(new Date(e.ts).toISOString())}</div>
              </div>
            </div>
          ))
        )}

      </div>

      <div className="term-input-area">
        {slashHints.length > 0 && (
          <div style={{ background: 'rgba(15,15,30,.95)', border: '1px solid rgba(99,102,241,.3)', borderRadius: '8px 8px 0 0', borderBottom: 'none', padding: 4 }}>
            {slashHints.map(h => (
              <div key={h.cmd} style={{ padding: '4px 8px', cursor: 'pointer', borderRadius: 4, font: '11px var(--mono)', color: '#a5b4fc', display: 'flex', gap: 8, alignItems: 'center' }}
                onClick={() => { setMsg(h.cmd + ' '); setSlashHints([]); }}
                onMouseOver={e => e.currentTarget.style.background = 'rgba(99,102,241,.15)'}
                onMouseOut={e => e.currentTarget.style.background = 'transparent'}>
                <span style={{ color: '#818cf8', fontWeight: 600 }}>{h.cmd}</span>
                <span style={{ color: 'rgba(255,255,255,.35)', font: '10px var(--sans)' }}>{h.desc}</span>
              </div>
            ))}
          </div>
        )}
        <div className="term-input-row">
          <textarea className="term-input" rows={1} placeholder="Type / for commands, or send a message..." value={msg}
            onChange={e => updateSlashHints(e.target.value)}
            onKeyDown={e => {
              if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
              if (e.key === 'Tab' && slashHints.length > 0) { e.preventDefault(); setMsg(slashHints[0].cmd + ' '); setSlashHints([]); }
              if (e.key === 'Escape') setSlashHints([]);
            }} />
          <button className="term-send" disabled={!msg.trim()} onClick={handleSend}>Send</button>
        </div>
      </div>
    </div>
  );
}
