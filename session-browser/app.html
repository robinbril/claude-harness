      robot.group.userData.baseScale = .85;
      scene.add(robot.group);
      agentRobots.push(robot);
    }

    const deskWorkers = [];
    const workerPals = [
      { body: '#10b981', glow: '#34d399', accent: '#a7f3d0' },
      { body: '#3b82f6', glow: '#60a5fa', accent: '#bfdbfe' },
      { body: '#f59e0b', glow: '#fbbf24', accent: '#fde68a' },
      { body: '#8b5cf6', glow: '#a78bfa', accent: '#ddd6fe' },
      { body: '#ec4899', glow: '#f472b6', accent: '#fbcfe8' },
      { body: '#14b8a6', glow: '#2dd4bf', accent: '#99f6e4' },
      { body: '#f97316', glow: '#fb923c', accent: '#fed7aa' },
      { body: '#6366f1', glow: '#818cf8', accent: '#c7d2fe' },
    ];
    const workerPositions = [
      [-6.5, -1, -3],  [-2.5, -1, -3],  [1.5, -1, -3],  [5.5, -1, -3],
      [-6.5, -1, 2],   [-2.5, -1, 2],   [1.5, -1, 2],   [5.5, -1, 2],
    ];
    for (let wi = 0; wi < 8; wi++) {
      const dw = buildDeskWorker(workerPals[wi], wi);
      dw.group.position.set(...workerPositions[wi]);
      dw.group.scale.setScalar(.9);
      dw.group.rotation.y = workerPositions[wi][2] < 0 ? 0 : Math.PI;
      dw.group.visible = true;
      const deskGlow = new T.Mesh(
        new T.CircleGeometry(.75, 16),
        new T.MeshBasicMaterial({ color: workerPals[wi].glow, transparent: true, opacity: 0, side: T.DoubleSide })
      );
      deskGlow.rotation.x = -Math.PI / 2;
      deskGlow.position.set(workerPositions[wi][0], -.99, workerPositions[wi][2]);
      scene.add(deskGlow);
      dw.deskGlow = deskGlow;
      scene.add(dw.group);
      deskWorkers.push(dw);
    }

    const connLines = [];
    const connLineMat = new T.LineBasicMaterial({ color: 0x818cf8, transparent: true, opacity: 0 });
    for (let i = 0; i < 8; i++) {
      for (let j = i + 1; j < 8; j++) {
        const geo = new T.BufferGeometry().setFromPoints([new T.Vector3(), new T.Vector3()]);
        const line = new T.Line(geo, connLineMat);
        line.visible = false;
        line.userData = { i, j };
        scene.add(line);
        connLines.push(line);
      }
    }

    const raycaster = new T.Raycaster();
    const mouse = new T.Vector2();
    let hoveredIdx = -1;
    let hoveredCenter = false;

    // Click marker ring on floor
    const clickMarkerGeo = new T.RingGeometry(.15, .22, 24);
    const clickMarkerMat = new T.MeshBasicMaterial({ color: 0x818cf8, transparent: true, opacity: 0, side: T.DoubleSide });
    const clickMarker = new T.Mesh(clickMarkerGeo, clickMarkerMat);
    clickMarker.rotation.x = -Math.PI / 2;
    clickMarker.position.y = -.98;
    scene.add(clickMarker);
    let clickMarkerFade = 0;

    // === CAMERA LERP SYSTEM ===
    let camTarget = null;
    let camLerping = false;
    const camLerpSpeed = 0.04;
    const defaultCamPos = { x: 0, y: 5.5, z: 12 };
    const defaultCamTarget = { x: 0, y: 0, z: -1 };
    function focusCamera(worldPos, offset) {
      const ox = offset?.x || 0, oy = offset?.y || 1.8, oz = offset?.z || 3.5;
      camTarget = {
        x: worldPos.x + ox, y: worldPos.y + oy, z: worldPos.z + oz,
        tx: worldPos.x, ty: Math.max(worldPos.y, -0.4), tz: worldPos.z
      };
      camLerping = true;
    }
    function resetCamera() { camTarget = null; camLerping = false; }
    function resetToDefaultView() {
      camTarget = { ...defaultCamPos, tx: defaultCamTarget.x, ty: defaultCamTarget.y, tz: defaultCamTarget.z };
      camLerping = true;
      setTimeout(() => { camLerping = false; camTarget = null; }, 2000);
    }

    // === SCREEN SHAKE SYSTEM ===
    let shakeIntensity = 0;
    let shakeDecay = 0.92;
    function triggerShake(intensity) { shakeIntensity = intensity || 0.06; }

    // === FLASH OVERLAY ===
    const flashGeo = new T.PlaneGeometry(40, 40);
    const flashMat = new T.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, side: T.DoubleSide, depthTest: false });
    const flashMesh = new T.Mesh(flashGeo, flashMat);
    flashMesh.position.set(0, 0, 7);
    flashMesh.renderOrder = 999;
    scene.add(flashMesh);
    let flashLife = 0;
    function triggerFlash(color, intensity) {
      flashMat.color.setHex(color || 0xffffff);
      flashLife = intensity || 0.35;
    }

    // === MINIMAP ===
    const minimapSize = 140;
    const minimapCanvas = document.createElement('canvas');
    minimapCanvas.width = minimapSize; minimapCanvas.height = minimapSize;
    minimapCanvas.className = 'minimap-canvas';
    const mmCtx = minimapCanvas.getContext('2d');

    function drawMinimap() {
      const s = minimapSize;
      mmCtx.clearRect(0, 0, s, s);
      // Background
      mmCtx.fillStyle = 'rgba(26, 26, 46, 0.85)';
      mmCtx.beginPath();
      if (mmCtx.roundRect) { mmCtx.roundRect(0, 0, s, s, 8); } else { mmCtx.rect(0, 0, s, s); }
      mmCtx.fill();
      // Room outline
      mmCtx.strokeStyle = 'rgba(99, 102, 241, 0.3)';
      mmCtx.lineWidth = 1;
      const mapX = (wx) => (wx + 8) / 16 * (s - 20) + 10;
      const mapZ = (wz) => (wz + 6) / 12 * (s - 20) + 10;
      mmCtx.strokeRect(mapX(-8), mapZ(-6), mapX(8) - mapX(-8), mapZ(6) - mapZ(-6));
      // Platform
      mmCtx.fillStyle = 'rgba(99, 102, 241, 0.1)';
      mmCtx.fillRect(mapX(-5), mapZ(-5), mapX(5) - mapX(-5), mapZ(0) - mapZ(-5));
      // Desk positions
      for (let wi = 0; wi < deskWorkers.length; wi++) {
        const wp = workerPositions[wi];
        const dx = mapX(wp[0]), dz = mapZ(wp[2]);
        const hasW = wi < (activeWorkersRef?.current?.length || 0);
        mmCtx.fillStyle = hasW ? 'rgba(16, 185, 129, 0.8)' : 'rgba(127, 127, 127, 0.4)';
        mmCtx.fillRect(dx - 4, dz - 3, 8, 6);
      }
      // Center robot
      mmCtx.fillStyle = 'rgba(251, 191, 36, 0.9)';
      mmCtx.beginPath();
      mmCtx.arc(mapX(centerRobot.group.position.x), mapZ(centerRobot.group.position.z), 4, 0, Math.PI * 2);
      mmCtx.fill();
      // Orchestrator robots
      const selIdx = clickedAgentIdxRef?.current;
      for (let i = 0; i < agentRobots.length; i++) {
        const g = agentRobots[i].group;
        const rx = mapX(g.position.x), rz = mapZ(g.position.z);
        const col = g.userData.color || '#6366f1';
        mmCtx.fillStyle = i === selIdx ? '#ffffff' : col;
        mmCtx.beginPath();
        mmCtx.arc(rx, rz, i === selIdx ? 4 : 3, 0, Math.PI * 2);
        mmCtx.fill();
        if (i === selIdx) {
          mmCtx.strokeStyle = col;
          mmCtx.lineWidth = 1.5;
          mmCtx.beginPath();
          mmCtx.arc(rx, rz, 6, 0, Math.PI * 2);
          mmCtx.stroke();
        }
      }
      // Camera direction indicator
      const cx = mapX(camera.position.x * 0.5), cz = mapZ(camera.position.z * 0.5);
      mmCtx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      mmCtx.beginPath();
      const camAngle = Math.atan2(camera.position.x, camera.position.z);
      mmCtx.moveTo(cx + Math.sin(camAngle) * 5, cz + Math.cos(camAngle) * 5);
      mmCtx.lineTo(cx + Math.sin(camAngle - 0.5) * 2, cz + Math.cos(camAngle - 0.5) * 2);
      mmCtx.lineTo(cx + Math.sin(camAngle + 0.5) * 2, cz + Math.cos(camAngle + 0.5) * 2);
      mmCtx.closePath();
      mmCtx.fill();
      // Label
      mmCtx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      mmCtx.font = '8px Roboto, sans-serif';
      mmCtx.fillText('RADAR', 10, s - 6);
    }

    // Interaction pulse rings (spawn on robot click)
    const pulseRings = [];
    function spawnPulse(x, z, color, yOverride) {
      const geo = new T.RingGeometry(.01, .06, 20);
      const mat = new T.MeshBasicMaterial({ color, transparent: true, opacity: .8, side: T.DoubleSide });
      const ring = new T.Mesh(geo, mat);
      ring.rotation.x = -Math.PI / 2;
      const surfaceY = yOverride !== undefined ? yOverride : (z > -2 && z < 3 ? -.73 : -.97);
      ring.position.set(x, surfaceY, z);
      scene.add(ring);
      pulseRings.push({ mesh: ring, life: 1.0, speed: 1.5 });
    }

    // Particle trail system for Send to Desk / communication
    const trailParticles = [];
    const floorGlows = [];
    function spawnTrail(fromX, fromZ, toX, toZ, color, count) {
      for (let i = 0; i < count; i++) {
        const geo = new T.SphereGeometry(.025, 6, 4);
        const mat = new T.MeshBasicMaterial({ color, transparent: true, opacity: .9 });
        const p = new T.Mesh(geo, mat);
        p.position.set(fromX, .5, fromZ);
        scene.add(p);
        trailParticles.push({
          mesh: p, fromX, fromZ, toX, toZ,
          progress: -i * .12, speed: 1.8 + Math.random() * .6,
          wobble: Math.random() * Math.PI * 2,
          color
        });
      }
    }

    // Live worker monitor drawing (replaces fake code bars)
    const ACOLS = { read: '#34d399', write: '#f59e0b', tool: '#60a5fa', error: '#ef4444' };
    const WACCENT = ['#34d399', '#60a5fa', '#fbbf24', '#a78bfa', '#f472b6', '#2dd4bf', '#fb923c', '#818cf8'];
    function drawWorkerMonitor(ctx, actData, wi, t) {
      const W = 256, H = 160;
      ctx.fillStyle = 'rgba(6, 8, 20, 0.97)';
      ctx.fillRect(0, 0, W, H);
      const accent = WACCENT[wi % 8];

      if (!actData || !actData.tools || actData.tools.length === 0) {
        for (let li = 0; li < 9; li++) {
          const indent = Math.floor(Math.abs(Math.sin(li * 2.3 + t * .3)) * 3) * 10;
          const w = 30 + Math.abs(Math.sin(li * 3.7 + t * .5)) * 120;
          ctx.fillStyle = accent;
          ctx.globalAlpha = .2 + Math.abs(Math.sin(li * 1.5 + t * .4)) * .2;
          ctx.fillRect(6 + indent, 8 + li * 16, w, 7);
        }
        ctx.globalAlpha = 1;
        return;
      }

      ctx.fillStyle = actData.status === 'error' ? '#ef4444' : accent;
      ctx.globalAlpha = 0.9;
      ctx.fillRect(4, 4, 6, 6);
      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(255,255,255,.35)';
      ctx.font = '500 9px monospace';
      ctx.fillText('W' + (wi + 1), 14, 12);
      if (actData.lastToolAt) {
        const age = Math.max(0, Math.floor((Date.now() - new Date(actData.lastToolAt).getTime()) / 1000));
        ctx.fillText(age + 's', W - 28, 12);
      }

      const tools = actData.tools.slice(0, 5);
      tools.forEach((tool, ti) => {
        const y = 22 + ti * 26;
        const col = ACOLS[tool.action] || '#818cf8';
        const alpha = 1 - ti * 0.15;
        ctx.fillStyle = col;
        ctx.globalAlpha = alpha * 0.8;
        ctx.fillRect(4, y, 3, 18);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = col;
        ctx.font = '600 9px monospace';
        ctx.fillText(tool.name.slice(0, 12), 10, y + 9);
        ctx.fillStyle = 'rgba(255,255,255,.4)';
        ctx.font = '400 7px monospace';
        const _sum = document.documentElement.classList.contains('anon') ? '██████████' : (tool.inputSummary || '').replace(/"/g, '').slice(0, 32);
        ctx.fillText(_sum, 10, y + 19);
      });

      ctx.globalAlpha = 0.15 + Math.abs(Math.sin(t * 2 + wi)) * 0.1;
      ctx.fillStyle = accent;
      const scanY = 22 + tools.length * 26 + Math.abs(Math.sin(t * 1.5 + wi)) * 12;
      ctx.fillRect(4, Math.min(scanY, H - 6), W - 8, 1);
      ctx.globalAlpha = 1;
    }

    const onClick = (e) => {
      const rect = container.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const centerHits = raycaster.intersectObject(centerRobot.group, true);
      if (centerHits.length > 0) {
        setShowCreate(true);
        setClickedAgentIdx(null);
        spawnPulse(centerRobot.group.position.x, centerRobot.group.position.z, 0xfbbf24);
        return;
      }

      let closest = -1;
      let closestDist = Infinity;
      for (let i = 0; i < agentRobots.length; i++) {
        const hits = raycaster.intersectObject(agentRobots[i].group, true);
        if (hits.length > 0 && hits[0].distance < closestDist) {
          closestDist = hits[0].distance;
          closest = i;
        }
      }
      if (closest >= 0) {
        const wasSelected = clickedAgentIdxRef.current === closest;
        setClickedAgentIdx(prev => prev === closest ? null : closest);
        setClickedWorkerIdx(null);
        const rg = agentRobots[closest].group;
        spawnPulse(rg.position.x, rg.position.z, parseInt(rg.userData.color?.replace('#','') || '6366f1', 16));
        // No auto-camera on select - user controls the view
        return;
      }

      let closestWorker = -1;
      let closestWorkerDist = Infinity;
      for (let wi = 0; wi < deskWorkers.length; wi++) {
        const hits = raycaster.intersectObject(deskWorkers[wi].group, true);
        if (hits.length > 0 && hits[0].distance < closestWorkerDist) {
          closestWorkerDist = hits[0].distance;
          closestWorker = wi;
        }
      }
      if (closestWorker >= 0) {
        const selAgent = clickedAgentIdxRef.current;
        if (selAgent !== null) {
          const orchList = orchestratorsRef.current;
          const orch = orchList[selAgent];
          if (orch) {
            const slot = closestWorker;
            const agentList = orch.agents.map(a => a.name).join(', ');
            const coordPrompt = [
              `You are the ${orch.name} orchestrator running in Coordinator Mode.`,
              `You have ${orch.agents.length} sub-agents available: ${agentList}.`,
              ``,
              `COORDINATOR MODE (collab):`,
              `- Dispatch tasks to workers in parallel using the Agent tool with subagent_type matching sub-agent names`,
              `- Track which files each worker is writing to prevent conflicts`,
              `- Run research/analysis tasks in parallel, serialize file writes`,
              `- Monitor worker progress and retry on failure (max 2 retries)`,
              `- Use a scratchpad approach for cross-worker data sharing`,
              `- Report progress after each phase completes`,
              ``,
              `Start by asking what task to coordinate, then break it into parallel sub-tasks for your team.`,
            ].join('\n');
            fetch('/api/resume-terminal', { method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ prompt: coordPrompt, model: 'claude-sonnet-4-6', name: orch.short || orch.name })
            });
            fetch('/api/bus/events', { method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ agent: orch.short || orch.name, project: '', event: 'deployed_to_desk', message: `${orch.name} deployed in collab mode to desk ${slot + 1}` })
            });
            const rg = agentRobots[selAgent]?.group;
            const wp = workerPositions[slot];
            const deployColor = parseInt(orch.color?.replace('#','') || '6366f1', 16);
            if (rg && wp) {
              spawnTrail(rg.position.x, rg.position.z, wp[0], wp[2], deployColor, 14);
              rg.userData.walkTarget = { x: wp[0], z: wp[2] };
              rg.userData.walkTargetTime = Date.now();
            }
            spawnPulse(wp[0], wp[2], 0x10b981);
            spawnPulse(wp[0], wp[2], deployColor);
            triggerShake(0.08);
            triggerFlash(deployColor, 0.25);
            SoundFX.deploy();
            const aid = Date.now() + '-deploy';
            setAlerts(prev => [...prev, { id: aid, worker: orch.name, workerIdx: slot, text: `Deployed to desk ${slot + 1}`, ts: Date.now() }]);
            setTimeout(() => setAlerts(prev => prev.filter(x => x.id !== aid)), 5000);
            setGameChat(prev => [...prev, { id: aid, worker: orch.name, workerIdx: slot, text: `Deployed to desk ${slot + 1}`, ts: Date.now() }].slice(-30));
            setClickedAgentIdx(null);
          }
          return;
        }
        // Routing mode: route output from source worker to this target
        const routeFrom = routingFromIdxRef.current;
        if (routeFrom !== null && routeFrom !== closestWorker) {
          const workers = activeWorkersRef.current;
          const fromW = workers[routeFrom];
          const toW = workers[closestWorker];
          if (fromW?.sessionId && toW?.sessionId) {
            fetch('/api/route', { method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ fromSessionId: fromW.sessionId, toSessionId: toW.sessionId, toPath: toW.projectPath })
            }).then(r => r.json()).then(d => {
              if (d.ok && d.prompt) {
                fetch('/api/resume-terminal', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ sessionId: toW.sessionId, prompt: d.prompt })
                });
                const fromPos = workerPositions[routeFrom];
                const toPos = workerPositions[closestWorker];
                if (fromPos && toPos) spawnTrail(fromPos[0], fromPos[2], toPos[0], toPos[2], 0xf59e0b, 10);
                spawnPulse(toPos[0], toPos[2], 0xf59e0b);
                SoundFX.deploy();
                const rid = Date.now() + '-route';
                setGameChat(prev => [...prev, { id: rid, worker: 'Router', workerIdx: closestWorker, text: `Routed context from desk ${routeFrom + 1} to desk ${closestWorker + 1}`, ts: Date.now() }].slice(-30));
                setAlerts(prev => [...prev, { id: rid, worker: 'Router', workerIdx: closestWorker, text: `Context routed to desk ${closestWorker + 1}`, ts: Date.now() }]);
                setTimeout(() => setAlerts(prev => prev.filter(x => x.id !== rid)), 5000);
              }
            }).catch(() => {});
            setRoutingFromIdx(null);
            return;
          }
        }
        if (multiTermMode) {
          setMultiTermWorkers(prev => prev.includes(closestWorker) ? prev.filter(x => x !== closestWorker) : prev.length < 4 ? [...prev, closestWorker] : prev);
        } else {
          setClickedWorkerIdx(prev => prev === closestWorker ? null : closestWorker);
          setClickedAgentIdx(null);
        }
        return;
      }

      // Click on clock: toggle break scheduler
      const clockHits = raycaster.intersectObject(clockGroup, true);
      if (clockHits.length > 0) {
        setShowBreakScheduler(prev => !prev);
        spawnPulse(4.5, -5.94, 0xfbbf24);
        SoundFX.click();
        return;
      }

      // Click on dream button: trigger dream mode
      const dreamHits = raycaster.intersectObject(dreamGroup, true);
      if (dreamHits.length > 0) {
        triggerDream();
        spawnPulse(-7.95, -2, 0xef4444);
        return;
      }

      // Click on 3D skill shelf: toggle skill rack
      const shelfHits = raycaster.intersectObject(shelfGroup, true);
      if (shelfHits.length > 0) {
        setShowRack(prev => !prev);
        spawnPulse(9.5, -1, 0x818cf8);
        return;
      }

      const hudHits = raycaster.intersectObject(hudBoard, false);
      if (hudHits.length > 0) {
        setShowHudPanel(prev => !prev);
        spawnPulse(-9.95, -2, 0x6366f1);
        SoundFX.click();
        return;
      }

      const guideHits = raycaster.intersectObject(guideBoard, false);
      if (guideHits.length > 0) {
        setShowGuidePanel(prev => !prev);
        spawnPulse(7.5, -5.94, 0x818cf8);
        SoundFX.click();
        return;
      }

      const rackHits = raycaster.intersectObjects(rackGroup.children, true);
      if (rackHits.length > 0) {
        setShowSystemPanel(prev => {
          if (!prev) {
            fetch('/api/system/health').then(r => r.json()).then(d => setSystemHealth(d)).catch(() => {});
          }
          return !prev;
        });
        spawnPulse(-5.25, -5.72, 0x34d399);
        SoundFX.click();
        return;
      }

      // Click on floor: walk selected or nearest orchestrator to that spot
      const floorHits = raycaster.intersectObject(floor, false);
      if (floorHits.length > 0) {
        const pt = floorHits[0].point;
        const tx = Math.max(-6, Math.min(6, pt.x));
        const tz = Math.max(-5, Math.min(4, pt.z));

        clickMarker.position.set(tx, -.97, tz);
        clickMarkerFade = 1.0;
        clickMarkerMat.opacity = .6;

        const selAgent = clickedAgentIdxRef.current;
        let walkIdx;
        if (selAgent !== null && selAgent < agentRobots.length) {
          walkIdx = selAgent;
        } else {
          walkIdx = 0;
          let nearestDist = Infinity;
          for (let i = 0; i < agentRobots.length; i++) {
            const rg = agentRobots[i].group;
            const d = Math.hypot(rg.position.x - tx, rg.position.z - tz);
            if (d < nearestDist) { nearestDist = d; walkIdx = i; }
          }
        }
        const ud = agentRobots[walkIdx].group.userData;
        ud.walkTarget = { x: tx, z: tz };
        ud.walkTargetTime = Date.now();
        const walkColor = parseInt(agentRobots[walkIdx].group.userData.color?.replace('#','') || '6366f1', 16);
        spawnPulse(tx, tz, walkColor);
        // Don't deselect when walking a selected agent
        if (selAgent === null) {
          setClickedAgentIdx(null);
          setClickedWorkerIdx(null);
        }
        return;
      }

      setClickedAgentIdx(null);
      setClickedWorkerIdx(null);
    };

    let lastRaycastTime = 0;
    const onMouseMove = (e) => {
      const rect = container.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      const now = performance.now();
      if (now - lastRaycastTime < 50) return;
      lastRaycastTime = now;

      raycaster.setFromCamera(mouse, camera);

      const centerHits = raycaster.intersectObject(centerRobot.group, true);
      hoveredCenter = centerHits.length > 0;

      let found = -1;
      let closestDist = Infinity;
      for (let i = 0; i < agentRobots.length; i++) {
        const hits = raycaster.intersectObject(agentRobots[i].group, true);
        if (hits.length > 0 && hits[0].distance < closestDist) {
          closestDist = hits[0].distance;
          found = i;
        }
      }
      hoveredIdx = found;
      const shelfHover = raycaster.intersectObject(shelfGroup, true).length > 0;
      let workerHover = false;
      let deskHover = false;
      for (let wi = 0; wi < deskWorkers.length; wi++) {
        if (raycaster.intersectObject(deskWorkers[wi].group, true).length > 0) {
          deskHover = true;
          if (clickedAgentIdxRef.current !== null) workerHover = true;
          break;
        }
      }
      const rackHover = raycaster.intersectObjects(rackGroup.children, true).length > 0;
      container.style.cursor = workerHover ? 'crosshair' : (found >= 0 || hoveredCenter || shelfHover || deskHover || rackHover) ? 'pointer' : 'default';
    };

    container.addEventListener('click', onClick);
    container.addEventListener('mousemove', onMouseMove);

    let frameId;
    const clock = new T.Clock();
    const tmpVec = new T.Vector3();
    const tmpColor = new T.Color();
    const tmpScale = new T.Vector3();
    const tagPositionsPool = [];
    let tagPositionsLen = 0;
    const floorGlowGeo = new T.CircleGeometry(.06, 6);
    const TARGET_FPS = 20;
    const FRAME_INTERVAL = 1000 / TARGET_FPS;
    let lastFrameTime = 0;

    const animate = (now) => {
      frameId = requestAnimationFrame(animate);
      if (modeRef.current !== 'game') return;
      const elapsed = now - lastFrameTime;
      if (elapsed < FRAME_INTERVAL) return;
      lastFrameTime = now - (elapsed % FRAME_INTERVAL);
      const t = clock.getElapsedTime();

      if (Math.floor(t * 5) % 2 === 0) {
        const pArr = particles.geometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
          pArr[i * 3 + 1] += .002;
          if (pArr[i * 3 + 1] > 4) { pArr[i * 3 + 1] = -1; pArr[i * 3] = (Math.random() - .5) * 12; pArr[i * 3 + 2] = (Math.random() - .5) * 10; }
        }
        particles.geometry.attributes.position.needsUpdate = true;
      }
      particles.rotation.y = t * .003;

      if (Math.floor(t * .5) !== Math.floor((t - .042) * .5)) {
        updateStatsBoard();
        updateHudBoard();
        updateTimerBoard();
        const wallClock = new Date();
        const h = wallClock.getHours() % 12, m = wallClock.getMinutes(), s = wallClock.getSeconds();
        hourHand.rotation.z = -((h + m / 60) / 12) * Math.PI * 2;
        minHand.rotation.z = -(m / 60) * Math.PI * 2;
        secHand.rotation.z = -(s / 60) * Math.PI * 2;
        const hour24 = wallClock.getHours() + m / 60;
        const dayPhase = hour24 < 6 ? 0 : hour24 < 9 ? (hour24 - 6) / 3 : hour24 < 17 ? 1 : hour24 < 20 ? 1 - (hour24 - 17) / 3 : 0;
        const ambIntensity = 0.8 + dayPhase * 0.8;
        const ambR = (0.6 + dayPhase * 0.31), ambG = (0.55 + dayPhase * 0.37), ambB = (0.7 + dayPhase * 0.3);
        ambLight.intensity = ambIntensity;
        ambLight.color.setRGB(ambR, ambG, ambB);
        dirLight.intensity = 0.8 + dayPhase * 1.0;
        scene.fog.density = 0.018 - dayPhase * 0.006;
        renderer.setClearColor(clearColor.setRGB(0.17 + dayPhase * 0.06, 0.17 + dayPhase * 0.06, 0.27 + dayPhase * 0.07));
      }
      statsBorderMat.opacity = .4 + Math.sin(t * .8) * .1;
      dreamTop.material.emissiveIntensity = .4 + Math.sin(t * 2) * .2;
      if (dreamGlow) dreamGlow.intensity = .8 + Math.sin(t * 2) * .4;

      // Click marker fade
      if (clickMarkerFade > 0) {
        clickMarkerFade -= .015;
        clickMarkerMat.opacity = Math.max(0, clickMarkerFade * .6);
        clickMarker.scale.setScalar(1 + (1 - clickMarkerFade) * 1.5);
        clickMarker.rotation.z += .02;
      }

      // Pulse rings expand and fade
      for (let pi = pulseRings.length - 1; pi >= 0; pi--) {
        const pr = pulseRings[pi];
        pr.life -= .02 * pr.speed;
        if (pr.life <= 0) {
          scene.remove(pr.mesh);
          pr.mesh.geometry.dispose(); pr.mesh.material.dispose();
          pulseRings.splice(pi, 1);
        } else {
          const s = 1 + (1 - pr.life) * 4;
          pr.mesh.scale.setScalar(s);
          pr.mesh.material.opacity = pr.life * .6;
        }
      }

      // Trail particles move from source to target
      for (let ti = trailParticles.length - 1; ti >= 0; ti--) {
        const tp = trailParticles[ti];
        tp.progress += .016 * tp.speed;
        if (tp.progress > 1.2) {
          scene.remove(tp.mesh);
          tp.mesh.geometry.dispose(); tp.mesh.material.dispose();
          trailParticles.splice(ti, 1);
        } else if (tp.progress >= 0) {
          const p = Math.min(tp.progress, 1);
          const ease = p < .5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
          tp.mesh.position.x = tp.fromX + (tp.toX - tp.fromX) * ease + Math.sin(tp.wobble + t * 4) * .08 * (1 - p);
          tp.mesh.position.z = tp.fromZ + (tp.toZ - tp.fromZ) * ease + Math.cos(tp.wobble + t * 4) * .08 * (1 - p);
          tp.mesh.position.y = -.5 + Math.sin(p * Math.PI) * .6;
          tp.mesh.material.opacity = p < .1 ? p * 9 : p > .9 ? (1 - p) * 10 : .9;
        }
      }

      const cg = centerRobot.group;
      cg.position.y = -0.685 + Math.sin(t * .8) * .05;
      cg.rotation.y = t * .1;
      const cs = .7 + Math.sin(t * 1.5) * .02;
      cg.scale.setScalar(hoveredCenter ? cs * 1.1 : cs);
      const cud = cg.userData;
      if (cud.ring) {
        cud.ring.rotation.z = t * .8;
        cud.ring.material.opacity = .45 + Math.sin(t * 2) * .15;
      }
      if (cud.leftArm) {
        cud.leftArm.rotation.x = Math.sin(t * .9) * .1;
        cud.rightArm.rotation.x = Math.sin(t * .9 + Math.PI) * .1;
      }
      if (cud.head) {
        cud.head.rotation.y = Math.sin(t * .5) * .08;
      }
      if (cud.leftPupil && cud.rightPupil) {
        const lx = mouse.x * .03, ly = mouse.y * .015;
        cud.leftPupil.position.x = -.1 + lx;
        cud.leftPupil.position.y = .68 + ly;
        cud.rightPupil.position.x = .1 + lx;
        cud.rightPupil.position.y = .68 + ly;
      }
      // Companion roams room freely as Manager
      const compCv = companionRef.current;
      const compSpeed = compCv?.animSpeed || 1.0;
      const cx = companionRobot.group.position.x;
      const cz = companionRobot.group.position.z;
      const roamNow = Date.now();
      if (roamNow > roamPauseUntil) {
        const dx = roamTarget.x - cx;
        const dz = roamTarget.z - cz;
        const dist = Math.hypot(dx, dz);
        if (dist < .3) {
          roamPauseUntil = roamNow + 2000 + Math.random() * 4000;
          roamIdx = (roamIdx + 1) % roamWaypoints.length;
          roamTarget = roamWaypoints[roamIdx];
        } else {
          const moveSpeed = 0.012 * compSpeed;
          companionRobot.group.position.x += (dx / dist) * moveSpeed;
          companionRobot.group.position.z += (dz / dist) * moveSpeed;
          companionRobot.group.rotation.y = Math.atan2(dx, dz);
        }
      } else {
        companionRobot.group.rotation.y += Math.sin(t * 2) * 0.003;
      }
      companionRobot.group.position.y = -0.75 + Math.sin(t * 1.5 * compSpeed) * .04;
      const compUd = companionRobot.group.userData;
      if (compUd.leftArm) {
        const walking = roamNow > roamPauseUntil;
        const amp = walking ? .3 : (compCv?.armAmplitude || .1);
        const spd = walking ? 4 : 2;
        compUd.leftArm.rotation.x = Math.sin(t * spd * compSpeed) * amp;
        compUd.rightArm.rotation.x = Math.sin(t * spd * compSpeed + Math.PI) * amp;
      }
      if (compUd.head) compUd.head.rotation.y = Math.sin(t * .8) * .15;
      if (now - lastRemarkTime > 90000 + Math.random() * 90000) {
        lastRemarkTime = now;
        const isTip = Math.random() < 0.25;
        const cv2 = companionRef.current;
        const text = isTip
          ? (cv2?.tip || 'Be specific in your prompts.')
          : (cv2?.remark || 'Use more tokens!');
        const id = 'mm-' + now;
        setSpeechBubbles(prev => [...prev, { id, agent: 'Manager', text: (isTip ? 'Tip: ' : '') + text, ts: now }]);
        const fadeDelay = isTip ? 5000 : 3000;
        const removeDelay = isTip ? 6000 : 4000;
        setTimeout(() => setSpeechBubbles(prev => prev.map(b => b.id === id ? { ...b, fading: true } : b)), fadeDelay);
        setTimeout(() => setSpeechBubbles(prev => prev.filter(b => b.id !== id)), removeDelay);
        fetch('/api/companion/visuals').then(r => r.json()).then(d => { if (d) companionRef.current = d; }).catch(() => {});
      }
      // Slow XP drip (every 60s)
      if (now - remarkXpTimer > 60000) {
        remarkXpTimer = now;
        fetch('/api/companion/event', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ event: 'idle' }) }).catch(() => {});
      }

      for (let i = 0; i < agentRobots.length; i++) {
        const rb = agentRobots[i];
        const g = rb.group;
        const ud = g.userData;
        const phase = ud.phaseOffset;
        const isHovered = hoveredIdx === i;

        let tx, tz;

        // Walk target overrides pattern movement
        if (ud.walkTarget) {
          tx = ud.walkTarget.x;
          tz = ud.walkTarget.z;
          const distToTarget = Math.hypot(g.position.x - tx, g.position.z - tz);
          if (distToTarget < .15 || (Date.now() - (ud.walkTargetTime || 0)) > 8000) {
            ud.slotCx = g.position.x;
            ud.slotCz = g.position.z;
            ud.walkTarget = null;
            spawnPulse(g.position.x, g.position.z, 0x818cf8);
          }
        } else {
          const pt = t * ud.patSpd + phase;
          const r = ud.patRange;
          switch (ud.patternType) {
            case 0: tx = ud.slotCx + Math.sin(pt) * r; tz = ud.slotCz + Math.sin(pt * 2.1) * r * .4; break;
            case 1: tx = ud.slotCx + Math.sin(pt) * r * .6; tz = ud.slotCz + Math.cos(pt * .7) * r * .5; break;
          case 2: { const seg = ((pt % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2); const f = seg / (Math.PI * 2);
            if (f < .25) { tx = ud.slotCx + r * (f * 4 - .5); tz = ud.slotCz - r * .3; }
            else if (f < .5) { tx = ud.slotCx + r * .5; tz = ud.slotCz + r * ((f - .25) * 4 - .5) * .6; }
            else if (f < .75) { tx = ud.slotCx + r * (.5 - (f - .5) * 4); tz = ud.slotCz + r * .3; }
            else { tx = ud.slotCx - r * .5; tz = ud.slotCz + r * (.5 - (f - .75) * 4) * .6; }
            break; }
          default: tx = ud.slotCx + Math.sin(pt * 1.3) * r * .5; tz = ud.slotCz + Math.sin(pt * .9 + 1.5) * r * .4; break;
          }
        }
        const walkSpeed = ud.walkTarget ? .065 : .035;
        const dx = tx - g.position.x, dz = tz - g.position.z;
        g.position.x += dx * walkSpeed;
        g.position.z += dz * walkSpeed;

        // Collision avoidance: push apart if too close to other robots
        for (let j = 0; j < agentRobots.length; j++) {
          if (j === i) continue;
          const other = agentRobots[j].group;
          const sepX = g.position.x - other.position.x;
          const sepZ = g.position.z - other.position.z;
          const dist = Math.hypot(sepX, sepZ);
          if (dist < .8 && dist > .001) {
            const push = (.8 - dist) * .04;
            g.position.x += (sepX / dist) * push;
            g.position.z += (sepZ / dist) * push;
          }
        }
        // Also avoid center robot
        if (centerRobot) {
          const cx = g.position.x - centerRobot.group.position.x;
          const cz = g.position.z - centerRobot.group.position.z;
          const cd = Math.hypot(cx, cz);
          if (cd < 1.0 && cd > .001) {
            const push = (1.0 - cd) * .03;
            g.position.x += (cx / cd) * push;
            g.position.z += (cz / cd) * push;
          }
        }

        const isWalking = ud.walkTarget || (Math.abs(dx) > .01 || Math.abs(dz) > .01);
        const bounceAmp = isWalking ? .04 : .015;
        const bounceSpd = ud.walkTarget ? 5.0 : 3.5;
        const walkBounce = Math.abs(Math.sin(t * bounceSpd + phase)) * bounceAmp;
        g.position.y = -0.41 + walkBounce;

        // Floor glow footprints disabled for performance

        if (Math.abs(dx) > .001 || Math.abs(dz) > .001) {
          const moveDir = Math.atan2(dx, dz);
          let dRot = moveDir - g.rotation.y;
          while (dRot > Math.PI) dRot -= Math.PI * 2;
          while (dRot < -Math.PI) dRot += Math.PI * 2;
          g.rotation.y += dRot * (ud.walkTarget ? .08 : .04);
        }

        if (ud.leftArm) {
          const armAmp = ud.walkTarget ? .38 : .22;
          const armSpd = ud.walkTarget ? 5.0 : 3.5;
          const armSwing = Math.sin(t * armSpd + phase) * armAmp;
          ud.leftArm.rotation.x = armSwing;
          ud.rightArm.rotation.x = -armSwing;
          ud.leftArm.rotation.z = -.15;
          ud.rightArm.rotation.z = .15;
        }
        if (ud.head) {
          const headTurn = ud.walkTarget ? Math.atan2(dx, dz) * .15 : Math.sin(t * .7 + phase) * .06;
          ud.head.rotation.y = headTurn;
          ud.head.rotation.z = Math.sin(t * .5 + phase + 1) * .02;
        }
        if (ud.leftPupil && ud.rightPupil) {
          const lx = mouse.x * .03, ly = mouse.y * .015;
          ud.leftPupil.position.x = -.1 + lx;
          ud.leftPupil.position.y = .68 + ly;
          ud.rightPupil.position.x = .1 + lx;
          ud.rightPupil.position.y = .68 + ly;
        }
        if (ud.antennaTip) {
          ud.antennaTip.position.x = Math.sin(t * 1.8 + phase) * .015;
        }
        if (ud.ring) {
          ud.ring.rotation.z = t * .5 + phase;
          ud.ring.material.opacity = isHovered ? .4 + Math.sin(t * 2 + phase) * .1 : .2 + Math.sin(t * 1.5 + phase) * .06;
          const selIdx = clickedAgentIdxRef.current;
          const ringStatus = selIdx === i ? STATUS_COLORS.selected : STATUS_COLORS.idle;
          tmpColor.set(ringStatus);
          ud.ring.material.color.lerp(tmpColor, .08);
          ud.ring.material.emissive.lerp(tmpColor, .08);
        }

        const targetScale = (ud.baseScale || .75) * (isHovered ? 1.08 : 1);
        tmpScale.setScalar(targetScale);
        g.scale.lerp(tmpScale, .06);
        if (ud.light) {
          const lt = isHovered ? .9 : .5;
          ud.light.intensity += (lt - ud.light.intensity) * .06;
        }

        const selIdx = clickedAgentIdxRef.current;
        if (isHovered || selIdx === i) {
          const pulse = isHovered ? 1.4 + Math.sin(t * 3 + phase) * .3 : 1.0;
          for (const part of rb.glowParts) {
            if (part.material && part.material.emissiveIntensity !== undefined) {
              part.material.emissiveIntensity = pulse;
            }
          }
        }
      }

      for (let wi = 0; wi < deskWorkers.length; wi++) {
        const dw = deskWorkers[wi];
        const g = dw.group;
        const wud = g.userData;
        const hasWorker = wi < activeWorkersRef.current.length;
        g.visible = true;
        if (wud.robot) wud.robot.group.visible = hasWorker;
        if (wud.statusLight) wud.statusLight.visible = hasWorker;
        if (!hasWorker) {
          if (wud.screenGlow) wud.screenGlow.material.opacity = .03;
          if (dw.deskGlow) dw.deskGlow.material.opacity = .03;
          continue;
        }

        if (wud.robot && wud.robot.group.userData.leftArm) {
          const typeSpeed = 8 + wi * 1.3;
          wud.robot.group.userData.leftArm.rotation.x = Math.sin(t * typeSpeed + wi) * .12;
          wud.robot.group.userData.rightArm.rotation.x = Math.sin(t * typeSpeed + wi + 1.5) * .12;
          wud.robot.group.userData.leftArm.rotation.z = -.3;
          wud.robot.group.userData.rightArm.rotation.z = .3;
        }
        if (wud.robot && wud.robot.group.userData.head) {
          wud.robot.group.userData.head.rotation.y = Math.sin(t * .4 + wi * 2) * .08;
          wud.robot.group.userData.head.rotation.x = -.1 + Math.sin(t * .3 + wi) * .03;
        }
        if (wud.scanLine) {
          wud.scanLine.position.y = .42 + Math.abs(Math.sin(t * 1.5 + wi * 1.7)) * .28;
        }
        if (wud.statusLight) {
          wud.statusLight.material.emissiveIntensity = .6 + Math.sin(t * 3 + wi * 2) * .4;
        }
        if (wud.screenGlow) {
          wud.screenGlow.material.opacity = .1 + Math.sin(t * 2 + wi) * .05;
        }
        if (dw.deskGlow) {
          dw.deskGlow.material.opacity = .12 + Math.sin(t * 1.5 + wi * 2) * .06;
        }
        if (wud.statusLight && busEventsRef.current.length > 0) {
          const workerProject = (activeWorkersRef.current[wi] || {}).projectSlug;
          const hasRecentBusActivity = workerProject && busEventsRef.current.some(e => e.project === workerProject && Date.now() - e.ts < 30000);
          if (hasRecentBusActivity) {
            wud.statusLight.material.emissiveIntensity = 1.2 + Math.sin(t * 5 + wi) * .5;
            wud.statusLight.material.color.setHex(0x818cf8);
          }
        }
        if (wud.monitorCanvas && Math.floor(t) !== (wud._lastMonFrame || -1)) {
          wud._lastMonFrame = Math.floor(t);
          try {
            const ctx = wud.monitorCanvas.getContext('2d');
            const actData = workerActivityRef.current.find(a => a.idx === wi) || null;
            drawWorkerMonitor(ctx, actData, wi, t);
            wud.monitorTex.needsUpdate = true;
          } catch (monErr) { console.warn('[MC] Monitor draw error:', monErr); }
        }
      }

      for (let fi = floorGlows.length - 1; fi >= 0; fi--) {
        const fg = floorGlows[fi];
        fg.life -= .012;
        if (fg.life <= 0) {
          scene.remove(fg.mesh);
          fg.mesh.material.dispose(); // geometry is shared, do not dispose
          floorGlows.splice(fi, 1);
        } else {
          fg.mesh.material.opacity = fg.life * .2;
          fg.mesh.scale.setScalar(1 + (1 - fg.life) * .6);
        }
      }

      for (const cl of connLines) {
        const { i: ci, j: cj } = cl.userData;
        const wi = activeWorkersRef.current[ci], wj = activeWorkersRef.current[cj];
        if (wi && wj && wi.projectSlug && wi.projectSlug === wj.projectSlug && deskWorkers[ci].group.visible && deskWorkers[cj].group.visible) {
          cl.visible = true;
          const pos = cl.geometry.attributes.position.array;
          pos[0] = deskWorkers[ci].group.position.x; pos[1] = deskWorkers[ci].group.position.y + .5; pos[2] = deskWorkers[ci].group.position.z;
          pos[3] = deskWorkers[cj].group.position.x; pos[4] = deskWorkers[cj].group.position.y + .5; pos[5] = deskWorkers[cj].group.position.z;
          cl.geometry.attributes.position.needsUpdate = true;
          cl.material.opacity = .15 + Math.sin(t * 2) * .08;
        } else {
          cl.visible = false;
        }
      }

      // Camera lerp - only when actively lerping, stops on user drag
      if (camLerping && camTarget && controls) {
        camera.position.x += (camTarget.x - camera.position.x) * camLerpSpeed;
        camera.position.y += (camTarget.y - camera.position.y) * camLerpSpeed;
        camera.position.z += (camTarget.z - camera.position.z) * camLerpSpeed;
        controls.target.x += (camTarget.tx - controls.target.x) * camLerpSpeed;
        controls.target.y += (camTarget.ty - controls.target.y) * camLerpSpeed;
        controls.target.z += (camTarget.tz - controls.target.z) * camLerpSpeed;
      }

      // Screen shake
      if (shakeIntensity > 0.001) {
        camera.position.x += (Math.random() - 0.5) * shakeIntensity;
        camera.position.y += (Math.random() - 0.5) * shakeIntensity * 0.5;
        shakeIntensity *= shakeDecay;
      }

      // Flash overlay
      if (flashLife > 0) {
        flashMesh.visible = true;
        flashMat.opacity = flashLife * 0.4;
        flashMesh.position.copy(camera.position);
        flashMesh.quaternion.copy(camera.quaternion);
        flashMesh.translateZ(-1);
        flashLife *= 0.88;
        if (flashLife < 0.01) { flashLife = 0; flashMesh.visible = false; }
      }

      // Minimap update (every 3 frames)
      if (Math.floor(t) !== Math.floor(t - .042)) drawMinimap();

      if (controls) {
        let mx = 0, mz = 0;
        if (keysDown['w'] || keysDown['arrowup']) mz = -1;
        if (keysDown['s'] || keysDown['arrowdown']) mz = 1;
        if (keysDown['a'] || keysDown['arrowleft']) mx = -1;
        if (keysDown['d'] || keysDown['arrowright']) mx = 1;
        if (mx || mz) {
          camTarget = null; camLerping = false;
          wasdDir.set(mx, 0, mz).normalize();
          const angle = Math.atan2(camera.position.x - controls.target.x, camera.position.z - controls.target.z);
          const sin = Math.sin(angle), cos = Math.cos(angle);
          const worldX = wasdDir.x * cos - wasdDir.z * sin;
          const worldZ = wasdDir.x * sin + wasdDir.z * cos;
          const dx = worldX * WASD_SPEED, dz = worldZ * WASD_SPEED;
          const ntx = Math.max(ROOM_MIN_X, Math.min(ROOM_MAX_X, controls.target.x + dx));
          const ntz = Math.max(ROOM_MIN_Z, Math.min(ROOM_MAX_Z, controls.target.z + dz));
          const clampDx = ntx - controls.target.x, clampDz = ntz - controls.target.z;
          camera.position.x += clampDx;
          camera.position.z += clampDz;
          controls.target.x = ntx;
          controls.target.z = ntz;
        }
        controls.update();
      }
      renderer.render(scene, camera);

      if (tagsRef.current) {
        const tags = tagsRef.current.children;
        tagPositionsLen = 0;
        let tagIdx = 0;
        const pushTag = (el, px, py, vis) => {
          if (tagPositionsLen < tagPositionsPool.length) {
            const tp = tagPositionsPool[tagPositionsLen];
            tp.el = el; tp.x = px; tp.y = py; tp.vis = vis;
          } else {
            tagPositionsPool.push({ el, x: px, y: py, vis });
          }
          tagPositionsLen++;
        };
        if (tags[tagIdx]) {
          tmpVec.set(0, 1.3, 0);
          centerRobot.group.localToWorld(tmpVec);
          tmpVec.project(camera);
          pushTag(tags[tagIdx], (tmpVec.x * .5 + .5) * container.clientWidth, (-.5 * tmpVec.y + .5) * container.clientHeight, tmpVec.z < 1);
          tagIdx++;
        }
        if (companionRef.current && tags[tagIdx]) {
          tmpVec.set(0, .8, 0);
          companionRobot.group.localToWorld(tmpVec);
          tmpVec.project(camera);
          pushTag(tags[tagIdx], (tmpVec.x * .5 + .5) * container.clientWidth, (-.5 * tmpVec.y + .5) * container.clientHeight, tmpVec.z < 1);
          tagIdx++;
        }
        for (let i = 0; i < agentRobots.length && tagIdx < tags.length; i++) {
          tmpVec.set(0, 1.2, 0);
          agentRobots[i].group.localToWorld(tmpVec);
          tmpVec.project(camera);
          pushTag(tags[tagIdx], (tmpVec.x * .5 + .5) * container.clientWidth, (-.5 * tmpVec.y + .5) * container.clientHeight, tmpVec.z < 1);
          tagIdx++;
        }
        for (let wi = 0; wi < deskWorkers.length && tagIdx < tags.length; wi++) {
          const wTag = tags[tagIdx];
          if (!deskWorkers[wi].group.visible) { wTag.style.opacity = '0'; tagIdx++; continue; }
          tmpVec.set(0, .8, 0);
          deskWorkers[wi].group.localToWorld(tmpVec);
          tmpVec.project(camera);
          pushTag(wTag, (tmpVec.x * .5 + .5) * container.clientWidth, (-.5 * tmpVec.y + .5) * container.clientHeight, tmpVec.z < 1);
          tagIdx++;
        }
        for (let i = 0; i < tagPositionsLen; i++) {
          for (let j = i + 1; j < tagPositionsLen; j++) {
            const a = tagPositionsPool[i], b = tagPositionsPool[j];
            if (!a.vis || !b.vis) continue;
            const dx = Math.abs(a.x - b.x), dy = Math.abs(a.y - b.y);
            if (dx < 120 && dy < 44) {
              const push = (44 - dy) * .6;
              a.y -= push; b.y += push;
            }
          }
        }
        for (let i = 0; i < tagPositionsLen; i++) {
          const tp = tagPositionsPool[i];
          tp.el.style.left = tp.x + 'px';
          tp.el.style.top = tp.y + 'px';
          tp.el.style.opacity = tp.vis ? '1' : '0';
        }
        for (let i = tagPositionsLen; i < tagPositionsPool.length; i++) {
          tagPositionsPool[i].el = null;
        }
      }
    };
    animate();

    const onResize = () => {
      const nw = container.clientWidth;
      const nh = container.clientHeight;
      camera.aspect = nw / nh;
      camera.updateProjectionMatrix();
      renderer.setSize(nw, nh);
    };
    window.addEventListener('resize', onResize);

        <div className="wiz-nav">
          <button className="wiz-prev" onClick={() => setWizStep(2)}>Back</button>
          <button className="wiz-next" onClick={() => setWizStep(4)}>Next: Subagents</button>
        </div>
      </div>
    );

    if (wizStep === 4) return (
      <div className="wiz-content">
        <h3>Configure Subagents</h3>
        <div className="wiz-hint">Select subagents and configure their individual skills.</div>
        <div className="lp-agents-grid" style={{ marginBottom: 12 }}>
          {agents.filter(a => a.filename !== wizAgent?.filename).map(a => (
            <div key={a.filename} className={'lp-agent-card' + (wizSubagents[a.filename] ? ' on' : '')}
              onClick={() => setWizSubagents(p => ({ ...p, [a.filename]: !p[a.filename] }))}>
              <span className="ac-name">{a.name}</span>
            </div>
          ))}
        </div>
        {Object.keys(wizSubagents).filter(k => wizSubagents[k]).map(fn => {
          const a = agents.find(x => x.filename === fn);
          if (!a) return null;
          return (
            <div key={fn} className="wiz-subagent-cfg">
              <div className="sa-hdr">
                <span className="sa-name">{a.name}</span>
                {a.model && <span className="sa-model">{a.model}</span>}
              </div>
              <div className="lp-pills">
                {skills.map(s => (
                  <div key={s.filename} className={'lp-pill sk' + ((wizSubSkills[fn] || {})[s.filename] ? ' on' : '')}
                    onClick={() => setWizSubSkills(p => ({
                      ...p, [fn]: { ...(p[fn] || {}), [s.filename]: !(p[fn] || {})[s.filename] }
                    }))}>/{s.name}</div>
                ))}
              </div>
            </div>
          );
        })}
        <div className="wiz-nav">
          <button className="wiz-prev" onClick={() => setWizStep(3)}>Back</button>
          <button className="wiz-next" onClick={doPreview}>Preview Prompt</button>
        </div>
      </div>
    );

    if (wizStep === 5) {
      const charCount = wizPrompt.length;
      const tokenEst = Math.round(charCount / 4);
      return (
        <div className="wiz-content">
          <h3>Review Prompt</h3>
          <div className="wiz-hint">
            {charCount > 0
              ? `${charCount.toLocaleString()} chars / ~${tokenEst.toLocaleString()} tokens / ${wizModel}`
              : 'Composing prompt...'}
          </div>
          {charCount > 0 ? (
            <textarea
              value={wizPrompt}
              onChange={e => setWizPrompt(e.target.value)}
              style={{
                width: '100%', flex: 1, minHeight: 200, maxHeight: 400, padding: 12,
                background: 'rgba(255,255,255,.03)', border: '1px solid rgba(255,255,255,.1)',
                borderRadius: 8, color: 'rgba(255,255,255,.8)', resize: 'vertical',
                font: '12px/1.6 var(--mono)', outline: 'none',
              }}
            />
          ) : (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 40 }}>
              <div className="wiz-spinner" />
            </div>
          )}
          {authStatus && !authStatus.loggedIn && (
            <div style={{ padding: '8px 12px', background: 'rgba(239,68,68,.1)', border: '1px solid rgba(239,68,68,.2)', borderRadius: 8, marginTop: 8, font: '500 11px var(--sans)', color: '#F87171', display: 'flex', alignItems: 'center', gap: 6 }}>
              Not logged in. Run <code style={{ font: '11px var(--mono)', padding: '2px 6px', background: 'rgba(0,0,0,.3)', borderRadius: 4 }}>claude auth login</code> first.
            </div>
          )}
          <div className="wiz-nav">
            <button className="wiz-prev" disabled={wizLoading} onClick={() => setWizStep(4)}>Back</button>
            <button className="wiz-prev" disabled={!wizPrompt} onClick={() => { navigator.clipboard.writeText(wizPrompt); toast('Prompt copied'); }}>Copy</button>
            <button className="wiz-next" disabled={!wizPrompt || wizLoading || (authStatus && !authStatus.loggedIn)} onClick={doLaunch}>
              {authStatus && !authStatus.loggedIn ? 'Login Required' : 'Launch Terminal'}
            </button>
          </div>
        </div>
      );
    }

    if (wizStep === 6) {
      const selMods = Object.keys(wizModules).filter(k => wizModules[k]);
      const selSkills = Object.keys(wizSkills).filter(k => wizSkills[k]).length;
      const selSubs = Object.keys(wizSubagents).filter(k => wizSubagents[k]).length;
      const selMem = Object.keys(wizMemory).filter(k => wizMemory[k]).length;
      return (
        <div className="wiz-content" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div className="wiz-loading" style={{ maxWidth: 420 }}>
            <div className="wiz-spinner" />
            <div className="wiz-load-title">Launching Terminal</div>
            <div className="wiz-load-sub" style={{ textAlign: 'center', lineHeight: 1.5 }}>
              {wizAgent?.name || 'Agent'} + {selSubs} subagent{selSubs !== 1 ? 's' : ''} + {selSkills} skill{selSkills !== 1 ? 's' : ''} + {selMods.length} module{selMods.length !== 1 ? 's' : ''}
              {selMem > 0 ? ` + ${selMem} memory` : ''}{' '}
              for {wizProject?.name || 'project'}
            </div>
            <div className="wiz-load-bar">
              <div className="wiz-load-bar-fill" style={{ width: wizProgress + '%', transition: 'width .4s ease' }} />
            </div>
            <div className="wiz-load-status">{wizStatus}</div>
            {selMods.length > 0 && (
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'center', marginTop: 12 }}>
                {selMods.map(id => {
                  const mod = (modules.modules || []).find(m => m.id === id);
                  const active = wizStatus.includes(mod?.shortName || id);
                  return <span key={id} style={{
                    padding: '3px 8px', borderRadius: 6, fontSize: 10, fontWeight: 600,
                    background: active ? (mod?.color || '#6366f1') + '20' : 'rgba(255,255,255,.04)',
                    color: active ? (mod?.color || '#a5b4fc') : 'rgba(255,255,255,.25)',
                    border: '1px solid ' + (active ? (mod?.color || '#6366f1') + '40' : 'rgba(255,255,255,.06)'),
                    transition: 'all .3s ease',
                  }}>{mod?.shortName || id}</span>;
                })}
              </div>
            )}
            {companionVis && (
              <div style={{ marginTop: 14, fontSize: 10, color: 'rgba(255,255,255,.25)', textAlign: 'center' }}>
                {companionVis.emoji} {companionVis.name} is watching...
              </div>
            )}
          </div>
        </div>
      );
    }

    return null;
  };

  const wizardPanel = wizStep > 0 ? (
    <div className="lp-panel" key="wizard">
      <div className="lp-cfg">
        <div className="wiz-steps">
          {WIZ_STEPS.map((s, i) => (
            <React.Fragment key={s.num}>
              {i > 0 && <div className="wiz-connector" />}
              <div className={'wiz-step' + (wizStep === s.num ? ' active' : wizStep > s.num ? ' done' : '')}
                onClick={() => { if (s.num < wizStep && !wizLoading) setWizStep(s.num); }}>
                <div className="wiz-step-num">{wizStep > s.num ? '✓' : s.num}</div>
                <span className="wiz-step-label">{s.label}</span>
              </div>
            </React.Fragment>
          ))}
        </div>
        {wizStepContent()}
      </div>
    </div>
  ) : null;

  return (
    <div className={'lp' + (mode === 'corp' ? ' corp' : '')} onClick={(e) => { if (e.target === e.currentTarget) { setClickedAgentIdx(null); setClickedWorkerIdx(null); } if (showSettingsMenu) setShowSettingsMenu(false); }}>
      <div className="lp-mode-toggle">
        {mode === 'game' && (
          <div style={{ position: 'relative' }}>
            <button className="lp-set-btn on" onClick={() => setShowSettingsMenu(v => !v)} title="Settings" style={{ background: 'rgba(0,0,0,.3)', border: '1px solid rgba(255,255,255,.08)' }}>
              <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81a.49.49 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41L9.25 5.35c-.59.24-1.13.57-1.62.94L5.24 5.33a.49.49 0 00-.59.22L2.74 8.87a.49.49 0 00.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.61 3.61 0 0112 15.6z" /></svg>
            </button>
            {showSettingsMenu && (
              <div className="set-menu" style={{ minWidth: 240, maxHeight: '70vh', overflowY: 'auto' }} onClick={e => e.stopPropagation()}>
                <div style={{ padding: '4px 10px 2px', font: '600 9px var(--sans)', color: 'rgba(255,255,255,.25)', textTransform: 'uppercase', letterSpacing: '.05em' }}>Display</div>
                <div className="set-menu-item" onClick={() => { const on = SoundFX.toggle(); setSoundOn(on); if (on) Ambience.start(() => activeWorkersRef.current.length); else Ambience.stop(); }}>
                  <svg viewBox="0 0 24 24"><path d={soundOn ? 'M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5zM14 3.23v2.06a6.51 6.51 0 010 13.42v2.06A8.5 8.5 0 0014 3.23z' : 'M16.5 12A4.5 4.5 0 0014 8.5v2.14l2.45 2.45c.03-.2.05-.39.05-.59zm2.5 0a6.5 6.5 0 00-1.5-4.19l-1.41 1.41A4.93 4.93 0 0117 12h2zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.4 8.4 0 003.69-2.06l1.58 1.58L21 19.73l-4-4L4.27 3zM12 4l-1.88 1.88L12 7.76V4z'} /></svg>
                  <span>Sound</span>
                  <div className={'set-toggle' + (soundOn ? ' on' : '')} />
                </div>
                <div className="set-menu-item" onClick={() => setShowMinimap(v => { const n = !v; localStorage.setItem('mc-minimap', JSON.stringify(n)); return n; })}>
                  <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5a.5.5 0 00.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5a.5.5 0 00-.5-.5zM15 19l-6-2.11V5l6 2.11V19z" /></svg>
                  <span>Minimap</span>
                  <div className={'set-toggle' + (showMinimap ? ' on' : '')} />
                </div>
                <div className="set-menu-item" onClick={() => setShowLabels(v => { const n = !v; localStorage.setItem('mc-labels', JSON.stringify(n)); return n; })}>
                  <svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58s1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41s-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z" /></svg>
                  <span>Zone Labels</span>
                  <div className={'set-toggle' + (showLabels ? ' on' : '')} />
                </div>
                <div className="set-menu-item" onClick={() => setShowParticles(v => { const n = !v; localStorage.setItem('mc-particles', JSON.stringify(n)); return n; })}>
                  <svg viewBox="0 0 24 24"><path d="M12 10a2 2 0 100 4 2 2 0 000-4zm-2-5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zm9 2a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM7 18a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zm12 0a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z" /></svg>
                  <span>Particles</span>
                  <div className={'set-toggle' + (showParticles ? ' on' : '')} />
                </div>
                <div className="set-menu-item" onClick={() => { window.dispatchEvent(new CustomEvent('mc-anon-toggle')); setShowSettingsMenu(false); }}>
                  <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" /></svg>
                  <span>Blur Mode (F2)</span>
                  {document.documentElement.classList.contains('anon') && <div className="wake-dot" style={{ background: '#ef4444' }} />}
                </div>

                <div style={{ height: 1, background: 'rgba(255,255,255,.06)', margin: '6px 0' }} />
                <div style={{ padding: '4px 10px 2px', font: '600 9px var(--sans)', color: 'rgba(255,255,255,.25)', textTransform: 'uppercase', letterSpacing: '.05em' }}>Autonomy</div>

                <div className="set-menu-item" onClick={() => updateSetting('permissionMode', mcSettings.permissionMode === 'auto' ? 'default' : 'auto')}>
                  <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z" /></svg>
                  <span>Auto-Accept</span>
                  <div className={'set-toggle' + (mcSettings.permissionMode === 'auto' ? ' on' : '')} />
                </div>

                <div className="set-menu-item" onClick={() => updateSetting('loopEnabled', !mcSettings.loopEnabled)}>
                  <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0020 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 004 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z" /></svg>
                  <span>Loop Mode</span>
                  <div className={'set-toggle' + (mcSettings.loopEnabled ? ' on' : '')} />
                </div>
                {mcSettings.loopEnabled && (
                  <div style={{ padding: '2px 10px 6px 36px' }}>
                    <select value={mcSettings.loopInterval} onChange={e => updateSetting('loopInterval', e.target.value)}
                      style={{ width: '100%', padding: '4px 6px', borderRadius: 4, border: '1px solid rgba(255,255,255,.12)', background: 'rgba(255,255,255,.04)', color: 'rgba(255,255,255,.7)', font: '11px var(--sans)' }}>
                      <option value="1m">Every 1 min</option>
                      <option value="5m">Every 5 min</option>
                      <option value="15m">Every 15 min</option>
                      <option value="30m">Every 30 min</option>
                      <option value="1h">Every 1 hour</option>
                    </select>
                  </div>
                )}

                <div style={{ height: 1, background: 'rgba(255,255,255,.06)', margin: '6px 0' }} />
                <div style={{ padding: '4px 10px 2px', font: '600 9px var(--sans)', color: 'rgba(255,255,255,.25)', textTransform: 'uppercase', letterSpacing: '.05em' }}>Limits</div>

                <div style={{ padding: '4px 10px' }}>
                  <div style={{ font: '500 11px var(--sans)', color: 'rgba(255,255,255,.5)', marginBottom: 4, display: 'flex', justifyContent: 'space-between' }}>
                    <span>Max Turns</span>
                    <span style={{ color: mcSettings.maxTurns ? '#60a5fa' : 'rgba(255,255,255,.25)' }}>{mcSettings.maxTurns || 'unlimited'}</span>
                  </div>
                  <input type="range" min="0" max="100" step="5" value={mcSettings.maxTurns} onChange={e => updateSetting('maxTurns', parseInt(e.target.value))}
                    style={{ width: '100%', accentColor: '#818cf8', height: 4 }} />
                </div>

                <div style={{ padding: '4px 10px' }}>
                  <div style={{ font: '500 11px var(--sans)', color: 'rgba(255,255,255,.5)', marginBottom: 4, display: 'flex', justifyContent: 'space-between' }}>
                    <span>Budget Cap</span>
                    <span style={{ color: mcSettings.maxBudget ? '#fbbf24' : 'rgba(255,255,255,.25)' }}>{mcSettings.maxBudget ? `$${mcSettings.maxBudget}` : 'unlimited'}</span>
                  </div>
                  <input type="range" min="0" max="50" step="1" value={mcSettings.maxBudget} onChange={e => updateSetting('maxBudget', parseInt(e.target.value))}
                    style={{ width: '100%', accentColor: '#fbbf24', height: 4 }} />
                </div>

                <div style={{ height: 1, background: 'rgba(255,255,255,.06)', margin: '6px 0' }} />
                <div style={{ padding: '4px 10px 2px', font: '600 9px var(--sans)', color: 'rgba(255,255,255,.25)', textTransform: 'uppercase', letterSpacing: '.05em' }}>Model</div>

                <div style={{ padding: '4px 10px 6px' }}>
                  <select value={mcSettings.defaultModel} onChange={e => updateSetting('defaultModel', e.target.value)}
                    style={{ width: '100%', padding: '5px 8px', borderRadius: 6, border: '1px solid rgba(255,255,255,.12)', background: 'rgba(255,255,255,.04)', color: 'rgba(255,255,255,.7)', font: '500 11px var(--sans)' }}>
                    <option value="claude-opus-4-6">Opus 4.6 (deep reasoning)</option>
                    <option value="claude-sonnet-4-6">Sonnet 4.6 (balanced)</option>
                    <option value="claude-haiku-4-5-20251001">Haiku 4.5 (fast)</option>
                  </select>
                </div>

                <div style={{ padding: '4px 10px 6px' }}>
                  <div style={{ font: '500 11px var(--sans)', color: 'rgba(255,255,255,.5)', marginBottom: 4 }}>Effort Level</div>
                  <div style={{ display: 'flex', gap: 2 }}>
                    {['low', 'medium', 'high', 'xhigh'].map(lvl => (
                      <button key={lvl} onClick={() => updateSetting('effortLevel', lvl)}
                        style={{ flex: 1, padding: '4px 0', borderRadius: 4, border: mcSettings.effortLevel === lvl ? '1px solid rgba(99,102,241,.5)' : '1px solid rgba(255,255,255,.08)', background: mcSettings.effortLevel === lvl ? 'rgba(99,102,241,.2)' : 'rgba(255,255,255,.02)', color: mcSettings.effortLevel === lvl ? '#a5b4fc' : 'rgba(255,255,255,.35)', font: '500 9px var(--sans)', cursor: 'pointer' }}>
                        {lvl === 'xhigh' ? 'max' : lvl}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{ height: 1, background: 'rgba(255,255,255,.06)', margin: '6px 0' }} />
                <div style={{ padding: '4px 10px 2px', font: '600 9px var(--sans)', color: 'rgba(255,255,255,.25)', textTransform: 'uppercase', letterSpacing: '.05em' }}>System</div>

                <div className="set-menu-item" onClick={toggleWakeLock}>
                  <svg viewBox="0 0 24 24"><path d="M17 6.14V4c0-1.1-.9-2-2-2H9c-1.1 0-2 .9-2 2v2.14c-1.72.45-3 2-3 3.86v8c0 2.21 1.79 4 4 4h8c2.21 0 4-1.79 4-4v-8c0-1.86-1.28-3.41-3-3.86zM9 4h6v2H9V4zm8 14c0 1.1-.9 2-2 2H9c-1.1 0-2-.9-2-2v-8c0-1.1.9-2 2-2h6c1.1 0 2 .9 2 2v8z" /></svg>
                  <span>Keep Awake</span>
                  {wakeLockActive ? <div className="wake-dot" /> : <div className={'set-toggle'} />}
                </div>

                <div className="set-menu-item" onClick={() => { setMultiTermMode(v => !v); if (multiTermMode) setMultiTermWorkers([]); setShowSettingsMenu(false); }}>
                  <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z" /></svg>
                  <span>Multi Terminal (max 4)</span>
                  {multiTermMode && <div className="wake-dot" style={{ background: '#818cf8' }} />}
                </div>

                <div className="set-menu-item" onClick={() => updateSetting('autoConnect', !mcSettings.autoConnect)}>
                  <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM5 15h14v2H5z" /></svg>
                  <span>Auto-Connect Terminal</span>
                  <div className={'set-toggle' + (mcSettings.autoConnect ? ' on' : '')} />
                </div>

                <div className="set-menu-item" onClick={() => { setShowBreakScheduler(true); setShowSettingsMenu(false); }}>
                  <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z" /></svg>
                  <span>Break Timer</span>
                  {breakTimer && <div className="wake-dot" style={{ background: '#fbbf24' }} />}
                </div>

                <div className="set-menu-item" onClick={() => {
                  fetch('/api/system/health').then(r => r.json()).then(d => {
                    const info = `Server: ${d.uptime ? Math.floor(d.uptime/60) + 'min' : 'unknown'}\nProcesses: ${d.claudeProcesses?.total || 0}\nMemory: ${d.claudeProcesses?.processes?.reduce((s,p) => s + p.memKb, 0) || 0} KB`;
                    alert(info);
                  }).catch(() => alert('Server unreachable'));
                  setShowSettingsMenu(false);
                }}>
                  <svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z" /></svg>
                  <span>System Info</span>
                </div>

                <div className="set-menu-item" onClick={() => { triggerDream(); setShowSettingsMenu(false); }}>
                  <svg viewBox="0 0 24 24"><path d="M9 2c-1.05 0-2.05.16-3 .46 4.06 1.27 7 5.06 7 9.54s-2.94 8.27-7 9.54c.95.3 1.95.46 3 .46 5.52 0 10-4.48 10-10S14.52 2 9 2z" /></svg>
                  <span style={{ color: '#fca5a5' }}>Dream Mode</span>
                </div>
              </div>
            )}

            busEventsRef={busEventsRef}

          <div className="fs-terminal">

      {editingAgent && <EditorModal title={'Edit: ' + editingAgent.name} content={editingAgent.content} onSave={saveAgentEdit} onClose={() => setEditingAgent(null)} />}

            const secs = Math.floor((remaining % 60000) / 1000);
            return (
              <div className="break-active">
                <div>
                  <div className="ba-time">{String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}</div>

                <button onClick={() => { setBreakTimer(null); SoundFX.click(); }}>Cancel</button>

          <div className="break-presets">
            <div className="break-preset" onClick={() => startBreak(25, 'Pomodoro Focus')}>

            <div className="break-preset" onClick={() => startBreak(90, 'Ultra Session')}>

            <button onClick={() => { if (breakCustomMin > 0) startBreak(Number(breakCustomMin), `Custom (${breakCustomMin}min)`); }}>Start</button>
          </div>
          <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
            <div className="break-preset" style={{ flex: 1, justifyContent: 'center' }} onClick={toggleWakeLock}>

              <span>{wakeLockActive ? 'Screen Awake ON' : 'Keep Screen Awake'}</span>

      {breakReminder && (
        <div className="break-remind" onClick={e => { if (e.target === e.currentTarget) setBreakReminder(false); }}>

            <h1>BREAK TIME</h1>

              <button className="br-skip" onClick={() => setBreakReminder(false)}>Dismiss</button>
