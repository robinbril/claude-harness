<style>
:root {
  --bg: #F8F8F6; --card: #FFFFFF; --hover: #F2F2EF; --input: #EDEDEA;
  --border: #E2E2DD; --border-h: #D4D4CF;
  --t1: #1A1A1A; --t2: #4A4A4A; --t3: #8A8A8A; --t4: #B0B0B0;
  --pri: #5B5FE6; --pri-bg: rgba(91,95,230,.06);
  --grn: #0D9668; --grn-bg: rgba(13,150,104,.06);
  --amb: #C08A00; --amb-bg: rgba(192,138,0,.06);
  --red: #D03030; --red-bg: rgba(208,48,48,.06);
  --nav: #18181B;
  --r: 8px; --mono: 'IBM Plex Mono', monospace; --sans: 'Inter', system-ui, sans-serif;
  --sh: 0 1px 2px rgba(0,0,0,.04);
}
* { margin: 0; padding: 0; box-sizing: border-box }
body { background: var(--bg); color: var(--t1); font: 13px/1.5 var(--sans); overflow: hidden; height: 100vh }
::-webkit-scrollbar { width: 5px; height: 5px }
::-webkit-scrollbar-track { background: transparent }
::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 3px }
::-webkit-scrollbar-thumb:hover { background: var(--t4) }
.lp-cfg::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1) }
.lp-cfg::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.2) }
.lp-cfg::-webkit-scrollbar-track { background: transparent }
.lp-cfg { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent }
#root { height: 100vh; display: flex; flex-direction: column }
.anon .anon-blur { filter: blur(5px); transition: filter .2s ease }
.anon .anon-blur:hover { filter: blur(3px) }
.anon-badge { position: fixed; top: 6px; left: 50%; transform: translateX(-50%); z-index: 9999; background: rgba(239,68,68,.9); color: #fff; font: 600 10px var(--sans); padding: 3px 12px; border-radius: 12px; letter-spacing: .04em; pointer-events: none; animation: anon-pulse 2s ease-in-out infinite }
@keyframes anon-pulse { 0%,100% { opacity: .85 } 50% { opacity: 1 } }

/* Nav */
nav { background: var(--nav); display: flex; align-items: center; padding: 0 16px; height: 42px; gap: 1px; flex-shrink: 0 }
.brand { display: flex; align-items: center; gap: 8px; margin-right: 24px }
.logo { width: 22px; height: 22px; border-radius: 5px; background: linear-gradient(135deg,#E8512F,#E50695,#9B27AF); display: flex; align-items: center; justify-content: center; font: 700 10px var(--sans); color: #fff }
.brand span { font: 700 13px var(--sans); color: #fff; letter-spacing: -.02em }
.tab { padding: 11px 14px; font: 500 12px var(--sans); color: rgba(255,255,255,.4); cursor: pointer; position: relative; transition: color .1s }
.tab:hover { color: rgba(255,255,255,.65) }
.tab.on { color: #fff }
.tab.on::after { content: ''; position: absolute; bottom: 0; left: 8px; right: 8px; height: 2px; background: var(--pri); border-radius: 1px }
.tab em { font-style: normal; font-size: 10px; background: rgba(255,255,255,.08); padding: 1px 5px; border-radius: 4px; margin-left: 4px; color: rgba(255,255,255,.3) }
.tab.on em { background: rgba(255,255,255,.14); color: rgba(255,255,255,.6) }
.sub-nav { display: flex; align-items: center; padding: 0 16px; height: 34px; gap: 2px; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0 }
.sub-tab { padding: 7px 12px; font: 500 11px var(--sans); color: var(--t3); cursor: pointer; border-radius: 6px; transition: all .1s }
.sub-tab:hover { color: var(--t2); background: var(--hover) }
.sub-tab.on { color: var(--pri); background: var(--pri-bg); font-weight: 600 }
.sub-tab em { font-style: normal; font-size: 10px; background: var(--input); padding: 1px 5px; border-radius: 4px; margin-left: 4px; color: var(--t3) }
.sub-tab.on em { background: rgba(91,95,230,.12); color: var(--pri) }
.flex1 { flex: 1 }
.status { font-size: 10px; color: rgba(255,255,255,.25); display: flex; align-items: center; gap: 5px }
.dot-live { width: 5px; height: 5px; border-radius: 50%; background: #34D399; box-shadow: 0 0 6px #34D399 }
.auth-status { font-size: 10px; color: rgba(255,255,255,.35); display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); cursor: default; margin-right: 8px }
.dot-auth { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0 }
.dot-auth.on { background: #34D399; box-shadow: 0 0 6px #34D399 }
.dot-auth.off { background: #EF4444; box-shadow: 0 0 6px #EF4444 }
.auth-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px }

.new-proj-form { padding: 12px; background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.08); border-radius: 10px; margin-bottom: 12px }
.new-proj-form input[type=text] { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); color: #fff; font: 500 12px var(--sans); outline: none }
.new-proj-form input[type=text]:focus { border-color: var(--pri) }
.new-proj-checks { display: flex; gap: 14px; margin: 8px 0 }
.new-proj-checks label { font: 500 11px var(--sans); color: rgba(255,255,255,.5); display: flex; align-items: center; gap: 5px; cursor: pointer }
.new-proj-checks input[type=checkbox] { accent-color: var(--pri) }
.new-proj-btns { display: flex; gap: 6px; justify-content: flex-end; margin-top: 8px }
.new-proj-btns button { padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04); color: rgba(255,255,255,.7); font: 600 11px var(--sans); cursor: pointer }
.new-proj-btns button.primary { background: var(--pri); color: #fff; border-color: var(--pri) }
.new-proj-btns button:disabled { opacity: .4; cursor: default }

.body { flex: 1; overflow: hidden; display: flex }

/* Shared */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--sh) }
.badge { padding: 1px 6px; border-radius: 4px; font: 600 10px var(--sans) }
.btn { border: none; border-radius: 6px; padding: 6px 12px; font: 500 11px var(--sans); cursor: pointer; transition: all .1s }
.btn-p { background: var(--pri); color: #fff } .btn-p:hover { opacity: .9 }
.btn-g { background: var(--bg); color: var(--t2); border: 1px solid var(--border) } .btn-g:hover { background: var(--hover) }
.btn-d { background: var(--grn); color: #fff } .btn-d:hover { opacity: .9 }
.input { background: var(--input); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font: 12px var(--sans); color: var(--t1); outline: none; width: 100% }
.input:focus { border-color: var(--pri) }
.input::placeholder { color: var(--t4) }

/* Sessions */
.sl { display: flex; flex: 1; overflow: hidden }
.sidebar { width: 190px; background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0 }
.sidebar h3 { padding: 12px 12px 4px; font: 500 9px var(--sans); text-transform: uppercase; letter-spacing: .1em; color: var(--t4) }
.pi { padding: 5px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; transition: background .06s }
.pi:hover { background: var(--hover) } .pi.on { background: var(--pri-bg); color: var(--pri) }
.pc { background: var(--input); border-radius: 4px; padding: 0 4px; font-size: 10px; color: var(--t4); min-width: 14px; text-align: center }
.pi.on .pc { background: rgba(91,95,230,.12); color: var(--pri) }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden }
.toolbar { padding: 8px 16px; display: flex; gap: 6px; align-items: center; border-bottom: 1px solid var(--border); background: var(--card) }
.stats { padding: 4px 16px; font-size: 11px; color: var(--t3); display: flex; gap: 12px; border-bottom: 1px solid var(--border); background: var(--card) }
.stats b { color: var(--t1); font-weight: 600 }
.grid { flex: 1; overflow-y: auto; padding: 12px 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 8px; align-content: start }
.sc { padding: 12px; cursor: pointer; position: relative }
.sc.live::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; background: var(--grn); border-radius: 0 2px 2px 0 }
.sc-title { font: 600 13px var(--sans); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px }
.sc-meta { font-size: 11px; color: var(--t3); display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap }
.sc-meta .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0 }
.sc-nums { display: flex; gap: 10px; font-size: 11px; color: var(--t3); margin-bottom: 6px }
.sc-nums b { color: var(--t1); font-weight: 600 }
.bar { height: 2px; background: var(--input); border-radius: 1px; overflow: hidden; margin-bottom: 8px }
.bar-fill { height: 100%; border-radius: 1px }
.resume { background: var(--input); border: 1px solid var(--border); border-radius: 5px; padding: 3px 7px; font: 10px var(--mono); color: var(--pri); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all .08s; overflow: hidden; flex: 1 }
.resume:hover { border-color: var(--pri); background: var(--pri-bg) }
.term-btn { background: var(--input); border: 1px solid var(--border); border-radius: 5px; padding: 3px 7px; cursor: pointer; color: var(--t3); font-size: 11px; transition: all .08s }
.term-btn:hover { border-color: var(--grn); color: var(--grn); background: var(--grn-bg) }

/* Detail pane */
.detail { width: 380px; background: var(--card); border-left: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; padding: 16px }
.detail h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; line-height: 1.3 }
.detail section { margin-bottom: 12px }
.detail section h4 { font: 500 9px var(--sans); text-transform: uppercase; letter-spacing: .08em; color: var(--t4); margin-bottom: 4px }
.dr { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; border-bottom: 1px solid var(--border) }
.dr .l { color: var(--t3) } .dr .v { color: var(--t2); text-align: right; max-width: 55%; word-break: break-all }
.tm { padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; font-size: 11px; line-height: 1.5; max-height: 80px; overflow: hidden }
.tm.user { background: var(--pri-bg); border-left: 2px solid var(--pri) }
.tm.assistant { background: var(--input); border-left: 2px solid var(--border) }
.tm-role { font: 500 9px var(--sans); text-transform: uppercase; letter-spacing: .05em; color: var(--t4); margin-bottom: 1px }
.tm-tools { font: 500 10px var(--mono); color: var(--pri); opacity: .6; margin-top: 2px }

/* Page layout */
.page { flex: 1; overflow-y: auto; padding: 20px 24px }
.page h2 { font-size: 17px; font-weight: 700; margin-bottom: 4px }
.page .sub { font-size: 12px; color: var(--t3); margin-bottom: 16px }
.section { margin-bottom: 16px }
.section h3 { font: 600 13px var(--sans); margin-bottom: 8px }

/* Harness */
.h-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 6px; margin-bottom: 6px }
.h-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; cursor: pointer; transition: all .08s; position: relative }
.h-item:hover { border-color: var(--pri); background: var(--pri-bg) }
.h-item .h-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0 }
.h-item .h-info { flex: 1; min-width: 0 }
.h-item .h-name { font: 600 12px var(--sans); overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.h-item .h-desc { font: 11px var(--sans); color: var(--t3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.h-item .h-meta { font: 10px var(--mono); color: var(--t4) }
.h-item:hover .h-edit { opacity: 1 }
.h-edit { font: 500 10px var(--sans); color: var(--pri); opacity: 0; transition: opacity .1s; flex-shrink: 0 }
.h-section { margin-bottom: 14px }
.h-section > .h-label { font: 600 10px var(--sans); text-transform: uppercase; letter-spacing: .08em; color: var(--t3); padding: 0 2px 6px; display: flex; align-items: center; gap: 6px }
.h-section > .h-label::after { content: ''; flex: 1; height: 1px; background: var(--border) }
.hook-tag { padding: 1px 6px; border-radius: 4px; font: 600 9px var(--sans); white-space: nowrap }

/* Editor */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.25); backdrop-filter: blur(3px); z-index: 50; display: flex; align-items: center; justify-content: center }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 10px; width: min(780px, 92vw); max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 16px 48px rgba(0,0,0,.1) }
.modal-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center }
.modal-head h3 { font-size: 14px; font-weight: 600 }
.modal-body { flex: 1; overflow: auto; padding: 12px 16px }
.modal-foot { padding: 8px 16px; border-top: 1px solid var(--border); display: flex; gap: 6px; justify-content: flex-end }
.editor { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font: 12px/1.7 var(--mono); color: var(--t1); resize: vertical; width: 100%; min-height: 200px; outline: none }
.editor:focus { border-color: var(--pri) }

/* Improvement */
.split { flex: 1; display: flex; overflow: hidden }
.split-main { flex: 1; overflow-y: auto; padding: 20px 24px }
.split-side { width: 340px; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0 }
.chat-head { padding: 10px 12px; border-bottom: 1px solid var(--border); font: 600 12px var(--sans); display: flex; justify-content: space-between; align-items: center }
.chat-msgs { flex: 1; overflow-y: auto; padding: 10px }
.chat-msg { margin-bottom: 6px; padding: 8px 10px; border-radius: 6px; font-size: 12px; line-height: 1.5; max-width: 92% }
.chat-msg.u { background: var(--pri-bg); margin-left: auto }
.chat-msg.a { background: var(--input) }
.chat-msg .proposal { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; margin-top: 6px; font: 11px var(--mono) }
.chat-input { padding: 8px; border-top: 1px solid var(--border); display: flex; gap: 5px }
.chat-input textarea { flex: 1; background: var(--input); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font: 12px var(--sans); color: var(--t1); outline: none; resize: none; min-height: 32px; max-height: 80px }
.chat-input textarea:focus { border-color: var(--pri) }

/* Lessons */
.lesson-cat { margin-bottom: 4px }
.lesson-hdr { display: flex; align-items: center; gap: 6px; padding: 7px 10px; cursor: pointer; border-radius: 6px; transition: background .06s; user-select: none }
.lesson-hdr:hover { background: var(--hover) }
.lesson-hdr .arrow { font-size: 8px; color: var(--t4); transition: transform .15s; display: inline-block; width: 10px }
.lesson-hdr .arrow.open { transform: rotate(90deg) }
.lesson-hdr .cat-name { font: 600 12px var(--sans); flex: 1 }
.lesson-hdr .cat-count { background: var(--input); border-radius: 10px; padding: 1px 7px; font: 500 10px var(--sans); color: var(--t3) }
.lesson-items { padding: 2px 0 6px 18px }
.lesson-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px; cursor: pointer; border-radius: 6px; transition: background .06s; margin-bottom: 2px }
.lesson-item:hover { background: var(--hover) }
.lesson-item:hover .l-edit { opacity: 1 }
.lesson-item .l-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border-h); flex-shrink: 0; margin-top: 6px }
.lesson-item .l-body { flex: 1; min-width: 0 }
.lesson-item .l-rule { font: 600 12px var(--sans); margin-bottom: 1px }
.lesson-item .l-detail { font: 11px var(--sans); color: var(--t3); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4 }
.l-edit { font: 500 10px var(--sans); color: var(--pri); opacity: 0; transition: opacity .1s; flex-shrink: 0; padding: 2px 0 }

/* Memory */
.mem-layout { display: flex; flex: 1; overflow: hidden }
.mem-side { width: 220px; background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; padding: 10px }
.mem-side h3 { font: 500 9px var(--sans); text-transform: uppercase; letter-spacing: .1em; color: var(--t4); margin-bottom: 4px }
.mem-item { padding: 6px 8px; cursor: pointer; border-radius: 6px; margin-bottom: 2px; transition: background .06s }
.mem-item:hover { background: var(--hover) } .mem-item.on { background: var(--pri-bg) }
.mem-item .name { font: 500 12px var(--sans); margin-bottom: 1px }
.mem-type { font-size: 10px; padding: 1px 4px; border-radius: 3px; display: inline-block }
.t-user { background: var(--pri-bg); color: var(--pri) }
.t-feedback { background: var(--amb-bg); color: var(--amb) }
.t-project { background: var(--grn-bg); color: var(--grn) }
.t-reference { background: var(--red-bg); color: var(--red) }
.t-unknown { background: var(--input); color: var(--t3) }
.mem-detail { flex: 1; overflow-y: auto; padding: 20px 24px }
.mem-detail h2 { font-size: 16px; font-weight: 700; margin-bottom: 2px }
.mem-detail .desc { color: var(--t3); font-size: 12px; margin-bottom: 12px }
.mem-body { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; font: 12px/1.7 var(--mono); color: var(--t2); white-space: pre-wrap }

/* Analytics */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-bottom: 16px }
.stat-card { padding: 14px; text-align: center }
.stat-card .val { font: 700 22px var(--sans); margin-bottom: 1px }
.stat-card .lbl { font: 500 9px var(--sans); text-transform: uppercase; letter-spacing: .05em; color: var(--t3) }
.chart-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 10px; margin-bottom: 16px }
.chart-card { padding: 14px; min-height: 280px }
.chart-card h3 { font: 600 12px var(--sans); margin-bottom: 10px }
.pbar { margin-bottom: 5px; display: flex; align-items: center; gap: 6px; font-size: 11px }
.pbar-label { color: var(--t3); width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.pbar-track { flex: 1; height: 6px; background: var(--input); border-radius: 3px; overflow: hidden }
.pbar-fill { height: 100%; border-radius: 3px }
.pbar-val { font: 11px var(--mono); color: var(--t2); min-width: 44px; text-align: right }
.pill { padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--t3); cursor: pointer; font: 11px var(--sans); transition: all .08s }
.pill:hover { border-color: var(--border-h); color: var(--t2) }
.pill.on { background: var(--pri-bg); border-color: var(--pri); color: var(--pri) }
.top-row { padding: 8px 10px; display: flex; align-items: center; gap: 8px }
.top-row:hover { background: var(--hover) }
.top-rank { font: 700 16px var(--sans); color: var(--t4); min-width: 20px }
.top-info { flex: 1; overflow: hidden }
.top-name { font: 600 12px var(--sans); overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.top-meta { font-size: 10px; color: var(--t3) }
.top-cost { font: 700 13px var(--mono) }

/* Log Viewer */
.lv { display: flex; flex: 1; overflow: hidden }
.lv-sidebar { width: 220px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0 }
.lv-sidebar-head { padding: 10px 12px 6px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center }
.lv-sidebar-head h3 { font: 500 9px var(--sans); text-transform: uppercase; letter-spacing: .1em; color: var(--t4) }
.lv-file-list { flex: 1; overflow-y: auto; padding: 6px 0 }
.lv-file { padding: 6px 12px; cursor: pointer; transition: background .06s }
.lv-file:hover { background: var(--hover) }
.lv-file.on { background: var(--pri-bg) }
.lv-file-name { font: 500 11px var(--sans); color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 1px }
.lv-file.on .lv-file-name { color: var(--pri) }
.lv-file-meta { font: 10px var(--mono); color: var(--t4); display: flex; gap: 6px }
.lv-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0 }
.lv-toolbar { padding: 7px 12px; display: flex; gap: 6px; align-items: center; border-bottom: 1px solid var(--border); background: var(--card); flex-wrap: wrap }
.lv-toolbar label { font: 500 10px var(--sans); color: var(--t3) }
.lv-select { background: var(--input); border: 1px solid var(--border); border-radius: 5px; padding: 4px 7px; font: 11px var(--sans); color: var(--t1); outline: none }
.lv-search { background: var(--input); border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; font: 11px var(--sans); color: var(--t1); outline: none; width: 180px }
.lv-search:focus { border-color: var(--pri) }
.lv-search::placeholder { color: var(--t4) }
.lv-toggle { background: var(--input); border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; font: 500 10px var(--sans); color: var(--t2); cursor: pointer; transition: all .1s; white-space: nowrap }
.lv-toggle.on { background: var(--grn-bg); border-color: var(--grn); color: var(--grn) }
.lv-toggle:hover { border-color: var(--border-h) }
.lv-status { padding: 3px 12px; font: 10px var(--mono); color: var(--t4); border-bottom: 1px solid var(--border); background: var(--card); display: flex; gap: 10px }
.lv-output { flex: 1; overflow-y: auto; padding: 10px 14px; font: 11px/1.6 var(--mono); color: #C9D1D9; background: #0D1117 }
.lv-line { display: flex; gap: 8px; padding: 1px 0; border-radius: 2px }
.lv-line:hover { background: rgba(255,255,255,.04) }
.lv-line-num { color: #484F58; user-select: none; min-width: 44px; text-align: right; flex-shrink: 0; font-size: 10px }
.lv-line-text { flex: 1; word-break: break-all; white-space: pre-wrap }
.lv-match mark { background: rgba(255,214,0,.25); color: #FFD700; border-radius: 2px; padding: 0 1px }
.lv-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #484F58; font-size: 12px; background: #0D1117 }

/* Projects */
.proj-layout { display: flex; flex: 1; overflow: hidden }
.proj-side { width: 240px; background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; padding: 10px }
.proj-side h3 { font: 500 9px var(--sans); text-transform: uppercase; letter-spacing: .1em; color: var(--t4); margin-bottom: 6px }
.proj-item { padding: 8px 10px; cursor: pointer; border-radius: 6px; margin-bottom: 2px; transition: background .06s }
.proj-item:hover { background: var(--hover) }
.proj-item.on { background: var(--pri-bg) }
.proj-item .proj-name { font: 600 12px var(--sans); margin-bottom: 2px; display: flex; align-items: center; gap: 5px }
.proj-item.on .proj-name { color: var(--pri) }
.proj-item .proj-stats { font: 10px var(--mono); color: var(--t4); display: flex; gap: 8px }
.proj-item .proj-ctx-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0 }
.proj-detail { flex: 1; overflow-y: auto; padding: 20px 24px }
.proj-detail h2 { font-size: 16px; font-weight: 700; margin-bottom: 2px }
.proj-detail .proj-path { font: 11px var(--mono); color: var(--t3); margin-bottom: 12px; word-break: break-all }
.proj-info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-bottom: 16px }
.proj-info-card { padding: 12px; text-align: center }
.proj-info-card .val { font: 700 18px var(--sans); margin-bottom: 1px }
.proj-info-card .lbl { font: 500 9px var(--sans); text-transform: uppercase; letter-spacing: .05em; color: var(--t3) }
.proj-ctx-section { margin-bottom: 16px }
.proj-ctx-section h3 { font: 600 13px var(--sans); margin-bottom: 8px; display: flex; align-items: center; gap: 8px }
.proj-ctx-editor { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; font: 12px/1.7 var(--mono); color: var(--t1); resize: vertical; width: 100%; min-height: 180px; outline: none }
.proj-ctx-editor:focus { border-color: var(--pri) }
.proj-ctx-preview { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; font: 12px/1.7 var(--mono); color: var(--t2); white-space: pre-wrap; min-height: 80px; cursor: pointer; transition: border-color .1s }
.proj-ctx-preview:hover { border-color: var(--pri) }
.proj-ctx-hint { font: 11px var(--sans); color: var(--t4); margin-top: 6px }
.proj-sessions-list { margin-top: 12px }
.proj-session { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; margin-bottom: 4px; cursor: pointer; transition: background .06s }
.proj-session:hover { background: var(--hover) }
.proj-session .ps-title { flex: 1; font: 500 12px var(--sans); overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.proj-session .ps-time { font: 10px var(--mono); color: var(--t4); flex-shrink: 0 }
.proj-session .ps-meta { display: flex; gap: 8px; font: 10px var(--mono); color: var(--t4); flex-shrink: 0 }
.proj-session .ps-resume { background: var(--input); border: 1px solid var(--border); border-radius: 5px; padding: 2px 6px; font: 10px var(--mono); color: var(--pri); cursor: pointer; flex-shrink: 0; transition: all .08s }
.proj-session .ps-resume:hover { border-color: var(--pri); background: var(--pri-bg) }

/* Utils */
.empty { text-align: center; padding: 40px; color: var(--t4); font-size: 12px }
.toast { position: fixed; bottom: 16px; right: 16px; background: var(--grn); color: #fff; padding: 6px 14px; border-radius: var(--r); font: 500 12px var(--sans); opacity: 0; transition: all .3s; pointer-events: none; z-index: 100 }
.toast.show { opacity: 1; transform: translateY(-3px) }
.toast.toast-err { background: var(--red) }
.loading { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 40px; color: var(--t3); font-size: 12px }
.spin { width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--pri); border-radius: 50%; animation: sp .6s linear infinite }
.load-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 16px; padding: 60px 20px; animation: ls-in .3s ease }
@keyframes ls-in { from { opacity: 0 } to { opacity: 1 } }
.load-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--pri); border-radius: 50%; animation: sp .7s linear infinite }
.load-text { font: 500 13px var(--sans); color: var(--t3); letter-spacing: .02em }
.load-screen .load-bar { width: 180px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: -4px }
.load-screen .load-bar-fill { height: 100%; background: var(--pri); border-radius: 2px; animation: ls-bar 2s ease-in-out infinite }
@keyframes ls-bar { 0% { width: 0; margin-left: 0 } 50% { width: 60%; margin-left: 20% } 100% { width: 0; margin-left: 100% } }
@keyframes sp { to { transform: rotate(360deg) } }
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .4 } }

/* === Mode Toggle === */
.lp-mode-toggle { position: absolute; top: 16px; right: 20px; z-index: 10; pointer-events: auto; display: flex; gap: 4px; align-items: center }
.lp-mode-group { display: flex; background: rgba(0,0,0,.3); backdrop-filter: blur(12px); border-radius: 8px; padding: 3px; border: 1px solid rgba(255,255,255,.08) }
.lp-mode-btn { padding: 5px 14px; border-radius: 6px; font: 600 11px var(--sans); color: rgba(255,255,255,.4); background: none; border: none; cursor: pointer; transition: all .2s ease }
.lp-mode-btn:hover { color: rgba(255,255,255,.65) }
.lp-mode-btn.on { background: rgba(99,102,241,.2); color: #c7d2fe; box-shadow: inset 0 0 0 1px rgba(99,102,241,.15) }
.lp-set-btn { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; color: rgba(255,255,255,.35); font-size: 13px; transition: all .15s; position: relative }
.lp-set-btn:hover { color: rgba(255,255,255,.7); background: rgba(255,255,255,.06) }
.lp-set-btn.on { color: #a5b4fc; background: rgba(99,102,241,.15) }
.lp-set-btn svg { width: 14px; height: 14px; fill: currentColor }
.corp .lp-mode-group { background: var(--card); border-color: var(--border) }
.corp .lp-mode-btn { color: var(--t3) }
.corp .lp-mode-btn.on { background: var(--pri-bg); color: var(--pri) }

/* === Launch Pad 3D (Game Mode) === */
.lp { display: flex; flex: 1; overflow: hidden; position: relative }
.lp-scene { position: absolute; inset: 0; z-index: 0 }
.lp-scene canvas { display: block; width: 100% !important; height: 100% !important }
.lp-hud { position: absolute; inset: 0; z-index: 2; pointer-events: none; display: flex; flex-direction: column }
.lp-hud-top { padding: 24px 40px 0; pointer-events: none }
.lp-hud-top h1 { font: 900 28px var(--sans); color: #fff; letter-spacing: -.04em; margin: 0; text-shadow: 0 2px 24px rgba(0,0,0,.5) }
.lp-hud-top .lp-sub { font: 400 12px var(--sans); color: rgba(255,255,255,.55); margin-top: 3px }
.lp-hud-stats { display: flex; gap: 24px; margin-top: 10px }
.lp-hud-stats > div { display: flex; flex-direction: column }
.lp-hud-stats .lp-sv { font: 700 18px var(--sans); color: #fff; text-shadow: 0 1px 12px rgba(0,0,0,.4) }
.lp-hud-stats .lp-sl { font: 500 9px var(--sans); color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .1em }
.lp-tags { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden }
.lp-tag { position: absolute; pointer-events: auto; cursor: pointer; transform: translate(-50%, -100%); transition: opacity .15s, transform .15s ease }
.lp-tag:hover { transform: translate(-50%, -100%) scale(1.08); z-index: 5 }
.lp-tag-inner { background: rgba(12,12,20,.7); border: 1px solid rgba(255,255,255,.08); border-radius: 6px; padding: 2px 7px; text-align: center; white-space: nowrap; transition: all .2s ease; box-shadow: 0 1px 4px rgba(0,0,0,.3) }
.lp-tag:hover .lp-tag-inner, .lp-tag.active .lp-tag-inner { background: rgba(15,15,25,.92); border-color: rgba(99,102,241,.5); padding: 4px 10px; box-shadow: 0 0 12px rgba(99,102,241,.2) }
.lp-tag-name { font: 600 9px var(--sans); color: #fff; letter-spacing: .01em; text-shadow: 0 1px 3px rgba(0,0,0,.4) }
.lp-tag-meta { font: 500 8px var(--sans); color: rgba(255,255,255,.35); margin-top: 1px; max-height: 0; overflow: hidden; opacity: 0; transition: max-height .2s, opacity .2s }
.lp-tag:hover .lp-tag-meta, .lp-tag.active .lp-tag-meta { max-height: 20px; opacity: 1 }
.lp-tag-line { position: absolute; left: 50%; bottom: -8px; width: 1px; height: 8px; background: linear-gradient(to bottom, rgba(255,255,255,.15), transparent) }

/* === Center Panel (shared game+corp) === */
.lp-panel { position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%); width: min(860px, calc(100% - 40px)); max-height: 55%; z-index: 5; pointer-events: auto; display: flex; flex-direction: column }
.lp-cfg { background: rgba(10,10,18,.88); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 18px 22px; display: flex; flex-direction: column; flex: 1; overflow-y: auto; animation: lp-cfg-in .3s ease both; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent }
@keyframes lp-cfg-in { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: none } }
.lp-cfg-top { display: flex; gap: 20px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,.06) }
.lp-cfg-info { flex: 1; min-width: 0 }
.lp-cfg-info h2 { font: 700 17px var(--sans); color: #fff; margin-bottom: 2px }
.lp-cfg-info .lp-cfg-sub { font: 12px var(--sans); color: rgba(255,255,255,.35) }
.lp-cfg-actions { display: flex; gap: 8px; align-items: flex-start; flex-shrink: 0 }
.lp-cfg-close { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 7px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.4); font-size: 14px; cursor: pointer; transition: all .12s }
.lp-cfg-close:hover { background: rgba(255,255,255,.12); color: #fff }
.lp-cfg-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px }
.lp-cfg-col { display: flex; flex-direction: column; gap: 10px }
.lp-cfg-sec { margin-bottom: 0 }
.lp-cfg-sec h3 { font: 600 9px var(--sans); color: rgba(255,255,255,.3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px }
.lp-pills { display: flex; flex-wrap: wrap; gap: 4px }
.lp-pill { padding: 4px 9px; border-radius: 6px; font: 500 11px var(--sans); color: rgba(255,255,255,.5); background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); cursor: pointer; transition: all .12s ease; user-select: none }
.lp-pill:hover { border-color: rgba(255,255,255,.18); background: rgba(255,255,255,.08) }
.lp-pill.on { background: rgba(99,102,241,.15); border-color: rgba(99,102,241,.5); color: #a5b4fc; font-weight: 600 }
.lp-pill.sk.on { background: rgba(52,211,153,.12); border-color: rgba(52,211,153,.5); color: #6ee7b7 }
.lp-pill.mem.on { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.5); color: #fbbf24 }
.lp-pill.model { font: 600 11px var(--mono) }
.lp-pill.model.on { background: rgba(168,85,247,.15); border-color: rgba(168,85,247,.5); color: #c4b5fd }
.lp-cfg-btns { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.06) }
.lp-launch { flex: 1; padding: 12px; border: none; border-radius: 10px; font: 700 12px var(--sans); color: #fff; background: linear-gradient(135deg, #5B5FE6 0%, #818cf8 50%, #6366f1 100%); background-size: 200% 200%; cursor: pointer; transition: all .2s ease; letter-spacing: .01em; position: relative; overflow: hidden }
.lp-launch::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,.15) 50%, transparent 70%); background-size: 250% 250%; animation: lp-shimmer 3s ease-in-out infinite }
@keyframes lp-shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
.lp-launch:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,.4) }
.lp-launch:active { transform: none }
.lp-launch:disabled { opacity: .5; cursor: wait }
.lp-launch.sec { background: rgba(255,255,255,.06); color: rgba(255,255,255,.6); flex: 0 }
.lp-launch.sec::before { display: none }
.lp-launch.sec:hover { background: rgba(255,255,255,.1); color: #fff; box-shadow: none }
.lp-sessions { margin-top: 4px }
.lp-sess { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.04); font: 12px var(--sans) }
.lp-sess:last-child { border: none }
.lp-sess .lps-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: rgba(255,255,255,.5) }
.lp-sess .lps-meta { font: 10px var(--mono); color: rgba(255,255,255,.2); flex-shrink: 0 }
.lp-sess .lps-btn { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); border-radius: 5px; padding: 2px 8px; font: 500 10px var(--mono); color: #a5b4fc; cursor: pointer; flex-shrink: 0; transition: all .1s }
.lp-sess .lps-btn:hover { border-color: rgba(99,102,241,.5); background: rgba(99,102,241,.12) }
.lp-hint { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 2; pointer-events: none; font: 500 11px var(--sans); color: rgba(255,255,255,.35); animation: lp-hint-pulse 3s ease infinite }
@keyframes lp-hint-pulse { 0%, 100% { opacity: .4 } 50% { opacity: .7 } }

.agent-detail { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); width: min(360px, calc(100% - 40px)); max-height: 65vh; z-index: 15; pointer-events: auto; background: rgba(10,10,18,.94); backdrop-filter: blur(24px); border: 1px solid rgba(99,102,241,.15); border-radius: 16px; padding: 0; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 12px 48px rgba(0,0,0,.6), 0 0 32px rgba(99,102,241,.12); animation: ad-in .2s ease }
@keyframes ad-in { from { opacity: 0; transform: translateY(-48%) translateX(12px) } to { opacity: 1; transform: translateY(-50%) translateX(0) } }
.ad-header { padding: 10px 16px 8px; border-bottom: 1px solid rgba(255,255,255,.06) }
.ad-name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px }
.ad-name-input { flex: 1; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 8px; padding: 6px 12px; font: 700 16px var(--sans); color: #fff; outline: none; transition: border-color .15s }
.ad-name-input:focus { border-color: rgba(99,102,241,.5) }
.ad-close { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 7px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.4); font-size: 15px; cursor: pointer; transition: all .12s; flex-shrink: 0 }
.ad-close:hover { background: rgba(255,255,255,.12); color: #fff }
.ad-desc { font: 400 12px/1.5 var(--sans); color: rgba(255,255,255,.45); margin-bottom: 6px }
.ad-model-row { display: flex; gap: 6px; align-items: center }
.ad-model-pill { padding: 3px 10px; border-radius: 6px; font: 600 10px var(--mono); cursor: pointer; transition: all .12s; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04); color: rgba(255,255,255,.4) }
.ad-model-pill.on { background: rgba(168,85,247,.15); border-color: rgba(168,85,247,.5); color: #c4b5fd }
.ad-body { flex: 1; overflow-y: auto; padding: 8px 16px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent }
.ad-section { margin-bottom: 14px }
.ad-section-title { font: 600 9px var(--sans); color: rgba(255,255,255,.3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px }
.ad-tools { display: flex; flex-wrap: wrap; gap: 5px }
.ad-tool { padding: 4px 10px; border-radius: 6px; font: 500 11px var(--sans); border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04); color: rgba(255,255,255,.45); cursor: pointer; transition: all .12s }
.ad-tool.on { background: rgba(99,102,241,.12); border-color: rgba(99,102,241,.4); color: #a5b4fc }
.ad-tool:hover { border-color: rgba(255,255,255,.2) }
.ad-mem-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05); margin-bottom: 4px; cursor: pointer; transition: all .12s }
.ad-mem-item:hover { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.12) }
.ad-mem-icon { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0 }
.ad-mem-name { font: 500 11px var(--sans); color: rgba(255,255,255,.6); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.ad-mem-type { font: 500 9px var(--mono); color: rgba(255,255,255,.25); flex-shrink: 0 }
.ad-sess-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.04); font: 12px var(--sans) }
.ad-sess-item:last-child { border: none }
.ad-sess-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: rgba(255,255,255,.5); cursor: pointer }
.ad-sess-title:hover { color: #a5b4fc }
.ad-sess-time { font: 10px var(--mono); color: rgba(255,255,255,.2); flex-shrink: 0 }
.ad-co-agents { display: flex; flex-wrap: wrap; gap: 4px }
.ad-co-chip { padding: 3px 9px; border-radius: 5px; font: 500 10px var(--sans); background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.2); color: rgba(165,180,252,.7); cursor: pointer; transition: all .12s }
.ad-co-chip:hover { background: rgba(99,102,241,.15); color: #a5b4fc }
.ad-footer { padding: 10px 16px; border-top: 1px solid rgba(255,255,255,.06); display: flex; gap: 8px; flex-shrink: 0 }
.ad-btn { flex: 1; padding: 10px 14px; border-radius: 10px; border: none; font: 600 12px var(--sans); cursor: pointer; transition: all .15s }
.ad-btn-secondary { background: rgba(255,255,255,.06); color: rgba(255,255,255,.6) }
.ad-btn-secondary:hover { background: rgba(255,255,255,.12); color: #fff }
.ad-btn-primary { background: linear-gradient(135deg, #5B5FE6, #818cf8); color: #fff }
.ad-btn-primary:hover { box-shadow: 0 6px 20px rgba(99,102,241,.35) }
.ad-empty { font: 400 11px var(--sans); color: rgba(255,255,255,.2); padding: 8px 0; font-style: italic }

/* Speech Bubbles */
.speech-bubble { position: absolute; pointer-events: none; z-index: 15; animation: bubble-in .3s ease; max-width: 140px; transition: opacity .4s ease; opacity: .75 }
.speech-bubble.fading { opacity: 0 }
.speech-bubble-inner { background: rgba(10,10,18,.6); border: 1px solid rgba(129,140,248,.12); border-radius: 6px 6px 6px 2px; padding: 3px 6px; backdrop-filter: blur(6px); box-shadow: 0 1px 4px rgba(0,0,0,.15) }
.speech-bubble-inner::after { content: ''; position: absolute; bottom: -4px; left: 5px; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 4px solid rgba(10,10,18,.6) }
.speech-bubble-inner .sb-agent { font: 600 7px var(--sans); color: rgba(129,140,248,.6); margin-bottom: 1px; text-transform: uppercase; letter-spacing: .3px }
.speech-bubble-inner .sb-text { font: 400 9px var(--sans); color: rgba(255,255,255,.55); line-height: 1.3 }
@keyframes bubble-in { from { opacity: 0; transform: translateY(8px) scale(.9) } to { opacity: 1; transform: none } }

/* Bus Message Input */
.bus-input-wrap { display: flex; gap: 4px; margin-top: 8px }
.bus-input { flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.06); color: #fff; font: 12px var(--sans); outline: none }
.bus-input:focus { border-color: rgba(99,102,241,.5) }
.bus-input::placeholder { color: rgba(255,255,255,.25) }
.bus-send { padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(99,102,241,.4); background: rgba(99,102,241,.2); color: #a5b4fc; font: 600 11px var(--sans); cursor: pointer }
.bus-send:hover { background: rgba(99,102,241,.4) }

/* Alert Toasts */
.alert-stack { position: absolute; top: 56px; right: 16px; width: 300px; z-index: 25; display: flex; flex-direction: column; gap: 6px; pointer-events: none }
.alert-toast { pointer-events: auto; display: flex; gap: 8px; padding: 10px 14px; background: rgba(10,10,18,.92); border: 1px solid rgba(99,102,241,.3); border-radius: 10px; backdrop-filter: blur(12px); animation: alert-in .3s ease; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,.4); transition: all .3s ease }
.alert-toast:hover { border-color: rgba(99,102,241,.5); box-shadow: 0 8px 24px rgba(99,102,241,.15); transform: translateX(-4px) }
@keyframes alert-in { from { opacity: 0; transform: translateX(40px) } to { opacity: 1; transform: none } }
.alert-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; animation: wp-pulse 1.5s infinite }
.alert-body { flex: 1; min-width: 0 }
.alert-worker { font: 700 11px var(--sans); color: #a5b4fc; margin-bottom: 2px }
.alert-text { font: 11px var(--sans); color: rgba(255,255,255,.8); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden }
.alert-done { border-color: rgba(16,185,129,.5); box-shadow: 0 8px 24px rgba(16,185,129,.15) }
.alert-time { font: 9px var(--mono); color: rgba(255,255,255,.3); margin-top: 3px }

/* Routing Hint */
.routing-hint { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.35); border-radius: 8px; padding: 8px 18px; font: 500 12px var(--sans); color: #fbbf24; z-index: 20; pointer-events: none; white-space: nowrap; backdrop-filter: blur(8px); animation: ss-pop .2s ease both }

/* Smart Suggestions */
.smart-suggestions { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 15; pointer-events: auto }
.ss-pill { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,.1); background: rgba(8,8,24,.75); backdrop-filter: blur(8px); color: rgba(255,255,255,.85); font: 500 11px var(--sans); cursor: pointer; transition: all .15s; white-space: nowrap; animation: ss-pop .2s ease both }
.ss-pill:hover { border-color: rgba(99,102,241,.5); background: rgba(99,102,241,.15); color: #fff; transform: translateY(-1px) }
.ss-icon { font-size: 13px; line-height: 1 }
.ss-label { font-weight: 600 }
.ss-agent { font: 400 9px var(--mono); color: rgba(255,255,255,.3); margin-left: 2px }
.ss-pill:hover .ss-agent { color: rgba(255,255,255,.6) }
@keyframes ss-pop { from { opacity: 0; transform: translateY(-6px) } to { opacity: 1; transform: translateY(0) } }

/* Game Chat (bottom-left log) */
.game-chat { display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,.3); pointer-events: auto; border-radius: 10px; position: relative }
.gc-header { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: rgba(10,10,18,.88); border: 1px solid rgba(255,255,255,.1); border-bottom: none; border-radius: 10px 10px 0 0; backdrop-filter: blur(12px) }
.gc-title { font: 600 10px var(--sans); color: rgba(255,255,255,.55); text-transform: uppercase; letter-spacing: .06em }
.gc-badge { font: 700 9px var(--sans); background: rgba(99,102,241,.2); color: #818cf8; padding: 1px 5px; border-radius: 4px; min-width: 14px; text-align: center }
.gc-body { flex: 1; overflow-y: auto; background: rgba(10,10,18,.82); border: 1px solid rgba(255,255,255,.1); border-top: none; border-radius: 0 0 10px 10px; backdrop-filter: blur(12px); scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent }
.gc-msg { display: flex; gap: 6px; padding: 5px 10px; border-bottom: 1px solid rgba(255,255,255,.05); animation: bubble-in .2s ease }
.gc-msg:last-child { border-bottom: none }
.gc-msg-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 5px; flex-shrink: 0 }
.gc-msg-worker { font: 700 10px var(--sans); color: #818cf8 }
.gc-msg-text { font: 11px var(--sans); color: rgba(255,255,255,.75); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden }
.gc-msg-time { font: 8px var(--mono); color: rgba(255,255,255,.3); margin-top: 2px }
.gc-empty { font: 11px var(--sans); color: rgba(255,255,255,.35); text-align: center; padding: 16px 10px; font-style: italic }

/* Skill Rack (draggable inventory panel) */
.skill-rack { display: flex; flex-direction: column; width: 100%; height: 100%; background: rgba(10,10,22,.9); border: 1px solid rgba(99,102,241,.22); border-radius: 14px; backdrop-filter: blur(20px); overflow: hidden; animation: rack-in .25s ease; box-shadow: 0 8px 32px rgba(0,0,0,.35), 0 0 40px rgba(99,102,241,.06) }
@keyframes rack-in { from { opacity: 0; transform: translateX(30px) } to { opacity: 1; transform: none } }
.rack-header { padding: 8px 10px 6px; border-bottom: 1px solid rgba(255,255,255,.06); flex-shrink: 0 }
.rack-title { font: 700 10px var(--sans); color: rgba(255,255,255,.75); text-transform: uppercase; letter-spacing: .08em }
.rack-filters { display: flex; gap: 3px; margin-top: 5px; flex-wrap: wrap }
.rack-pill { font: 500 8px var(--sans); padding: 2px 6px; border-radius: 8px; background: rgba(255,255,255,.06); color: rgba(255,255,255,.5); cursor: pointer; border: 1px solid transparent; transition: all .15s }
.rack-pill:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.5) }
.rack-pill.on { background: rgba(99,102,241,.15); color: #818cf8; border-color: rgba(99,102,241,.25) }
.rack-search { width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06); border-radius: 5px; padding: 4px 7px; font: 400 10px var(--sans); color: #fff; outline: none; margin-top: 5px }
.rack-search::placeholder { color: rgba(255,255,255,.2) }
.rack-body { flex: 1; overflow-y: auto; padding: 4px 6px }
.rack-body::-webkit-scrollbar { width: 3px } .rack-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px }
.rack-section { margin-top: 6px }
.rack-section-title { font: 600 8px var(--sans); color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: .06em; padding: 2px 4px; margin-bottom: 3px }
.rack-chip { display: flex; align-items: center; gap: 5px; padding: 4px 6px; border-radius: 5px; cursor: grab; transition: all .15s; border: 1px solid transparent; margin-bottom: 2px }
.rack-chip:hover { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.08) }
.rack-chip:active { cursor: grabbing }
.rack-chip.dragging { opacity: .4 }
.rack-chip-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0 }
.rack-chip-name { font: 500 9px var(--sans); color: rgba(255,255,255,.8); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.rack-chip-lang { font: 400 7px var(--mono); color: rgba(255,255,255,.2); flex-shrink: 0 }
.rack-proj { display: flex; align-items: center; gap: 5px; padding: 5px 6px; border-radius: 5px; cursor: grab; margin-bottom: 2px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05) }
.rack-proj:hover { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.1) }
.rack-proj-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0 }
.rack-proj-name { font: 500 9px var(--sans); color: rgba(255,255,255,.65); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.rack-proj-count { font: 400 8px var(--mono); color: rgba(255,255,255,.2) }
.rack-footer { padding: 5px 8px; border-top: 1px solid rgba(255,255,255,.06); flex-shrink: 0 }
.rack-footer-text { font: 400 8px var(--sans); color: rgba(255,255,255,.35); text-align: center }
.drop-highlight { outline: 2px dashed rgba(99,102,241,.5); outline-offset: -2px; background: rgba(99,102,241,.08) !important }
.rack-toggle { position: absolute; right: 12px; top: 48px; z-index: 7; background: rgba(8,8,20,.7); border: 1px solid rgba(99,102,241,.2); border-radius: 6px; padding: 4px 8px; font: 500 9px var(--sans); color: rgba(255,255,255,.5); cursor: pointer; pointer-events: auto; backdrop-filter: blur(8px) }
.rack-toggle:hover { color: #818cf8; border-color: rgba(99,102,241,.4) }

/* Worker Activity Panel */
.wap { display: flex; flex-direction: column; pointer-events: auto; animation: ca-slide-in .2s ease; overflow: hidden }
.wap-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(10,10,18,.92); border: 1px solid rgba(255,255,255,.12); border-radius: 10px 10px 0 0; backdrop-filter: blur(12px); cursor: pointer }
.wap-header:hover { background: rgba(15,15,30,.95) }
.wap-title { font: 600 10px var(--sans); color: rgba(255,255,255,.55); text-transform: uppercase; letter-spacing: .06em }
.wap-count { font: 700 9px var(--sans); background: rgba(52,211,153,.15); color: #34d399; padding: 1px 5px; border-radius: 4px }
.wap-body { flex: 1; background: rgba(10,10,18,.85); border: 1px solid rgba(255,255,255,.1); border-top: none; border-radius: 0 0 10px 10px; backdrop-filter: blur(12px); overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent }
.wap-worker { padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,.05); cursor: pointer; transition: background .1s }
.wap-worker:hover { background: rgba(99,102,241,.08) }
.wap-worker:last-child { border-bottom: none }
.wap-worker-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 2px }
.wap-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0 }
.wap-name { font: 600 11px var(--sans); color: #fff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.wap-status { font: 500 8px var(--mono); text-transform: uppercase; letter-spacing: .04em }
.wap-tool { font: 400 9px var(--mono); color: rgba(255,255,255,.35); overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.wap-collapsed .wap-body { display: none }
.wap-collapsed .wap-header { border-radius: 10px }
.wap-toggle { position: absolute; right: 12px; bottom: 16px; z-index: 12; background: rgba(8,8,20,.7); border: 1px solid rgba(52,211,153,.2); border-radius: 6px; padding: 4px 8px; font: 500 9px var(--sans); color: rgba(52,211,153,.6); cursor: pointer; pointer-events: auto; backdrop-filter: blur(8px) }
.wap-toggle:hover { color: #34d399; border-color: rgba(52,211,153,.4) }
.panel-resize-handle { position: absolute; right: 0; bottom: 0; width: 20px; height: 20px; cursor: nwse-resize; z-index: 20; opacity: .5; transition: opacity .15s }
.panel-resize-handle:hover { opacity: .9 }
.panel-resize-handle::after { content: ''; position: absolute; right: 2px; bottom: 2px; width: 10px; height: 10px; border-right: 2px solid rgba(255,255,255,.6); border-bottom: 2px solid rgba(255,255,255,.6) }
.panel-drag-header { cursor: grab; user-select: none }
.panel-drag-header:active { cursor: grabbing }

/* Keyboard Hints */
.kb-hints { position: absolute; right: 16px; bottom: 16px; z-index: 5; display: flex; gap: 10px; pointer-events: none; opacity: .5; transition: opacity .3s }
.kb-hints:hover { opacity: .8 }
.kb-hint { display: flex; align-items: center; gap: 3px; font: 400 9px var(--sans); color: rgba(255,255,255,.35) }
.kb-key { display: inline-block; padding: 1px 5px; border-radius: 3px; background: rgba(255,255,255,.08); color: rgba(255,255,255,.45); font: 600 8px var(--mono); border: 1px solid rgba(255,255,255,.1) }

/* Minimap */
.minimap-wrap { position: absolute; left: 50%; bottom: 50px; transform: translateX(-50%); z-index: 6; pointer-events: none; opacity: .7; transition: opacity .3s }
.minimap-wrap:hover { opacity: 1; pointer-events: auto }
.minimap-canvas { border-radius: 8px; border: 1px solid rgba(99,102,241,.15); box-shadow: 0 4px 16px rgba(0,0,0,.3) }
/* Settings dropdown */
.set-menu { position: absolute; top: 100%; right: 0; margin-top: 6px; min-width: 160px; background: rgba(15,15,30,.95); backdrop-filter: blur(16px); border-radius: 10px; border: 1px solid rgba(99,102,241,.2); padding: 6px; z-index: 20; animation: fs-pop .15s ease }
.set-menu-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; cursor: pointer; font: 500 11px var(--sans); color: rgba(255,255,255,.6); transition: background .12s }
.set-menu-item:hover { background: rgba(255,255,255,.06) }
.set-menu-item svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0 }
.set-menu-item span { flex: 1 }
.set-toggle { width: 28px; height: 16px; border-radius: 8px; background: rgba(255,255,255,.12); position: relative; transition: background .15s; flex-shrink: 0 }
.set-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 6px; background: rgba(255,255,255,.4); transition: transform .15s, background .15s }
.set-toggle.on { background: rgba(99,102,241,.5) }
.set-toggle.on::after { transform: translateX(12px); background: #c7d2fe }
/* Desk picker in footer */
.desk-slots { display: flex; gap: 3px; flex: none }
.desk-slot { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.2); color: rgba(255,255,255,.5); font: 600 12px var(--sans); cursor: pointer; transition: all .15s; position: relative }
.desk-slot:hover { background: rgba(99,102,241,.2); color: #c7d2fe; border-color: rgba(99,102,241,.4) }
.desk-slot .dot { position: absolute; top: 3px; right: 3px; width: 5px; height: 5px; border-radius: 3px }
/* Break scheduler popup */
.break-popup { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 50; width: 340px; background: rgba(15,15,35,.97); backdrop-filter: blur(20px); border-radius: 16px; border: 1px solid rgba(99,102,241,.3); padding: 24px; animation: fs-pop .2s ease; box-shadow: 0 20px 60px rgba(0,0,0,.6) }
.break-popup h3 { margin: 0 0 16px; font: 700 16px var(--sans); color: #e2e8f0 }
.break-presets { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px }
.break-preset { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: 10px; background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.15); cursor: pointer; transition: all .15s; font: 500 13px var(--sans); color: rgba(255,255,255,.7) }
.break-preset:hover { background: rgba(99,102,241,.18); border-color: rgba(99,102,241,.35); color: #e2e8f0 }
.break-preset .bp-time { font: 600 12px var(--mono); color: #a5b4fc }
.break-custom { display: flex; gap: 6px; margin-bottom: 12px }
.break-custom input { flex: 1; padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: #e2e8f0; font: 500 13px var(--sans); outline: none }
.break-custom input:focus { border-color: rgba(99,102,241,.4) }
.break-custom button { padding: 8px 16px; border-radius: 8px; background: rgba(99,102,241,.3); border: 1px solid rgba(99,102,241,.4); color: #c7d2fe; font: 600 12px var(--sans); cursor: pointer }
.break-active { padding: 12px 16px; border-radius: 10px; background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between }
.break-active .ba-time { font: 700 20px var(--mono); color: #6ee7b7 }
.break-active .ba-label { font: 500 11px var(--sans); color: rgba(255,255,255,.5) }
.break-active button { padding: 4px 10px; border-radius: 6px; background: rgba(239,68,68,.2); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; font: 600 10px var(--sans); cursor: pointer }
/* Break reminder fullscreen */
.break-remind { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.85); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; animation: fade-in .3s ease }
.break-remind-card { text-align: center; padding: 48px 64px; border-radius: 24px; background: linear-gradient(135deg, rgba(99,102,241,.15), rgba(16,185,129,.1)); border: 2px solid rgba(99,102,241,.3); animation: fs-pop .3s ease }
.break-remind-card h1 { font: 800 36px var(--sans); color: #e2e8f0; margin: 0 0 8px }
.break-remind-card p { font: 400 16px var(--sans); color: rgba(255,255,255,.6); margin: 0 0 32px }
.break-remind-card .br-actions { display: flex; gap: 12px; justify-content: center }
.break-remind-card button { padding: 12px 32px; border-radius: 12px; font: 600 14px var(--sans); cursor: pointer; border: none; transition: all .15s }
.br-skip { background: rgba(255,255,255,.08); color: rgba(255,255,255,.6) }
.br-skip:hover { background: rgba(255,255,255,.15) }
.br-take { background: rgba(16,185,129,.3); color: #6ee7b7; border: 1px solid rgba(16,185,129,.4) !important }
.br-take:hover { background: rgba(16,185,129,.45) }
/* Wake lock indicator */
.wake-dot { width: 6px; height: 6px; border-radius: 3px; background: #10b981; animation: wake-pulse 2s infinite }
@keyframes wake-pulse { 0%,100% { opacity: 1 } 50% { opacity: .4 } }

/* Terminal View (embedded terminal panel) */
.term-view { position: absolute; inset: 0; width: 100%; height: 100%; background: rgba(8,8,16,.97); border: 1px solid rgba(99,102,241,.12); z-index: 20; display: flex; flex-direction: column; backdrop-filter: blur(20px); animation: term-slide .2s ease; box-shadow: 0 8px 32px rgba(0,0,0,.4); border-radius: 12px }
.multi-term-grid .term-view { position: relative; height: 100%; width: 100%; border-radius: 8px; animation: none }
.multi-term-grid .term-body { flex: 1; min-height: 0 }
.multi-term-grid .term-header { padding: 4px 10px }
.multi-term-grid .term-input-area { padding: 4px }
.multi-term-grid .term-tabs { font-size: 10px }
@keyframes term-slide { from { transform: translateX(100%) } to { transform: none } }
.term-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.08); flex-shrink: 0 }
.term-dots { display: flex; gap: 5px }
.term-dot { width: 8px; height: 8px; border-radius: 50% }
.term-title-wrap { flex: 1; min-width: 0 }
.term-title { font: 600 12px var(--sans); color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.term-subtitle { font: 11px var(--sans); color: rgba(255,255,255,.35) }
.term-close { background: none; border: none; color: rgba(255,255,255,.3); font-size: 18px; cursor: pointer; padding: 2px 6px; line-height: 1 }
.term-close:hover { color: #fff }
.term-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,.06); flex-shrink: 0 }
.term-tab { padding: 8px 14px; font: 500 11px var(--sans); color: rgba(255,255,255,.35); cursor: pointer; border-bottom: 2px solid transparent; transition: all .1s }
.term-tab:hover { color: rgba(255,255,255,.6) }
.term-tab.on { color: #a5b4fc; border-color: #6366f1 }
.term-body { flex: 1; overflow-y: auto; padding: 12px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent }
.term-msg { margin-bottom: 10px; animation: bubble-in .15s ease }
.term-msg-role { font: 700 10px var(--sans); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px }
.term-msg-role.user { color: #34d399 }
.term-msg-role.assistant { color: #818cf8 }
.term-msg-text { font: 12px/1.6 var(--mono); color: rgba(255,255,255,.75); white-space: pre-wrap; word-break: break-word }
.term-msg-tool { font: 11px var(--mono); color: rgba(255,255,255,.35); padding: 4px 8px; background: rgba(255,255,255,.03); border-radius: 4px; border-left: 2px solid rgba(99,102,241,.3); margin: 4px 0 }
.term-msg-tool b { color: rgba(255,255,255,.5); font-weight: 600 }
.term-msg-thinking { font: 11px/1.5 var(--sans); color: rgba(255,255,255,.25); font-style: italic; padding: 4px 0; border-left: 2px solid rgba(255,255,255,.08); padding-left: 8px }
.term-empty { font: 12px var(--sans); color: rgba(255,255,255,.2); text-align: center; padding: 40px 20px }
.term-input-area { padding: 10px 12px; border-top: 1px solid rgba(255,255,255,.08); flex-shrink: 0 }
.term-input-row { display: flex; gap: 6px }
.term-input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04); color: #fff; font: 12px var(--mono); outline: none; resize: none; min-height: 36px; max-height: 100px }
.term-input:focus { border-color: rgba(99,102,241,.5) }
.term-input::placeholder { color: rgba(255,255,255,.2) }
.fs-terminal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; animation: fade-in .15s ease }
@keyframes fade-in { from { opacity: 0 } to { opacity: 1 } }
@keyframes spin { to { transform: rotate(360deg) } }
.fs-terminal { width: 90vw; height: 90vh; position: relative }
.fs-terminal .term-view { position: absolute; inset: 0; width: 100%; border-radius: 12px; border: 1px solid rgba(99,102,241,.2); animation: fs-pop .2s cubic-bezier(.34,1.56,.64,1) }
@keyframes fs-pop { from { transform: scale(.95); opacity: 0 } to { transform: none; opacity: 1 } }
.term-send { padding: 8px 14px; border-radius: 8px; border: none; background: linear-gradient(135deg, #5B5FE6, #818cf8); color: #fff; font: 600 11px var(--sans); cursor: pointer }
.term-send:hover { box-shadow: 0 4px 12px rgba(99,102,241,.3) }
.term-send:disabled { opacity: .4; cursor: default }
.term-ctx { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,.06); flex-shrink: 0 }
.term-ctx-title { font: 600 9px var(--sans); color: rgba(255,255,255,.25); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px }
.term-ctx-chips { display: flex; gap: 4px; flex-wrap: wrap }
.term-ctx-chip { padding: 2px 8px; border-radius: 4px; font: 500 10px var(--sans); background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.2); color: #a5b4fc; cursor: pointer }
.term-ctx-chip:hover { background: rgba(99,102,241,.2) }
.term-bus-item { display: flex; gap: 6px; align-items: flex-start; padding: 6px 8px; margin-bottom: 3px; border-radius: 6px; background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.04) }
.term-bus-agent { font: 600 10px var(--sans); color: #818cf8 }
.term-bus-msg { font: 11px var(--sans); color: rgba(255,255,255,.5); line-height: 1.3 }
.term-bus-time { font: 9px var(--mono); color: rgba(255,255,255,.15); margin-top: 2px }
.term-status { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(255,255,255,.02); border-bottom: 1px solid rgba(255,255,255,.06); flex-shrink: 0 }
.term-status-dot { width: 6px; height: 6px; border-radius: 50%; background: #34d399; animation: wp-pulse 2s infinite }
.term-status-info { font: 11px var(--sans); color: rgba(255,255,255,.4) }
.term-status-info b { color: rgba(255,255,255,.7) }
.term-title-edit { font: 600 12px var(--sans); color: #fff; background: rgba(255,255,255,.08); border: 1px solid rgba(99,102,241,.4); border-radius: 4px; padding: 2px 6px; outline: none; width: 100% }

/* === Corporate Mode === */
.corp.lp { background: var(--bg) }
.corp .lp-scene, .corp .lp-tags, .corp .lp-hint { display: none }
.corp .lp-hud { position: relative; pointer-events: auto; flex: 1; overflow-y: auto }
.corp .lp-hud-top { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 32px 16px }
.corp .lp-hud-top h1 { color: var(--t1); font-size: 22px; text-shadow: none }
.corp .lp-hud-top .lp-sub { color: var(--t3) }
.corp .lp-hud-stats .lp-sv { color: var(--t1); text-shadow: none }
.corp .lp-hud-stats .lp-sl { color: var(--t4) }
.corp .lp-corp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 20px 32px }
.corp .lp-corp-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all .2s ease; animation: lp-in .35s ease both }
@keyframes lp-in { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: none } }
.corp .lp-corp-card:hover { border-color: var(--border-h); box-shadow: 0 4px 16px rgba(0,0,0,.06); transform: translateY(-2px) }
.corp .lp-corp-card.on { border-color: var(--pri); box-shadow: 0 0 0 1.5px var(--pri), 0 4px 16px rgba(99,102,241,.08) }
.corp .lp-corp-card .cc-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px }
.corp .lp-corp-card .cc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0 }
.corp .lp-corp-card .cc-name { font: 700 13px var(--sans); color: var(--t1) }
.corp .lp-corp-card .cc-stats { font: 11px var(--sans); color: var(--t3); display: flex; gap: 12px }
.corp .lp-corp-card .cc-time { font: 10px var(--sans); color: var(--t4); margin-top: 3px }
.corp .lp-panel { position: relative; left: auto; bottom: auto; transform: none; width: auto; max-height: none; margin: 0 32px 20px; pointer-events: auto }
.corp .lp-cfg { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; backdrop-filter: none }
.corp .lp-cfg-info h2 { color: var(--t1) }
.corp .lp-cfg-info .lp-cfg-sub { color: var(--t3) }
.corp .lp-cfg-top { border-color: var(--border) }
.corp .lp-cfg-sec h3 { color: var(--t4) }
.corp .lp-pill { color: var(--t2); background: var(--input); border-color: var(--border) }
.corp .lp-pill:hover { background: var(--hover); border-color: var(--border-h) }
.corp .lp-pill.on { background: var(--pri-bg); border-color: var(--pri); color: var(--pri) }
.corp .lp-pill.sk.on { background: var(--grn-bg); border-color: var(--grn); color: var(--grn) }
.corp .lp-pill.mem.on { background: rgba(245,158,11,.06); border-color: var(--amb); color: var(--amb) }
.corp .lp-pill.model.on { background: rgba(139,92,246,.06); border-color: #8b5cf6; color: #7c3aed }
.corp .lp-cfg-close { background: var(--input); border-color: var(--border); color: var(--t3) }
.corp .lp-cfg-close:hover { background: var(--hover); color: var(--t1) }
.corp .lp-cfg-btns { border-color: var(--border) }
.corp .lp-launch.sec { background: var(--input); color: var(--t2) }
.corp .lp-launch.sec:hover { background: var(--hover); color: var(--t1) }
.corp .lp-sess { border-color: var(--border) }
.corp .lp-sess .lps-title { color: var(--t2) }
.corp .lp-sess .lps-meta { color: var(--t4) }
.corp .lp-sess .lps-btn { background: var(--input); border-color: var(--border); color: var(--pri) }
.corp .lp-sess .lps-btn:hover { background: var(--pri-bg); border-color: var(--pri) }

/* === Agent Cards === */
.lp-agents-grid { display: flex; flex-wrap: wrap; gap: 5px }
.lp-agent-card { display: flex; align-items: center; gap: 7px; padding: 5px 10px; border-radius: 7px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); cursor: pointer; transition: all .12s; min-width: 0 }
.lp-agent-card:hover { border-color: rgba(255,255,255,.18); background: rgba(255,255,255,.08) }
.lp-agent-card.on { background: rgba(99,102,241,.15); border-color: rgba(99,102,241,.5) }
.lp-agent-card .ac-name { font: 600 11px var(--sans); color: rgba(255,255,255,.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
.lp-agent-card.on .ac-name { color: #a5b4fc }
.lp-agent-card .ac-info { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,.06); display: flex; align-items: center; justify-content: center; font: 500 9px var(--sans); color: rgba(255,255,255,.3); flex-shrink: 0; transition: all .1s }
.lp-agent-card:hover .ac-info { background: rgba(99,102,241,.2); color: #a5b4fc }
.lp-agent-add { display: flex; align-items: center; justify-content: center; padding: 5px 10px; border-radius: 7px; background: rgba(255,255,255,.02); border: 1px dashed rgba(255,255,255,.1); cursor: pointer; transition: all .12s; font: 600 12px var(--sans); color: rgba(255,255,255,.25) }
.lp-agent-add:hover { border-color: rgba(99,102,241,.4); color: rgba(99,102,241,.7); background: rgba(99,102,241,.06) }
.corp .lp-agent-card { background: var(--input); border-color: var(--border) }
.corp .lp-agent-card:hover { border-color: var(--border-h); background: var(--hover) }
.corp .lp-agent-card.on { background: var(--pri-bg); border-color: var(--pri) }
.corp .lp-agent-card .ac-name { color: var(--t2) }
.corp .lp-agent-card.on .ac-name { color: var(--pri) }
.corp .lp-agent-card .ac-info { background: var(--hover); color: var(--t4) }
.corp .lp-agent-card:hover .ac-info { background: var(--pri-bg); color: var(--pri) }
.corp .lp-agent-add { background: none; border-color: var(--border); color: var(--t4) }
.corp .lp-agent-add:hover { border-color: var(--pri); color: var(--pri); background: var(--pri-bg) }

/* === Agent Detail (inline expand) === */
.lp-agent-detail { margin-top: 8px; background: rgba(12,12,22,.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; padding: 14px 16px; animation: ad-in .2s ease; overflow: hidden }
@keyframes ad-in { from { opacity: 0; max-height: 0; padding: 0 16px } to { opacity: 1; max-height: 400px; padding: 14px 16px } }
.lp-agent-detail .ad-hdr { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px }
.lp-agent-detail .ad-title { flex: 1; min-width: 0 }
.lp-agent-detail .ad-name { font: 700 14px var(--sans); color: #fff }
.lp-agent-detail .ad-model { font: 500 10px var(--mono); color: rgba(168,85,247,.7); margin-top: 2px }
.lp-agent-detail .ad-close { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 6px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.3); font-size: 11px; cursor: pointer; flex-shrink: 0 }
.lp-agent-detail .ad-close:hover { color: #fff; background: rgba(255,255,255,.12) }
.lp-agent-detail .ad-desc { font: 12px var(--sans); color: rgba(255,255,255,.45); line-height: 1.45; margin-bottom: 8px }
.lp-agent-detail .ad-tools { margin-bottom: 8px }
.lp-agent-detail .ad-tools-label { font: 600 9px var(--sans); color: rgba(255,255,255,.25); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px }
.lp-agent-detail .ad-tools-list { display: flex; flex-wrap: wrap; gap: 3px }
.lp-agent-detail .ad-tool { padding: 2px 6px; border-radius: 4px; font: 500 10px var(--mono); color: rgba(255,255,255,.35); background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06) }
.lp-agent-detail .ad-btns { display: flex; gap: 6px }
.lp-agent-detail .ad-btn { flex: 1; padding: 7px; border-radius: 7px; font: 600 11px var(--sans); cursor: pointer; text-align: center; transition: all .1s; border: 1px solid rgba(255,255,255,.08) }
.lp-agent-detail .ad-btn-edit { background: rgba(255,255,255,.06); color: rgba(255,255,255,.5) }
.lp-agent-detail .ad-btn-edit:hover { background: rgba(255,255,255,.1); color: #fff }
.lp-agent-detail .ad-btn-sel { background: rgba(99,102,241,.15); color: #a5b4fc; border-color: rgba(99,102,241,.3) }
.lp-agent-detail .ad-btn-sel:hover { background: rgba(99,102,241,.25) }
.corp .lp-agent-detail { background: var(--card); border-color: var(--border); backdrop-filter: none; box-shadow: 0 4px 16px rgba(0,0,0,.06) }
.corp .lp-agent-detail .ad-name { color: var(--t1) }
.corp .lp-agent-detail .ad-model { color: #7c3aed }
.corp .lp-agent-detail .ad-desc { color: var(--t3) }
.corp .lp-agent-detail .ad-close { background: var(--input); border-color: var(--border); color: var(--t3) }
.corp .lp-agent-detail .ad-tools-label { color: var(--t4) }
.corp .lp-agent-detail .ad-tool { color: var(--t3); background: var(--input); border-color: var(--border) }
.corp .lp-agent-detail .ad-btn-edit { background: var(--input); color: var(--t2); border-color: var(--border) }
.corp .lp-agent-detail .ad-btn-sel { background: var(--pri-bg); color: var(--pri); border-color: var(--pri) }

/* === Module Cards === */
.lp-modules-grid { display: flex; flex-direction: column; gap: 8px }
.lp-mod-cat { margin-bottom: 2px }
.lp-mod-cat-label { font: 600 9px var(--sans); color: rgba(255,255,255,.25); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; display: flex; align-items: center; gap: 6px }
.lp-mod-cat-label .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0 }
.lp-mod-cat-items { display: flex; flex-wrap: wrap; gap: 4px }
.lp-mod-card { display: flex; align-items: center; gap: 6px; padding: 4px 9px; border-radius: 7px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); cursor: pointer; transition: all .15s; position: relative }
.lp-mod-card:hover { border-color: rgba(255,255,255,.18); background: rgba(255,255,255,.07) }
.lp-mod-card.on { border-color: var(--mod-color, rgba(99,102,241,.5)); background: color-mix(in srgb, var(--mod-color, #6366f1) 12%, transparent) }
.lp-mod-card .mc-name { font: 600 10px var(--sans); color: rgba(255,255,255,.55); white-space: nowrap }
.lp-mod-card.on .mc-name { color: var(--mod-color, #a5b4fc) }
.lp-mod-card .mc-lines { font: 500 9px var(--mono); color: rgba(255,255,255,.2) }
.lp-mod-card.on .mc-lines { color: rgba(255,255,255,.35) }
.lp-mod-card .mc-dep { position: absolute; top: -3px; right: -3px; width: 8px; height: 8px; border-radius: 50%; background: rgba(245,158,11,.7); border: 1px solid rgba(0,0,0,.3); display: none }
.lp-mod-card.dep-auto .mc-dep { display: block }
.lp-mod-detail { margin-top: 6px; background: rgba(12,12,22,.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.1); border-radius: 8px; padding: 10px 12px; animation: ad-in .2s ease }
.lp-mod-detail .md-name { font: 700 13px var(--sans); color: #fff; margin-bottom: 3px }
.lp-mod-detail .md-desc { font: 11px var(--sans); color: rgba(255,255,255,.4); line-height: 1.4; margin-bottom: 6px }
.lp-mod-detail .md-caps { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 6px }
.lp-mod-detail .md-cap { padding: 2px 6px; border-radius: 4px; font: 500 9px var(--mono); color: rgba(255,255,255,.3); background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06) }
.lp-mod-detail .md-meta { font: 10px var(--mono); color: rgba(255,255,255,.2) }
.corp .lp-mod-cat-label { color: var(--t4) }
.corp .lp-mod-card { background: var(--input); border-color: var(--border) }
.corp .lp-mod-card:hover { background: var(--hover); border-color: var(--border-h) }
.corp .lp-mod-card.on { background: color-mix(in srgb, var(--mod-color, var(--pri)) 8%, transparent); border-color: var(--mod-color, var(--pri)) }
.corp .lp-mod-card .mc-name { color: var(--t2) }
.corp .lp-mod-card.on .mc-name { color: var(--mod-color, var(--pri)) }
.corp .lp-mod-detail { background: var(--card); border-color: var(--border); backdrop-filter: none }
.corp .lp-mod-detail .md-name { color: var(--t1) }
.corp .lp-mod-detail .md-desc { color: var(--t3) }
.corp .lp-mod-detail .md-cap { color: var(--t3); background: var(--input); border-color: var(--border) }

/* === Orchestration Loading Screen === */
.orch-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(8,8,14,.95); backdrop-filter: blur(24px); display: flex; flex-direction: column; align-items: center; justify-content: center; animation: orch-fade .3s ease }
@keyframes orch-fade { from { opacity: 0 } to { opacity: 1 } }
.orch-title { font: 700 22px var(--sans); color: #fff; margin-bottom: 6px }
.orch-sub { font: 12px var(--sans); color: rgba(255,255,255,.35); margin-bottom: 28px }
.orch-steps { display: flex; flex-direction: column; gap: 10px; width: 360px; max-width: 90vw }
.orch-step { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); opacity: .3; transition: all .4s ease; transform: translateY(8px) }
.orch-step.active { opacity: 1; background: rgba(99,102,241,.08); border-color: rgba(99,102,241,.3); transform: translateY(0) }
.orch-step.done { opacity: .7; transform: translateY(0) }
.orch-step .os-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0 }
.orch-step.active .os-icon { background: rgba(99,102,241,.2); color: #a5b4fc; animation: orch-pulse 1s ease infinite }
.orch-step.done .os-icon { background: rgba(34,197,94,.15); color: #4ade80 }
.orch-step .os-label { font: 600 12px var(--sans); color: rgba(255,255,255,.6); flex: 1 }
.orch-step.active .os-label { color: #fff }
.orch-step .os-items { font: 10px var(--mono); color: rgba(255,255,255,.25); margin-top: 2px }
@keyframes orch-pulse { 0%, 100% { transform: scale(1) } 50% { transform: scale(1.2) } }
.orch-prompt-preview { margin-top: 20px; width: 360px; max-width: 90vw; max-height: 120px; overflow-y: auto; padding: 10px; border-radius: 8px; background: rgba(0,0,0,.4); border: 1px solid rgba(255,255,255,.06); font: 10px/1.5 var(--mono); color: rgba(255,255,255,.3) }
.corp .orch-overlay { background: rgba(255,255,255,.97) }
.corp .orch-title { color: var(--t1) }
.corp .orch-sub { color: var(--t3) }
.corp .orch-step { background: var(--input); border-color: var(--border) }
.corp .orch-step.active { background: var(--pri-bg); border-color: var(--pri) }
.corp .orch-step .os-label { color: var(--t2) }
.corp .orch-step.active .os-label { color: var(--t1) }
.corp .orch-prompt-preview { background: var(--input); border-color: var(--border); color: var(--t3) }

/* === Back Button (panel header) === */
.lp-back { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); border-radius: 7px; padding: 5px 12px 5px 8px; font: 600 11px var(--sans); color: rgba(255,255,255,.45); cursor: pointer; transition: all .12s; flex-shrink: 0 }
.lp-back:hover { background: rgba(255,255,255,.1); color: #fff }
.lp-back svg { width: 14px; height: 14px }
.corp .lp-back { background: var(--input); border-color: var(--border); color: var(--t3) }
