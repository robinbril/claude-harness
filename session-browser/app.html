              <button className="br-take" onClick={() => { setBreakReminder(false); startBreak(10, 'Break Timer'); }}>10 min break</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function EditorModal({ title, content, onSave, onClose }) {
  const [val, setVal] = useState(content);
  const [saving, setSaving] = useState(false);
  useEffect(() => { const h = e => { if (e.key === 'Escape') onClose() }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h) }, [onClose]);
  return (
    <div className="overlay" onClick={e => { if (e.target === e.currentTarget) onClose() }}>
      <div className="modal">
        <div className="modal-head"><h3>{title}</h3><button className="btn btn-g" onClick={onClose}>Close</button></div>
        <div className="modal-body"><textarea className="editor" style={{ minHeight: 400 }} value={val} onChange={e => setVal(e.target.value)} /></div>
        <div className="modal-foot">
          <button className="btn btn-g" onClick={onClose}>Cancel</button>
          <button className="btn btn-d" disabled={saving} onClick={async () => { setSaving(true); await onSave(val); setSaving(false); toast('Saved'); onClose() }}>{saving ? 'Saving...' : 'Save'}</button>
        </div>
      </div>
    </div>
  );
}

function SessionsTab({ focusedEntity }) {
  const [ss, setSs] = useState([]);
  const [q, setQ] = useState('');
  const [sort, setSort] = useState('date');
  const [proj, setProj] = useState(null);
  const [det, setDet] = useState(null);
  const [tr, setTr] = useState([]);
  const [graphData, setGraphData] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = useCallback((force) => {
    const ttl = force ? 0 : 30000;
    Promise.all([
      cachedFetch('/api/sessions', ttl),
      cachedFetch('/api/graph', ttl),
    ]).then(([s, g]) => {
      setSs(s.sessions || []);
      setGraphData(g);
      setLoading(false);
    }).catch(() => setLoading(false));
  }, []);
  useEffect(() => { load(); const iv = setInterval(() => load(true), 30000); return () => clearInterval(iv) }, [load]);
  useEffect(() => {
    if (focusedEntity?.type === 'session' && focusedEntity?.id && ss.length > 0) {
      const s = ss.find(x => x.sessionId === focusedEntity.id);
      if (s) { setDet(s); setTr([]); fetch('/api/sessions/' + s.sessionId + '/transcript').then(r => r.json()).then(d => setTr(d.messages || [])); }
    }
  }, [focusedEntity, ss]);

  const grp = s => s.label || s.projectName;

  const projs = useMemo(() => {
    const c = {}; ss.forEach(s => { const k = grp(s); c[k] = (c[k] || 0) + 1 });
    return Object.entries(c).sort((a, b) => b[1] - a[1]);
  }, [ss]);

  const fil = useMemo(() => {
    let f = ss.slice();
    if (proj) f = f.filter(s => grp(s) === proj);
    if (q) { const l = q.toLowerCase(); f = f.filter(s => s.derivedTitle.toLowerCase().includes(l) || grp(s).toLowerCase().includes(l) || s.sessionId.includes(l)) }
    if (sort === 'tokens') f.sort((a, b) => (b.inputTokens + b.outputTokens) - (a.inputTokens + a.outputTokens));
    else if (sort === 'cost') f.sort((a, b) => b.estimatedCost - a.estimatedCost);
    else if (sort === 'messages') f.sort((a, b) => b.userMessages - a.userMessages);
    return f;
  }, [ss, proj, q, sort]);

  const mx = useMemo(() => Math.max(1, ...fil.map(s => s.inputTokens + s.outputTokens)), [fil]);
  const tT = fil.reduce((n, s) => n + s.inputTokens + s.outputTokens, 0);
  const tC = fil.reduce((n, s) => n + s.estimatedCost, 0);

  const openD = s => { setDet(s); setTr([]); fetch('/api/sessions/' + s.sessionId + '/transcript').then(r => r.json()).then(d => setTr(d.messages || [])) };
  const resume = s => { fetch('/api/resume-terminal', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId: s.sessionId, path: s.projectPath }) }); toast('Opening terminal...') };

  if (loading) return <LoadingScreen text="Scanning sessions..." />;

  return (
    <div className="sl">
      <div className="sidebar">
        <h3>Projects</h3>
        <div className={'pi' + (!proj ? ' on' : '')} onClick={() => setProj(null)}><span>All</span><span className="pc">{ss.length}</span></div>
        {projs.map(([n, c]) => <div key={n} className={'pi' + (proj === n ? ' on' : '')} onClick={() => setProj(n)}><span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }} className="anon-blur">{n}</span><span className="pc">{c}</span></div>)}
      </div>
      <div className="main">
        <div className="toolbar">
          <input className="input" style={{ maxWidth: 280 }} placeholder="Search..." value={q} onChange={e => setQ(e.target.value)} />
          <select className="input" style={{ width: 'auto' }} value={sort} onChange={e => setSort(e.target.value)}>
            <option value="date">Recent</option><option value="tokens">Tokens</option><option value="cost">Cost</option><option value="messages">Messages</option>
          </select>
          <button className="btn btn-g" onClick={() => load(true)}>Refresh</button>
        </div>
        <div className="stats"><span><b>{fil.length}</b> sessions</span><span><b>{fmtT(tT)}</b> tokens</span><span><b>${tC.toFixed(2)}</b> cost</span></div>
        <div className="grid">
          {fil.length === 0 && <div className="empty">No sessions found</div>}
          {fil.map(s => {
            const t = s.inputTokens + s.outputTokens;
            const p = Math.min(100, (t / mx) * 100);
            return (
              <div key={s.sessionId} className={'card sc' + (s.isActive ? ' live' : '')} onClick={() => openD(s)}>
                <div className="sc-title anon-blur">{s.derivedTitle}</div>
                <div className="sc-meta">
                  <span className="dot" style={{ background: pCol(grp(s)) }} /><span className="anon-blur">{grp(s)}</span>
                  <span style={{ color: 'var(--t4)' }}>|</span>
                  <span className="badge" style={{ background: 'var(--pri-bg)', color: 'var(--pri)' }}>{shortModel(s.model)}</span>
                  {s.isActive && <span className="badge" style={{ background: 'var(--grn-bg)', color: 'var(--grn)', animation: 'pulse 2s infinite' }}>LIVE</span>}
                  <span style={{ marginLeft: 'auto', fontSize: 10, color: 'var(--t4)' }}>{rel(s.lastMessageAt)}</span>
                </div>
                <div className="sc-nums"><span><b>{s.userMessages}</b> msgs</span><span><b>{fmtT(t)}</b> tokens</span><span><b>${s.estimatedCost.toFixed(2)}</b></span></div>
                {(s.agentsUsed?.length > 0 || s.skillsUsed?.length > 0) && (
                  <div style={{ display: 'flex', gap: 3, flexWrap: 'wrap', marginBottom: 4 }}>
                    {(s.agentsUsed || []).slice(0, 3).map(a => <EntityChip key={a} type="agent" id={a} />)}
                    {(s.skillsUsed || []).slice(0, 3).map(sk => <EntityChip key={sk} type="skill" id={sk} />)}
                  </div>
                )}
                <div className="bar"><div className="bar-fill" style={{ width: p + '%', background: tCol(t) }} /></div>
                <div style={{ display: 'flex', gap: 4 }} onClick={e => e.stopPropagation()}>
                  <div className="resume" onClick={() => copy(s.resumeCommand)}><span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.resumeCommand}</span><span style={{ fontSize: 9, color: 'var(--t4)', flexShrink: 0 }}>COPY</span></div>
                  {s.projectPath && <div className="term-btn" onClick={() => resume(s)} title="Resume in terminal">&gt;_</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {det && (
        <div className="detail">
          <h3><span className="anon-blur">{det.derivedTitle}</span></h3>
          <section>
            <h4>Info</h4>
            {[['Project', <span className="anon-blur">{det.label || det.projectName}</span>], ['Model', shortModel(det.model)], det.gitBranch && ['Branch', <span className="anon-blur">{det.gitBranch}</span>], ['Started', det.firstMessageAt ? new Date(det.firstMessageAt).toLocaleString() : '-'], ['Last', rel(det.lastMessageAt)], ['Messages', det.userMessages + ' / ' + det.assistantMessages], ['Tools', det.toolUses], ['Tokens', fmtT(det.inputTokens) + ' in / ' + fmtT(det.outputTokens) + ' out'], ['Cost', '$' + det.estimatedCost.toFixed(4)]].filter(Boolean).map(([l, v]) => <div key={l} className="dr"><span className="l">{l}</span><span className="v">{v}</span></div>)}
          </section>
          {(det.agentsUsed?.length > 0 || det.skillsUsed?.length > 0) && (
            <section>
              <h4>Used in session</h4>
              <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                {(det.agentsUsed || []).map(a => <EntityChip key={a} type="agent" id={a} />)}
                {(det.skillsUsed || []).map(sk => <EntityChip key={sk} type="skill" id={sk} />)}
              </div>
              {graphData?.sessionMeta?.[det.sessionId]?.toolNames?.length > 0 && (
                <div style={{ marginTop: 6, fontSize: 10, color: 'var(--t3)' }}>
                  Tools: {graphData.sessionMeta[det.sessionId].toolNames.join(', ')}
                </div>
              )}
            </section>
          )}
          {(() => {
            const related = graphData?.sessionMeta?.[det.sessionId];
            const proj = det.label || det.projectName;
            const projAgents = graphData?.agentsByProject?.[proj] || [];
            const projSkills = graphData?.skillsByProject?.[proj] || [];
            return (projAgents.length > 0 || projSkills.length > 0) && !det.agentsUsed?.length && !det.skillsUsed?.length ? (
              <section>
                <h4>Project context</h4>
                <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                  <EntityChip type="project" id={proj} />
                  {projAgents.slice(0, 5).map(a => <EntityChip key={a} type="agent" id={a} />)}
                  {projSkills.slice(0, 5).map(sk => <EntityChip key={sk} type="skill" id={sk} />)}
                </div>
              </section>
            ) : null;
          })()}
          <section>
            <h4>Transcript ({tr.length})</h4>
            {tr.reduce((acc, m) => {
              const texts = m.parts.filter(p => p.type === 'text' && p.text?.trim()).map(p => p.text.trim());
              const tools = m.parts.filter(p => p.type === 'tool_use').map(p => p.name || 'tool');
              const toolResults = m.parts.filter(p => p.type === 'tool_result');
              const hasContent = texts.length > 0 || tools.length > 0;
              if (!hasContent) return acc;
              const txt = texts.join(' ').slice(0, 200);
              const toolSummary = tools.length > 0 ? tools.slice(0, 4).join(', ') + (tools.length > 4 ? ` +${tools.length - 4}` : '') : '';
              acc.push({ ...m, txt, toolSummary, toolCount: tools.length });
              return acc;
            }, []).slice(0, 12).map((m, i) => (
              <div key={i} className={'tm ' + m.role}>
                <div className="tm-role">{m.role}{m.timestamp ? ' -- ' + rel(m.timestamp) : ''}</div>
                {m.txt && <div>{m.txt}</div>}
                {m.toolSummary && <div className="tm-tools">{m.toolCount} tool{m.toolCount !== 1 ? 's' : ''}: {m.toolSummary}</div>}
              </div>
            ))}
          </section>
          <div style={{ display: 'flex', gap: 5 }}>
            <button className="btn btn-p" onClick={() => copy(det.resumeCommand)}>Copy cmd</button>
            <button className="btn btn-d" onClick={() => resume(det)}>Resume</button>
            <button className="btn" style={{ background: 'var(--pri)', color: '#fff' }} onClick={() => {
              window.dispatchEvent(new CustomEvent('mc-orchestrate', { detail: { projectPath: det.projectPath, projectName: det.projectName } }));
              navBus.go('home');
            }}>Orchestrate</button>
            <button className="btn btn-g" onClick={() => setDet(null)}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

function AnalyticsTab() {
  if (typeof Recharts === 'undefined') return <div className="page"><div className="empty">Charts library failed to load. Check your internet connection and reload.</div></div>;
  const { BarChart, Bar, LineChart, Line, PieChart, Pie, Cell, XAxis, YAxis, Tooltip, ResponsiveContainer, Legend } = Recharts;
  const [ss, setSs] = useState([]);
  const [tf, setTf] = useState('all');
  const [loading, setLoading] = useState(true);
  const load = useCallback(() => { cachedFetch('/api/sessions', 30000).then(d => { setSs(d.sessions || []); setLoading(false); }) }, []);
  useEffect(() => { load() }, [load]);

  const filtered = useMemo(() => {
    if (tf === 'all') return ss;
    const ms = { day: 864e5, week: 6048e5, month: 2592e6 }[tf] || 0;
    return ss.filter(s => s.lastMessageAt && (Date.now() - new Date(s.lastMessageAt).getTime()) < ms);
  }, [ss, tf]);

  const totalCost = filtered.reduce((n, s) => n + s.estimatedCost, 0);
  const totalTokens = filtered.reduce((n, s) => n + s.inputTokens + s.outputTokens, 0);

  const byModel = useMemo(() => {
    const invalid = new Set(['?', '<synthetic>', '', 'unknown']);
    const m = {}; filtered.forEach(s => { const k = shortModel(s.model); if (invalid.has(k) || invalid.has(s.model)) return; if (!m[k]) m[k] = { model: k, input: 0, output: 0, cost: 0, count: 0 }; m[k].input += s.inputTokens; m[k].output += s.outputTokens; m[k].cost += s.estimatedCost; m[k].count++ });
    return Object.values(m).sort((a, b) => b.cost - a.cost);
  }, [filtered]);

  const byProject = useMemo(() => {
    const m = {}; filtered.forEach(s => { const k = s.label || s.projectName; if (!m[k]) m[k] = { project: k, cost: 0, count: 0 }; m[k].cost += s.estimatedCost; m[k].count++ });
    return Object.values(m).sort((a, b) => b.cost - a.cost);
  }, [filtered]);

  const timeline = useMemo(() => {
    const m = {}; filtered.forEach(s => { if (!s.lastMessageAt) return; const d = s.lastMessageAt.slice(0, 10); if (!m[d]) m[d] = { date: d, tokens: 0, cost: 0 }; m[d].tokens += s.inputTokens + s.outputTokens; m[d].cost += s.estimatedCost });
    return Object.values(m).sort((a, b) => a.date.localeCompare(b.date));
  }, [filtered]);

  const topSessions = useMemo(() => [...filtered].sort((a, b) => b.estimatedCost - a.estimatedCost).slice(0, 8), [filtered]);
  const COLORS = ['#5B5FE6', '#0D9668', '#C08A00', '#D03030', '#8B5CF6', '#0891B2'];
  const piData = byModel.slice(0, 6).map(m => ({ name: m.model, value: Math.round(m.cost * 100) / 100 }));
  const maxCost = Math.max(1, ...byProject.map(p => p.cost));
  const ttStyle = { background: '#fff', border: '1px solid var(--border)', borderRadius: 6, fontSize: 11 };

  if (loading) return <LoadingScreen text="Crunching analytics..." />;

  return (
    <div className="page">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 16 }}>
        <div><h2>Analytics</h2><div className="sub">{filtered.length} sessions across {byProject.length} projects</div></div>
        <div style={{ display: 'flex', gap: 3 }}>{[{ k: 'day', l: '24h' }, { k: 'week', l: '7d' }, { k: 'month', l: '30d' }, { k: 'all', l: 'All' }].map(t => <div key={t.k} className={'pill' + (tf === t.k ? ' on' : '')} onClick={() => setTf(t.k)}>{t.l}</div>)}</div>
      </div>

      <div className="stat-grid">
        {[{ v: fmtT(totalTokens), l: 'Total tokens', c: 'var(--pri)' }, { v: '$' + totalCost.toFixed(2), l: 'Total cost', c: 'var(--amb)' }, { v: filtered.length, l: 'Sessions', c: 'var(--t2)' }, { v: byModel.length, l: 'Models', c: 'var(--grn)' }].map(s =>
          <div key={s.l} className="card stat-card"><div className="val" style={{ color: s.c }}>{s.v}</div><div className="lbl">{s.l}</div></div>
        )}
      </div>

      <div className="chart-grid">
        <div className="card chart-card"><h3>Tokens by model</h3>
          <ResponsiveContainer width="100%" height={210}>
            <BarChart data={byModel} margin={{ top: 5, right: 5, bottom: 35, left: 5 }}>
              <XAxis dataKey="model" tick={{ fontSize: 10, fill: '#8A8A8A' }} angle={-25} textAnchor="end" interval={0} />
              <YAxis tick={{ fontSize: 10, fill: '#8A8A8A' }} tickFormatter={fmtT} />
              <Tooltip formatter={v => fmtT(v)} contentStyle={ttStyle} />
              <Bar dataKey="input" stackId="a" fill="#5B5FE6" name="Input" />
              <Bar dataKey="output" stackId="a" fill="#9B9EF0" radius={[3, 3, 0, 0]} name="Output" />
            </BarChart>
          </ResponsiveContainer>
        </div>

        <div className="card chart-card"><h3>Cost by model</h3>
          <ResponsiveContainer width="100%" height={210}>
            <PieChart>
              <Pie data={piData} cx="50%" cy="50%" innerRadius={45} outerRadius={80} paddingAngle={3} dataKey="value" label={({ name, value }) => name + ' $' + value.toFixed(2)} labelLine={false} style={{ fontSize: 10 }}>
                {piData.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
              </Pie>
              <Tooltip formatter={v => '$' + v.toFixed(2)} contentStyle={ttStyle} />
            </PieChart>
          </ResponsiveContainer>
        </div>

        <div className="card chart-card"><h3>Daily trend</h3>
          {timeline.length > 1 ? (
            <ResponsiveContainer width="100%" height={210}>
              <LineChart data={timeline} margin={{ top: 5, right: 5, bottom: 5, left: 5 }}>
                <XAxis dataKey="date" tick={{ fontSize: 9, fill: '#8A8A8A' }} tickFormatter={d => d.slice(5)} />
                <YAxis yAxisId="t" tick={{ fontSize: 10, fill: '#8A8A8A' }} tickFormatter={fmtT} />

                <Tooltip contentStyle={ttStyle} formatter={(v, name) => name === 'cost' ? '$' + v.toFixed(2) : fmtT(v)} />
                <Line yAxisId="t" type="monotone" dataKey="tokens" stroke="#5B5FE6" strokeWidth={2} dot={false} name="tokens" />
                <Line yAxisId="c" type="monotone" dataKey="cost" stroke="#C08A00" strokeWidth={2} dot={false} name="cost" />
                <Legend wrapperStyle={{ fontSize: 11 }} />
              </LineChart>
            </ResponsiveContainer>
          ) : <div className="empty">Need 2+ days of data</div>}
        </div>

        <div className="card chart-card"><h3>Cost by project</h3>
          <div style={{ maxHeight: 210, overflowY: 'auto' }}>
            {byProject.map(p => <div key={p.project} className="pbar" style={{ cursor: 'pointer' }} onClick={() => navBus.toProject(p.project)}>
              <div className="pbar-label anon-blur" title={p.project}>{p.project}</div>
              <div className="pbar-track"><div className="pbar-fill" style={{ width: (p.cost / maxCost * 100) + '%', background: pCol(p.project) }} /></div>
              <div className="pbar-val">${p.cost.toFixed(2)}</div>
            </div>)}
          </div>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        <div className="card section" style={{ padding: 14 }}>
          <h3>Top sessions by cost</h3>
          {topSessions.map((s, i) => <div key={s.sessionId} className="top-row" style={{ cursor: 'pointer' }} onClick={() => navBus.toSession(s.sessionId)}>
            <div className="top-rank">{i + 1}</div>
            <div className="top-info"><div className="top-name anon-blur">{s.label || s.projectName}</div><div className="top-meta anon-blur">{(s.derivedTitle || '').slice(0, 60)} | {shortModel(s.model)} | {fmtT(s.inputTokens + s.outputTokens)} tokens</div></div>
            <div className="top-cost" style={{ color: s.estimatedCost > 1 ? 'var(--red)' : s.estimatedCost > 0.3 ? 'var(--amb)' : 'var(--grn)' }}>${s.estimatedCost.toFixed(2)}</div>
          </div>)}
        </div>
        <AgentLeaderboard sessions={filtered} />
      </div>
    </div>
  );
}

function AgentLeaderboard({ sessions }) {
  const byAgent = useMemo(() => {
    const m = {};
    for (const s of sessions) {
      for (const a of (s.agentsUsed || [])) {
        if (!m[a]) m[a] = { name: a, count: 0, cost: 0 };
        m[a].count++;
        m[a].cost += s.estimatedCost / Math.max(1, (s.agentsUsed || []).length);
      }
    }
    return Object.values(m).sort((a, b) => b.count - a.count).slice(0, 8);
  }, [sessions]);

  if (byAgent.length === 0) return null;

  return (
    <div className="card section" style={{ padding: 14 }}>
      <h3>Agent leaderboard</h3>
      {byAgent.map((a, i) => (
        <div key={a.name} className="top-row" style={{ cursor: 'pointer' }} onClick={() => navBus.toAgent(a.name)}>
          <div className="top-rank">{i + 1}</div>
          <div className="top-info">
            <div className="top-name"><EntityChip type="agent" id={a.name} /></div>
            <div className="top-meta">{a.count} sessions | ~${a.cost.toFixed(2)} attributed</div>
          </div>
          <div className="top-cost" style={{ color: 'var(--pri)' }}>{a.count}x</div>
        </div>
      ))}
    </div>
  );
}

        <div className="chat-msgs" ref={chatRef}>

            <p>Describe a lesson or correction. The AI checks for overlap and proposes changes.</p>

            <div style={{ whiteSpace: 'pre-wrap' }}>{m.text}</div>
            {m.parsed?.action && m.parsed.action !== 'none' && m.parsed.proposal && <div className="proposal">
              <div style={{ marginBottom: 3, fontWeight: 600, color: 'var(--pri)', fontSize: 11 }}>Proposed: {m.parsed.action}</div>
              {m.parsed.proposal.type === 'lesson' && <div><div><b>{m.parsed.proposal.rule}</b></div><div style={{ color: 'var(--t3)' }}>{m.parsed.proposal.detail}</div></div>}
              {m.parsed.proposal.type === 'memory' && <div><div style={{ color: 'var(--t3)' }}>{m.parsed.proposal.memoryType}</div><div><b>{m.parsed.proposal.memoryTitle}</b></div></div>}

        </div>
        <div className="chat-input">

        </div>
      </div>}
    </div>
  );

function LogViewerTab() {
  const [files, setFiles] = useState([]);
  const [selected, setSelected] = useState(null);
  const [lineCount, setLineCount] = useState(100);
  const [search, setSearch] = useState('');
  const [autoRefresh, setAutoRefresh] = useState(false);
  const [content, setContent] = useState(null);
  const [loading, setLoading] = useState(false);
  const [filesLoading, setFilesLoading] = useState(true);
  const [error, setError] = useState(null);
  const [lastRefresh, setLastRefresh] = useState(null);
  const outputRef = useRef(null);
  const intervalRef = useRef(null);
  const searchInput = search.trim();

  useEffect(() => {
    setFilesLoading(true);
    fetch('/api/logs').then(r => r.json()).then(data => {
      const list = data.files || [];
      setFiles(list);
      if (list.length > 0 && !selected) setSelected(list[0].name);
    }).catch(err => setError('Failed to load: ' + err.message)).finally(() => setFilesLoading(false));
  }, []);

  const fetchContent = useCallback(() => {
    if (!selected) return;
    setLoading(true); setError(null);
    const params = new URLSearchParams({ lines: lineCount });
    if (searchInput) params.set('search', searchInput);
    fetch('/api/logs/' + encodeURIComponent(selected) + '?' + params).then(r => r.json()).then(data => {
      if (data.error) { setError(data.error); setContent(null); return; }
      setContent(data); setLastRefresh(new Date());
      if (!searchInput && outputRef.current) requestAnimationFrame(() => { if (outputRef.current) outputRef.current.scrollTop = outputRef.current.scrollHeight; });
    }).catch(err => setError('Fetch failed: ' + err.message)).finally(() => setLoading(false));
  }, [selected, lineCount, searchInput]);

function renderMarkdown(md) {
  if (!md) return '';
  const escape = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const inline = s => s.replace(/`([^`]+)`/g, '<code style="font-family:var(--mono);font-size:.9em;background:var(--bg);padding:1px 4px;border-radius:3px">$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--pri)">$1</a>');

  const flushList = () => { if (!inList) return; out.push('<ul style="margin:.4em 0 .4em 1.2em">' + listItems.map(li => '<li style="margin-bottom:2px;line-height:1.5">' + inline(escape(li)) + '</li>').join('') + '</ul>'); listItems = []; inList = false; };
  for (const line of lines) {
    if (line.startsWith('```')) { if (!inCode) { flushList(); inCode = true; codeLines = []; } else { out.push('<pre style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;overflow-x:auto;margin:.6em 0"><code style="font-family:var(--mono);font-size:.85em">' + escape(codeLines.join('\n')) + '</code></pre>'); inCode = false; codeLines = []; } continue; }
    if (inCode) { codeLines.push(line); continue; }
    const h = line.match(/^(#{1,6})\s+(.+)/); if (h) { flushList(); out.push('<h' + h[1].length + ' style="font-size:' + { 1:'1.4em',2:'1.2em',3:'1.05em' }[h[1].length] + ';font-weight:700;margin:.8em 0 .3em">' + inline(escape(h[2])) + '</h' + h[1].length + '>'); continue; }
    if (/^[-*_]{3,}$/.test(line.trim())) { flushList(); out.push('<hr style="border:none;border-top:1px solid var(--border);margin:.8em 0">'); continue; }
    if (line.startsWith('> ')) { flushList(); out.push('<blockquote style="border-left:3px solid var(--border);margin:.4em 0;padding:.3em .8em;color:var(--t3)">' + inline(escape(line.slice(2))) + '</blockquote>'); continue; }
    const li = line.match(/^[\s]*[-*+]\s+(.+)/); if (li) { inList = true; listItems.push(li[1]); continue; }
    if (line.trim() === '') { flushList(); out.push('<div style="height:.5em"></div>'); continue; }
    flushList(); out.push('<p style="margin:.25em 0;line-height:1.6">' + inline(escape(line)) + '</p>');
  }

}

      <div className="stat-card card"><div className="val">{h.node.version}</div><div className="lbl">Node.js</div></div>
      <div className="stat-card card"><div className="val">{fmtUp(h.node.serverUptimeMs)}</div><div className="lbl">Server uptime</div></div>
      <div className="stat-card card" style={{ cursor: 'pointer' }} onClick={() => navBus.go('sessions')}><div className="val" style={{ color: h.claudeProcesses.running ? 'var(--grn)' : 'var(--t4)' }}>{h.claudeProcesses.count}</div><div className="lbl">Claude processes</div></div>
      <div className="stat-card card" style={{ cursor: 'pointer' }} onClick={() => navBus.go('projects')}><div className="val">{h.projects.count}</div><div className="lbl">Project dirs</div></div>
      <div className="stat-card card"><div className="val">{h.memory.rssFmt}</div><div className="lbl">RSS Memory</div></div>
      <div className="stat-card card"><div className="val">{h.sessions.jsonlCount}</div><div className="lbl">JSONL sessions</div></div>
      <div className="stat-card card"><div className="val">{h.disk.totalFmt}</div><div className="lbl">.claude disk</div></div>
      <div className="stat-card card"><div className="val">{h.sessions.jsonlFmt}</div><div className="lbl">Session data</div></div>
    </div></div>
    <div className="section"><h3>Disk Breakdown</h3><div className="card" style={{ padding: 14 }}>
      {h.disk.breakdown.slice(0, 10).map((e, i) => {
        const pct = h.disk.breakdown[0].bytes > 0 ? Math.max(2, (e.bytes / h.disk.breakdown[0].bytes) * 100) : 2;
        const colors = ['var(--pri)', 'var(--grn)', 'var(--amb)', 'var(--red)'];
        return <div key={e.name} className="pbar"><span className="pbar-label">{e.name}</span><div className="pbar-track"><div className="pbar-fill" style={{ width: pct + '%', background: colors[i % 4] }} /></div><span className="pbar-val">{e.formatted}</span></div>;
      })}
    </div></div></>}
    {projects && projects.length > 0 && <div className="section"><h3>Projects ({projects.length})</h3><div className="card" style={{ padding: 0, overflow: 'hidden' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
        <thead><tr>{['Project', 'Sessions', 'Size', 'Modified'].map(h => <th key={h} style={{ padding: '6px 10px', textAlign: 'left', fontSize: 10, fontWeight: 600, textTransform: 'uppercase', color: 'var(--t3)', borderBottom: '1px solid var(--border)' }}>{h}</th>)}</tr></thead>
        <tbody>{projects.map(p => <tr key={p.name} style={{ cursor: 'pointer' }} onClick={() => navBus.toProject(p.decodedPath.split(/[\\/]/).pop())}><td style={{ padding: '7px 10px', borderBottom: '1px solid var(--border)', color: 'var(--pri)' }}><span className="anon-blur">{p.decodedPath.split(/[\\/]/).pop()}</span></td><td style={{ padding: '7px 10px', borderBottom: '1px solid var(--border)' }}>{p.sessionCount}</td><td style={{ padding: '7px 10px', borderBottom: '1px solid var(--border)', fontFamily: 'var(--mono)', fontSize: 11 }}>{p.totalFmt}</td><td style={{ padding: '7px 10px', borderBottom: '1px solid var(--border)', fontSize: 11, color: 'var(--t3)' }}>{new Date(p.lastModified).toLocaleDateString()}</td></tr>)}</tbody>
      </table>
    </div></div>}
    {config && <div className="section"><h3>Config</h3><div className="card" style={{ padding: 14 }}>
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 10 }}>
        {config.sources.main && <span className="badge" style={{ background: 'var(--grn-bg)', color: 'var(--grn)' }}>settings.json</span>}
        {config.sources.local && <span className="badge" style={{ background: 'var(--grn-bg)', color: 'var(--grn)' }}>settings.local.json</span>}
        {cfg.model && <span className="badge" style={{ background: 'var(--pri-bg)', color: 'var(--pri)' }}>model: {cfg.model}</span>}
      </div>
      <details><summary style={{ cursor: 'pointer', fontSize: 12, color: 'var(--t3)' }}>Full config JSON</summary><pre style={{ background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 6, padding: 12, fontFamily: 'var(--mono)', fontSize: 11, marginTop: 8, maxHeight: 360, overflow: 'auto', whiteSpace: 'pre' }}>{JSON.stringify(cfg, null, 2)}</pre></details>
    </div></div>}
  </div>);
}

function ProjectsTab({ focusedEntity }) {
  const [sessions, setSessions] = useState(null);
  const [projects, setProjects] = useState(null);
  const [memFiles, setMemFiles] = useState([]);
  const [sel, setSel] = useState(null);
  const [editingDoc, setEditingDoc] = useState(null);
  const [editContent, setEditContent] = useState('');
  const [creating, setCreating] = useState(false);
  const [newName, setNewName] = useState('');
  const [q, setQ] = useState('');
  const [renaming, setRenaming] = useState(false);
  const [renameDraft, setRenameDraft] = useState('');
  const [labelEditing, setLabelEditing] = useState(null);
  const [labelDraft, setLabelDraft] = useState('');
  const [graphData, setGraphData] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = (force) => {
    const ttl = force ? 0 : 30000;
    Promise.all([
      cachedFetch('/api/sessions', ttl),
      cachedFetch('/api/projects', ttl),
      cachedFetch('/api/memory', ttl),
      cachedFetch('/api/graph', ttl),
    ]).then(([s, p, m, g]) => {
      setSessions(s.sessions || []);
      setProjects(p.projects || []);
      setMemFiles(m.files || []);
      setGraphData(g);
      setLoading(false);
    }).catch(() => setLoading(false));
  };
  useEffect(() => load(), []);
  useEffect(() => {
    if (focusedEntity?.type === 'project' && focusedEntity?.id) setSel(focusedEntity.id);
  }, [focusedEntity]);

  const groups = useMemo(() => {
    if (!sessions) return [];
    const g = {};
    for (const s of sessions) {
      const l = s.label || 'unlabeled';
      if (!g[l]) g[l] = { label: l, sessions: [], slugs: new Set() };
      g[l].sessions.push(s);
    }
    if (projects) {
      for (const p of projects) {
        for (const gl of Object.values(g)) {
          if (gl.label === 'unlabeled') continue;
          const ll = gl.label.toLowerCase();
          if ((p.name || '').toLowerCase().includes(ll) || (p.slug || '').toLowerCase().includes(ll.replace(/[^a-z0-9]/g, ''))) {
            gl.slugs.add(p.slug);
          }
          for (const s of gl.sessions) {
            if ((p.sessionIds || []).includes(s.sessionId)) gl.slugs.add(p.slug);
          }
        }
      }
    }
    return Object.values(g).sort((a, b) => a.label === 'unlabeled' ? 1 : b.label === 'unlabeled' ? -1 : b.sessions.length - a.sessions.length);
  }, [sessions, projects]);

  const g = sel ? groups.find(x => x.label === sel) : null;
  const docs = g && projects ? projects.filter(p => g.slugs.has(p.slug)).flatMap(p => (p.docs || []).map(d => ({ ...d, slug: p.slug }))) : [];
  const relMem = g ? memFiles.filter(f => {
    const fl = (f.name + ' ' + f.filename).toLowerCase();
    const sl = (sel || '').toLowerCase();
    // Aliases let one project name match multiple keywords in session titles/files.
    // Example: { 'project-a': ['proj-a', 'pa-app'] }
    const aliases = {};
    const terms = [sl, ...(aliases[sl] || [])];
    return terms.some(t => fl.includes(t));
  }) : [];
  const totalTokens = g ? g.sessions.reduce((a, s) => a + (s.inputTokens || 0) + (s.outputTokens || 0), 0) : 0;
  const totalCost = g ? g.sessions.reduce((a, s) => a + (s.cost || 0), 0) : 0;
  const fmtT = n => n > 1e6 ? (n / 1e6).toFixed(1) + 'M' : n > 1e3 ? (n / 1e3).toFixed(0) + 'K' : n + '';

  const renameLabel = async () => {
    if (!sel || !renameDraft.trim() || renameDraft.trim() === sel) return;
    const entries = g.sessions.map(s => ({ sessionId: s.sessionId, label: renameDraft.trim() }));
    await fetch('/api/labels/bulk', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ entries }) });
    toast('Renamed to ' + renameDraft.trim());
    setSel(renameDraft.trim());
    setRenaming(false);
    load();
  };
  const saveManualLabel = async (sessionId) => {
    await fetch('/api/labels', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId, label: labelDraft }) });
    toast('Label saved');
    setLabelEditing(null);
    load();
  };
  const openDoc = async (slug, filename) => {
    const r = await fetch('/api/projects/' + encodeURIComponent(slug) + '/docs/' + encodeURIComponent(filename));
    const d = await r.json();
    setEditContent(d.content || '');
    setEditingDoc({ slug, filename });
  };
  const saveDoc = async content => {
    if (!editingDoc) return;
    await fetch('/api/projects/' + encodeURIComponent(editingDoc.slug) + '/docs/' + encodeURIComponent(editingDoc.filename), {
      method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content })
    });
    toast('Saved');
    setEditingDoc(null);
    load();
  };
  const deleteDoc = async (slug, filename) => {
    if (!confirm('Delete ' + filename + '?')) return;
    await fetch('/api/projects/' + encodeURIComponent(slug) + '/docs/' + encodeURIComponent(filename), { method: 'DELETE' });
    toast('Deleted');
    load();
  };
  const createDoc = async () => {
    if (!g || g.slugs.size === 0 || !newName.trim()) return;
    const slug = [...g.slugs][0];
    const fname = newName.trim().replace(/\s+/g, '-').replace(/[^a-zA-Z0-9_-]/g, '') + '.md';
    const tmpl = '---\nname: ' + newName.trim() + '\ndescription: \ntype: note\n---\n\n# ' + newName.trim() + '\n\n';
    await fetch('/api/projects/' + encodeURIComponent(slug) + '/docs/' + encodeURIComponent(fname), {
      method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: tmpl })
    });
    toast('Created');
    setCreating(false);
    setNewName('');
    load();
  };
  const copyResume = (e, id) => { e.stopPropagation(); navigator.clipboard.writeText('claude --resume ' + id); toast('Copied'); };

  if (!sessions) return <div className="proj-layout"><div className="loading"><div className="spin" />Loading...</div></div>;

  const filtered = q ? groups.filter(x => x.label.toLowerCase().includes(q.toLowerCase())) : groups;

  if (loading) return <LoadingScreen text="Loading projects..." />;

  return (
    <div className="proj-layout">
      {editingDoc && <EditorModal title={editingDoc.filename} content={editContent} onSave={saveDoc} onClose={() => setEditingDoc(null)} />}
      <div className="proj-side">
        <h3 style={{ marginBottom: 6 }}>Projects</h3>
        <input className="input" style={{ marginBottom: 8, fontSize: 11 }} placeholder="Filter..." value={q} onChange={e => setQ(e.target.value)} />
        {filtered.map(gr => (
          <div key={gr.label} className={'proj-item' + (sel === gr.label ? ' on' : '')} onClick={() => { setSel(gr.label); setRenaming(false); setCreating(false); }}>
            <div className="proj-name">
              {projects && projects.some(p => gr.slugs.has(p.slug) && p.docCount > 0) && <span className="proj-ctx-dot" style={{ background: 'var(--grn)' }} />}
              {gr.label === 'unlabeled' ? 'Unlabeled' : <span className="anon-blur">{gr.label}</span>}
            </div>
            <div className="proj-stats"><span>{gr.sessions.length}</span></div>
          </div>
        ))}
      </div>
      <div className="proj-detail">
        {g ? (<>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
            {renaming ? (
              <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                <input className="input" style={{ fontSize: 15, fontWeight: 700, padding: '4px 8px', width: 220 }} value={renameDraft} onChange={e => setRenameDraft(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') renameLabel(); if (e.key === 'Escape') setRenaming(false); }} autoFocus />
                <button className="btn btn-d" onClick={renameLabel}>Save</button>
                <button className="btn btn-g" onClick={() => setRenaming(false)}>Cancel</button>
              </div>
            ) : (<>
              <h2>{g.label === 'unlabeled' ? 'Unlabeled Sessions' : <span className="anon-blur">{g.label}</span>}</h2>
              {g.label !== 'unlabeled' && <button className="btn btn-g" style={{ fontSize: 10, padding: '3px 7px' }} onClick={() => { setRenaming(true); setRenameDraft(g.label); }}>Rename</button>}
            </>)}
          </div>

          <div className="proj-info-grid">
            <div className="proj-info-card card"><div className="val">{g.sessions.length}</div><div className="lbl">Sessions</div></div>
            <div className="proj-info-card card"><div className="val">{fmtT(totalTokens)}</div><div className="lbl">Tokens</div></div>
            <div className="proj-info-card card"><div className="val">{'$' + totalCost.toFixed(0)}</div><div className="lbl">Cost</div></div>
            <div className="proj-info-card card"><div className="val">{docs.length + relMem.length}</div><div className="lbl">Docs</div></div>
          </div>

          {g.slugs.size > 0 && docs.length + (creating ? 1 : 0) > 0 || g.slugs.size > 0 ? (
            <div className="proj-ctx-section">
              <h3 style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                Docs
                {g.slugs.size > 0 && <button className="btn btn-p" style={{ fontSize: 11, padding: '4px 10px' }} onClick={() => { setCreating(true); setNewName(''); }}>+ New</button>}
              </h3>
              {creating && (
                <div className="card" style={{ padding: 10, marginBottom: 8, display: 'flex', gap: 6, alignItems: 'center' }}>
                  <input className="input" style={{ flex: 1, fontSize: 12 }} placeholder="Doc name..." value={newName}
                    onChange={e => setNewName(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') createDoc(); if (e.key === 'Escape') setCreating(false); }} autoFocus />
                  <button className="btn btn-d" onClick={createDoc} disabled={!newName.trim()}>Create</button>
                  <button className="btn btn-g" onClick={() => setCreating(false)}>Cancel</button>
                </div>
              )}
              {docs.length === 0 && !creating && <div style={{ padding: 10, color: 'var(--t3)', fontSize: 12 }}>No docs yet.</div>}
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 6 }}>
                {docs.map(d => (
                  <div key={d.slug + '/' + d.filename} className="card" style={{ padding: 10, cursor: 'pointer' }} onClick={() => openDoc(d.slug, d.filename)}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                      <div style={{ font: '600 12px var(--sans)' }}>{d.name}</div>
                      <button className="btn btn-g" style={{ fontSize: 10, padding: '2px 5px' }} onClick={e => { e.stopPropagation(); deleteDoc(d.slug, d.filename); }}>x</button>
                    </div>
                    {d.description && <div style={{ fontSize: 11, color: 'var(--t3)', marginBottom: 3 }}>{d.description}</div>}
                    <div style={{ fontSize: 10, color: 'var(--t2)', fontFamily: 'var(--mono)', maxHeight: 48, overflow: 'hidden', background: 'var(--bg)', borderRadius: 4, padding: '4px 6px', lineHeight: 1.5 }}>
                      {d.preview || '(empty)'}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ) : null}

          {(() => {
            const projAgents = graphData?.agentsByProject?.[sel] || [];
            const projSkills = graphData?.skillsByProject?.[sel] || [];
            return (projAgents.length > 0 || projSkills.length > 0) ? (
              <div className="proj-ctx-section">
                <h3>Agents & Skills</h3>
                <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
                  {projAgents.map(a => <EntityChip key={a} type="agent" id={a} />)}
                  {projSkills.map(sk => <EntityChip key={sk} type="skill" id={sk} />)}
                </div>
              </div>
            ) : null;
          })()}

          {relMem.length > 0 && (
            <div className="proj-ctx-section">
              <h3>Related Memory</h3>
              <div style={{ display: 'grid', gap: 4 }}>
                {relMem.map(m => (
                  <div key={m.filename} className="card" style={{ padding: 8, cursor: 'pointer' }} onClick={() => navBus.toMemory(m.filename)}>
                    <div style={{ font: '500 12px var(--sans)', marginBottom: 2 }} className="anon-blur">{m.name}</div>
                    <div style={{ fontSize: 11, color: 'var(--t3)' }}>{m.description}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="proj-ctx-section">
            <h3>Sessions ({g.sessions.length})</h3>
            <div className="proj-sessions-list">
              {g.sessions.map(s => (
                <div key={s.sessionId} className="proj-session card">
                  <div className="ps-title anon-blur" title={s.derivedTitle} style={{ cursor: 'pointer' }} onClick={() => navBus.toSession(s.sessionId)}>{s.derivedTitle}</div>
                  <div className="ps-meta">
                    <span>{s.userMessages || 0} msgs</span>
                    <span>{fmtT((s.inputTokens || 0) + (s.outputTokens || 0))}</span>
                    <span>{rel(s.lastMessageAt)}</span>
                    {(s.agentsUsed || []).slice(0, 2).map(a => <EntityChip key={a} type="agent" id={a} />)}
                    {(s.skillsUsed || []).slice(0, 2).map(sk => <EntityChip key={sk} type="skill" id={sk} />)}
                  </div>
                  {labelEditing === s.sessionId ? (
                    <div style={{ display: 'flex', gap: 3, flexShrink: 0 }}>
                      <input className="input" style={{ width: 90, fontSize: 10, padding: '2px 5px' }} value={labelDraft} onChange={e => setLabelDraft(e.target.value)}
                        placeholder="Label..." onKeyDown={e => { if (e.key === 'Enter') saveManualLabel(s.sessionId); if (e.key === 'Escape') setLabelEditing(null); }} autoFocus />
                      <button className="btn btn-d" style={{ fontSize: 10, padding: '2px 6px' }} onClick={() => saveManualLabel(s.sessionId)}>Ok</button>
                    </div>
                  ) : (
                    <div className="ps-resume" style={{ fontSize: 10 }} onClick={e => { e.stopPropagation(); setLabelEditing(s.sessionId); setLabelDraft(s.label || ''); }}>label</div>
                  )}
                  <div className="ps-resume" onClick={e => copyResume(e, s.sessionId)}>resume</div>
                </div>
              ))}
            </div>
          </div>
        </>) : (
          <div className="empty" style={{ marginTop: 60 }}>
            <div style={{ fontSize: 24, marginBottom: 8 }}>Select a project</div>
            <div>Projects are grouped by label. Click a project to see docs, memory, and sessions.</div>
            <div style={{ marginTop: 4, color: 'var(--t3)' }}>Green dot = has docs</div>
          </div>
        )}
      </div>
    </div>
  );
}

function ModulesTab() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState(null);
  const [expandedSrc, setExpandedSrc] = useState({});
  const [loadingSrc, setLoadingSrc] = useState(null);

  useEffect(() => {
    fetch('/api/modules').then(r => r.json()).then(d => { setData(d); setLoading(false); }).catch(() => setLoading(false));
  }, []);

  const openModule = useCallback(async id => {
    if (expanded === id) { setExpanded(null); return; }
    setExpanded(id);
    if (expandedSrc[id]) return;
    setLoadingSrc(id);
    try {
      const r = await fetch('/api/modules/' + encodeURIComponent(id));
      const d = await r.json();
      if (d && d.content != null) setExpandedSrc(prev => ({ ...prev, [id]: d }));
    } catch {}
    setLoadingSrc(null);
  }, [expanded, expandedSrc]);

  if (loading) return <div className="page"><div className="loading"><div className="spin" />Loading modules...</div></div>;
  if (!data || !data.available) return (
    <div className="page" style={{ display: 'flex', flexDirection: 'column' }}>
      <h2>Modules</h2>
      <div className="sub">openclaw-features module library</div>
      <div className="mod-unavail">
        <div>openclaw-features not found</div>
        <div className="mod-unavail-path">{data && data.path}</div>
      </div>
    </div>
  );

  const { modules, categories } = data;
  const catNames = [...new Set(modules.map(m => m.category))];

  const catColor = cat => (categories && categories[cat] && categories[cat].color) || '#6366f1';
  const catLabel = cat => (categories && categories[cat] && categories[cat].name) || cat;

  const fmtBytes = b => b > 1024 ? (b / 1024).toFixed(1) + 'KB' : b + 'B';

  return (
    <div className="mod-page">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
        <div>
          <h2>Modules</h2>
          <div className="sub">{modules.length} modules across {catNames.length} categories — openclaw-features v{data.version}</div>
        </div>
        <button className="btn btn-g" onClick={() => { setLoading(true); fetch('/api/modules').then(r => r.json()).then(d => { setData(d); setLoading(false); }).catch(() => setLoading(false)); }}>Refresh</button>
      </div>

      {catNames.map(cat => {
        const catMods = modules.filter(m => m.category === cat);
        const color = catColor(cat);
        const label = catLabel(cat);
        return (
          <div key={cat}>
            <div className="mod-cat-hdr">
              <span className="mch-dot" style={{ background: color }} />
              {label}
              <span style={{ fontSize: 10, color: 'var(--t4)', fontFamily: 'var(--mono)' }}>{catMods.length}</span>
            </div>
            <div className="mod-grid">
              {catMods.map(mod => {
                const isExp = expanded === mod.id;
                const src = expandedSrc[mod.id];
                const bdColor = mod.color || color;
                return (
                  <React.Fragment key={mod.id}>
                    <div
                      className={'card mod-card' + (isExp ? ' expanded' : '')}
                      style={{ borderColor: isExp ? bdColor + '55' : undefined }}
                      onClick={() => openModule(mod.id)}
                    >
                      <div className="mod-card-head">
                        <div className="mod-card-names">
                          <div className="mod-card-name">{mod.name}</div>
                          <div className="mod-card-short">{mod.shortName}</div>
                        </div>
                        <span className="mod-cat-badge" style={{ background: bdColor + '18', color: bdColor }}>{label}</span>
                      </div>
                      <div className="mod-card-desc">{mod.description}</div>
                      {mod.capabilities && mod.capabilities.length > 0 && (
                        <div className="mod-caps">
                          {mod.capabilities.map(cap => <span key={cap} className="mod-cap">{cap}</span>)}
                        </div>
                      )}
                      <div className="mod-card-footer">
                        {mod.source && <>
                          <span className="mod-stat">{mod.source.lines} lines</span>
                          <span style={{ color: 'var(--border-h)' }}>·</span>
                          <span className="mod-stat">{mod.source.exportCount} exports</span>
                          <span style={{ color: 'var(--border-h)' }}>·</span>
                          <span className="mod-stat">{fmtBytes(mod.source.sizeBytes)}</span>
                        </>}
                        {mod.requires && mod.requires.length > 0 && <>
                          <span style={{ color: 'var(--border-h)' }}>·</span>
                          <span className="mod-badge-requires">Requires: {mod.requires.join(', ')}</span>
                        </>}
                        <span style={{ marginLeft: 'auto' }}>
                          {mod.standalone ? <span className="mod-badge-standalone">standalone</span> : <span className="mod-badge-requires">requires config</span>}
                        </span>
                      </div>
                    </div>
                    {isExp && (
                      <div className="mod-expand" style={{ borderColor: bdColor + '55' }}>
                        <div className="mod-expand-inner">
                          {loadingSrc === mod.id && <div className="loading" style={{ padding: 16 }}><div className="spin" />Loading source...</div>}
                          {src && src.files && src.files.length > 0 && (
                            <div className="me-section">
                              <div className="me-label">Files</div>
                              <div className="me-files">
                                {src.files.map(f => (
                                  <div key={f.filename} className="me-file">
                                    <span>{f.filename}</span>
                                    <span className="me-file-lines">{f.lines} lines</span>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}
                          {src && src.content && (
                            <div className="me-section">
                              <div className="me-label">Source — {mod.entrypoint}</div>
                              <pre className="mod-src-block">{src.content}</pre>
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                  </React.Fragment>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TeamMemoryTab() {
  const [status, setStatus] = useState(null);
  const [projects, setProjects] = useState([]);
  const [selProject, setSelProject] = useState(null);
  const [files, setFiles] = useState([]);
  const [selFile, setSelFile] = useState(null);
  const [fileContent, setFileContent] = useState('');
  const [sharedSkills, setSharedSkills] = useState([]);
  const [view, setView] = useState('memory');
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState('');
  const [newProjName, setNewProjName] = useState('');
  const [showNewProj, setShowNewProj] = useState(false);
  const [storageMode, setStorageMode] = useState('claude');

  const loadStatus = () => fetch('/api/team-sync/status').then(r => r.json()).then(d => {
    setStatus(d);
    if (d.projects) setProjects(d.projects);
  }).catch(() => setStatus({ available: false, error: 'Server unreachable' }));

  const loadMemory = (proj) => {
    if (!proj) return;
    fetch('/api/team-sync/memory?project=' + encodeURIComponent(proj)).then(r => r.json()).then(d => {
      setFiles(d.files || []);
      setSelFile(null);
      setFileContent('');
    }).catch(() => {});
  };

  const loadSkills = () => {
    fetch('/api/team-sync/skills').then(r => r.json()).then(d => setSharedSkills(d.files || [])).catch(() => {});
  };

  const openFile = async (type, project, filename) => {
    const params = new URLSearchParams({ type, filename });
    if (project) params.set('project', project);
    const r = await fetch('/api/team-sync/file?' + params);
    const d = await r.json();
    if (d.content) { setFileContent(d.content); setSelFile(filename); }
  };

  const doSync = async (direction, type, filename) => {
    setSyncing(true);
    setSyncMsg('');
    try {
      const r = await fetch('/api/team-sync/sync-file', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ direction, type, project: selProject, filename })
      });
      const d = await r.json();
      setSyncMsg(d.ok ? `Synced ${filename} ${direction === 'to-shared' ? 'to team' : 'to local'}` : (d.error || 'Sync failed'));
      if (view === 'memory') loadMemory(selProject);
      else loadSkills();
    } catch (e) { setSyncMsg('Error: ' + e.message); }
    setSyncing(false);
    setTimeout(() => setSyncMsg(''), 4000);
  };

  const doPull = async () => {
    setSyncing(true);
    const r = await fetch('/api/team-sync/pull', { method: 'POST' });
    const d = await r.json();
    setSyncMsg(d.ok ? 'Pulled latest from DevOps' : (d.error || 'Pull failed'));
    setSyncing(false);
    loadStatus();
    if (selProject) loadMemory(selProject);
    loadSkills();
    setTimeout(() => setSyncMsg(''), 4000);
  };

  const doPush = async () => {
    setSyncing(true);
    const r = await fetch('/api/team-sync/push', { method: 'POST' });
    const d = await r.json();
    setSyncMsg(d.ok ? 'Pushed to DevOps' : (d.error || 'Push failed'));
    setSyncing(false);
    loadStatus();
    setTimeout(() => setSyncMsg(''), 4000);
  };

  const createProj = async () => {
    if (!newProjName.trim()) return;
    const r = await fetch('/api/team-sync/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: newProjName.trim() })
    });
    const d = await r.json();
    if (d.ok) {
      setShowNewProj(false);
      setNewProjName('');
      loadStatus();
    } else {
      setSyncMsg(d.error || 'Failed');
      setTimeout(() => setSyncMsg(''), 4000);
    }
  };

  useEffect(() => { loadStatus(); loadSkills(); }, []);
  useEffect(() => { if (selProject) loadMemory(selProject); }, [selProject]);

  if (!status) return <div className="page"><div className="loading"><div className="spin" />Connecting to team sync...</div></div>;

  if (!status.available) return (
    <div className="page">
      <h2>Team Memory</h2>
      <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 'var(--r)', padding: 20, maxWidth: 500, marginTop: 12 }}>
        <div style={{ color: 'var(--t2)', marginBottom: 12 }}>Team sync repo not available.</div>
        <div style={{ color: 'var(--t4)', fontSize: 12, marginBottom: 12 }}>{status.error}</div>
        <div style={{ background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 6, padding: 10, fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--t3)' }}>
          git clone &lt;your-team-sync-repo-url&gt; ~/.claude/team-sync/team-sync
        </div>
      </div>
    </div>
  );

  const localMemDir = storageMode === 'claude' ? '~/.claude/projects/.../memory/' : '~/Downloads/';

  return (
    <div className="mem-layout">
      <div className="mem-side" style={{ width: 240 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
          <h3>Team Sync</h3>
          <span style={{ fontSize: 10, color: status.dirty ? '#f59e0b' : 'var(--pri)', fontWeight: 600 }}>
            {status.dirty ? 'unsaved' : 'clean'}
          </span>
        </div>

        <div style={{ fontSize: 10, color: 'var(--t4)', marginBottom: 8, lineHeight: 1.5 }}>
          <div>Branch: {status.branch} ({status.sha})</div>
          {status.ahead > 0 && <div style={{ color: '#f59e0b' }}>{status.ahead} ahead</div>}
          {status.behind > 0 && <div style={{ color: '#ef4444' }}>{status.behind} behind</div>}
        </div>

        <div style={{ display: 'flex', gap: 4, marginBottom: 10 }}>
          <button className="btn" style={{ flex: 1, fontSize: 10 }} onClick={doPull} disabled={syncing}>Pull</button>
          <button className="btn" style={{ flex: 1, fontSize: 10 }} onClick={doPush} disabled={syncing}>Push</button>
        </div>

        <div style={{ display: 'flex', gap: 4, marginBottom: 10, background: 'var(--bg)', borderRadius: 6, padding: 2 }}>
          <button className={'btn' + (storageMode === 'local' ? ' btn-p' : '')} style={{ flex: 1, fontSize: 10, padding: '3px 6px' }} onClick={() => setStorageMode('local')}>Local folder</button>
          <button className={'btn' + (storageMode === 'claude' ? ' btn-p' : '')} style={{ flex: 1, fontSize: 10, padding: '3px 6px' }} onClick={() => setStorageMode('claude')}>Claude folder</button>
        </div>

        <div style={{ display: 'flex', gap: 4, marginBottom: 10, background: 'var(--bg)', borderRadius: 6, padding: 2 }}>
          <button className={'btn' + (view === 'memory' ? ' btn-p' : '')} style={{ flex: 1, fontSize: 10, padding: '3px 6px' }} onClick={() => setView('memory')}>Memory</button>
          <button className={'btn' + (view === 'skills' ? ' btn-p' : '')} style={{ flex: 1, fontSize: 10, padding: '3px 6px' }} onClick={() => setView('skills')}>Skills</button>
        </div>

        {syncMsg && <div style={{ fontSize: 10, padding: '4px 6px', borderRadius: 4, marginBottom: 8, background: syncMsg.startsWith('Error') || syncMsg.includes('failed') ? 'rgba(239,68,68,.15)' : 'rgba(34,197,94,.15)', color: syncMsg.startsWith('Error') || syncMsg.includes('failed') ? '#ef4444' : '#22c55e' }}>{syncMsg}</div>}

        {view === 'memory' && <>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
            <div style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--t4)', fontWeight: 500 }}>Projects</div>
            <button className="btn" style={{ fontSize: 9, padding: '1px 5px' }} onClick={() => setShowNewProj(!showNewProj)}>+</button>
          </div>
          {showNewProj && (
            <div style={{ display: 'flex', gap: 4, marginBottom: 6 }}>
              <input className="input" style={{ flex: 1, fontSize: 11 }} placeholder="Project name" value={newProjName} onChange={e => setNewProjName(e.target.value)} onKeyDown={e => e.key === 'Enter' && createProj()} />
              <button className="btn btn-p" style={{ fontSize: 10, padding: '2px 8px' }} onClick={createProj}>Add</button>
            </div>
          )}
          {projects.map(p => (
            <div key={p.name} className={'mem-item' + (selProject === p.name ? ' on' : '')} onClick={() => setSelProject(p.name)}>
              <div className="name">{p.name}</div>
              <span style={{ fontSize: 10, color: 'var(--t4)' }}>{p.fileCount} files</span>
            </div>
          ))}
          {selProject && files.length > 0 && <>
            <div style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--t4)', fontWeight: 500, marginTop: 10, marginBottom: 4 }}>Files in {selProject}</div>
            {files.map(f => (
              <div key={f.filename} className={'mem-item' + (selFile === f.filename ? ' on' : '')} onClick={() => openFile('memory', selProject, f.filename)}>
                <div className="name anon-blur">{f.name}</div>
                <span className={'mem-type ' + (f.type === 'project' ? 'mt-proj' : f.type === 'feedback' ? 'mt-fb' : f.type === 'user' ? 'mt-user' : 'mt-ref')}>{f.type}</span>
              </div>
            ))}
          </>}
        </>}

        {view === 'skills' && <>
          <div style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--t4)', fontWeight: 500, marginBottom: 4 }}>Shared Skills ({sharedSkills.length})</div>
          {sharedSkills.map(f => (
            <div key={f.filename} className={'mem-item' + (selFile === f.filename ? ' on' : '')} onClick={() => openFile('skill', null, f.filename)}>
              <div className="name anon-blur">{f.name}</div>
              <span style={{ fontSize: 10, color: 'var(--t4)' }}>{Math.round(f.size / 1024)}KB</span>
            </div>
          ))}
          {sharedSkills.length === 0 && <div style={{ fontSize: 11, color: 'var(--t4)', padding: 8 }}>No shared skills yet. Sync a skill from your local commands.</div>}
        </>}
      </div>

      <div className="mem-detail">
        {selFile && fileContent ? <>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <h2 style={{ margin: 0 }}>{selFile}</h2>
            <div style={{ display: 'flex', gap: 6 }}>
              <button className="btn" style={{ fontSize: 11 }} onClick={() => doSync('to-local', view === 'memory' ? 'memory' : 'skill', selFile)} disabled={syncing}>
                Copy to local
              </button>
              <button className="btn btn-p" style={{ fontSize: 11 }} onClick={() => doSync('to-shared', view === 'memory' ? 'memory' : 'skill', selFile)} disabled={syncing}>
                Push to team
              </button>
            </div>
          </div>
          <div style={{ fontSize: 11, color: 'var(--t4)', marginBottom: 10 }}>
            Source: Team sync repo | Target: {storageMode === 'claude' ? 'Claude memory' : 'Local folder'}
          </div>
          <div className="mem-body anon-blur">{fileContent}</div>
        </> : (
          <div className="empty" style={{ textAlign: 'center', paddingTop: 60 }}>
            <div style={{ fontSize: 32, marginBottom: 12, opacity: 0.3 }}>Team Memory</div>
            <div style={{ color: 'var(--t4)', fontSize: 13, maxWidth: 400, margin: '0 auto', lineHeight: 1.6 }}>
              Synced via a shared git repo.
              Select a project to browse shared memory files, or switch to Skills to see shared skills.
              Use Pull/Push to sync with the remote repo.
            </div>
            <div style={{ marginTop: 16, display: 'flex', gap: 8, justifyContent: 'center' }}>
              <button className="btn" style={{ fontSize: 11 }} onClick={doPull} disabled={syncing}>Pull latest</button>
              <button className="btn" style={{ fontSize: 11 }} onClick={() => loadStatus()}>Refresh</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('home');
  const [sub, setSub] = useState({ config: 'harness', system: 'analytics' });
  const [c, setC] = useState({ s: 0, h: 0, l: 0, m: 0, p: 0, mod: 0 });
  const [auth, setAuth] = useState(null);
  const [focusedEntity, setFocusedEntity] = useState(null);
  const [showPalette, setShowPalette] = useState(false);
  const [anonMode, setAnonMode] = useState(false);
  useEffect(() => {
    document.documentElement.classList.toggle('anon', anonMode);
  }, [anonMode]);
  useEffect(() => {
    const handler = () => setAnonMode(p => !p);
    window.addEventListener('mc-anon-toggle', handler);
    return () => window.removeEventListener('mc-anon-toggle', handler);
  }, []);
  useEffect(() => {
    const handler = (e) => {
      if (e.detail?.tab) setTab(e.detail.tab);
      if (e.detail?.subTab) setSub(prev => ({ ...prev, [e.detail.tab]: e.detail.subTab }));
      if (e.detail?.entityType) setFocusedEntity({ type: e.detail.entityType, id: e.detail.entityId });
      else setFocusedEntity(null);
    };
    window.addEventListener('mc-nav', handler);
    return () => window.removeEventListener('mc-nav', handler);
  }, []);
  useEffect(() => {
    const handler = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); setShowPalette(p => !p); }
      if (e.key === 'F2') { e.preventDefault(); setAnonMode(p => !p); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);
  useEffect(() => {
    fetch('/api/claude/status').then(r => r.json()).then(d => setAuth(d)).catch(() => setAuth({ loggedIn: false }));
  }, []);
  useEffect(() => {
    warmCache();
    Promise.all([
      cachedFetch('/api/sessions', 60000),
      fetch('/api/harness/summary').then(r => r.json()),
      cachedFetch('/api/projects', 60000),
      fetch('/api/modules').then(r => r.json()).catch(() => ({ modules: [] })),
      cachedFetch('/api/graph', 60000).catch(() => null),
      cachedFetch('/api/memory', 60000).catch(() => ({ files: [] })),
    ]).then(([s, h, pr, mods]) => {
      const labelSet = new Set((s.sessions || []).map(x => x.label).filter(Boolean));
      setC({ s: s.sessions?.length || 0, h: (h.layers?.rules?.count || 0) + (h.layers?.commands?.count || 0) + (h.layers?.hooks?.count || 0), l: h.layers?.lessons?.count || 0, m: h.layers?.memory?.count || 0, p: labelSet.size || pr.projects?.length || 0, mod: mods.modules?.length || 0 });
    }).catch(() => {});
  }, []);

  const configCount = c.h + c.l + c.m;
  const tabs = [
    { k: 'home', l: 'Launch', tip: 'Create new agents or start sessions with existing ones. 3D agent overview.' },
    { k: 'sessions', l: 'Sessions', n: c.s, tip: 'Browse all Claude Code sessions: transcripts, token usage, costs, and resume commands.' },
    { k: 'projects', l: 'Projects', n: c.p, tip: 'View projects by working directory. See sessions, agents, and skills per project.' },
    { k: 'config', l: 'Config', n: configCount || null, tip: 'Rules, hooks, commands, memory files, lessons learned, and agent/skill definitions.' },
    { k: 'modules', l: 'Modules', n: c.mod || null, tip: 'OpenClaw modules: coordinator, memory-store, cron-scheduler, and more.' },
    { k: 'team', l: 'Team', tip: 'Team sync: shared memory, skills, and pull/push to remote repositories.' },
    { k: 'system', l: 'System', tip: 'Analytics, logs, docs, and system health. Token costs, model usage, active processes.' },
  ];
  const subTabs = {
    config: [
      { k: 'harness', l: 'Harness', n: c.h, tip: 'Rules, hooks, and slash commands that shape Claude behavior.' },
      { k: 'improvement', l: 'Lessons', n: c.l, tip: 'Lessons learned from past sessions. Prevention rules for repeated mistakes.' },
      { k: 'memory', l: 'Memory', n: c.m, tip: 'Persistent memory files: user profile, feedback, project context, and references.' },
      { k: 'skills', l: 'Skills', tip: 'Agent definitions and skill commands. Edit, create, or view usage stats.' },
    ],
    system: [
      { k: 'analytics', l: 'Analytics', tip: 'Token costs, model distribution, project spending, and agent leaderboard.' },
      { k: 'logs', l: 'Logs', tip: 'Claude Code log files: debug output, error traces, and session logs.' },
      { k: 'docs', l: 'Docs', tip: 'Browse and edit documentation in the Claude config directory.' },
      { k: 'health', l: 'Health', tip: 'Running Claude processes, disk usage, project count, and system status.' },
    ],
  };
  const activeSub = subTabs[tab] ? sub[tab] : null;

  return (<>
    {anonMode && <div className="anon-badge">ANONYMOUS MODE (F2)</div>}
    {showPalette && <CommandPalette onClose={() => setShowPalette(false)} />}
    <nav>
      <div className="brand"><div className="logo">M</div><span>Mission Control</span></div>
      {tabs.map(t => <div key={t.k} className={'tab' + (tab === t.k ? ' on' : '')} onClick={() => setTab(t.k)} title={t.tip}>{t.l}{t.n != null && <em>{t.n}</em>}</div>)}
      <div className="flex1" />
      <div className="tab" onClick={() => setShowPalette(true)} title="Ctrl+K" style={{ fontSize: 11, color: 'rgba(255,255,255,.3)', display: 'flex', gap: 5, alignItems: 'center' }}>
        <span style={{ fontSize: 12 }}>⌘</span>Search
      </div>
      {auth && (
        <div className="auth-status" title={auth.loggedIn ? `${auth.email || 'logged in'} (${auth.authMethod || 'unknown'})` : 'Not logged in - run: claude auth login'}>
          <span className={auth.loggedIn ? 'dot-auth on' : 'dot-auth off'} />
          <span className="auth-label">{auth.loggedIn ? <span className="anon-blur">{(auth.email || 'Authenticated').split('@')[0]}</span> : 'Not logged in'}</span>
        </div>
      )}
      <div className="status"><span className="dot-live" />localhost:7337</div>
    </nav>
    {subTabs[tab] && (
      <div className="sub-nav">
        {subTabs[tab].map(t => <div key={t.k} className={'sub-tab' + (sub[tab] === t.k ? ' on' : '')} onClick={() => setSub({ ...sub, [tab]: t.k })} title={t.tip}>{t.l}{t.n != null && <em>{t.n}</em>}</div>)}
      </div>
    )}
    <div className="body">
      <ErrorBoundary key={tab + (activeSub || '')}>
        {tab === 'home' && <HomeTab />}
        {tab === 'sessions' && <SessionsTab focusedEntity={focusedEntity} />}
        {tab === 'projects' && <ProjectsTab focusedEntity={focusedEntity} />}
        {tab === 'modules' && <ModulesTab />}
        {tab === 'team' && <TeamMemoryTab />}
        {activeSub === 'analytics' && <AnalyticsTab />}
        {activeSub === 'harness' && <HarnessTab />}
        {activeSub === 'improvement' && <ImprovementTab />}
        {activeSub === 'memory' && <MemoryTab />}
        {activeSub === 'logs' && <LogViewerTab />}
        {activeSub === 'docs' && <DocsTab />}
        {activeSub === 'skills' && <SkillsAgentsTab focusedEntity={focusedEntity} />}
        {activeSub === 'health' && <SystemTab />}
      </ErrorBoundary>
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
