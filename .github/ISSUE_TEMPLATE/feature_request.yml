name: Feature request
description: Suggest a change or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Be concrete.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they fall short.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Optional. Links, screenshots, prior art.
